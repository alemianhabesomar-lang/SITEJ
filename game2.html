<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Blaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a12, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #000000, #0a0a1a);
            border: 3px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), 
                        inset 0 0 50px rgba(65, 105, 225, 0.1);
            border-radius: 5px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #d4af37;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
            z-index: 10;
            background: rgba(0, 0, 10, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            line-height: 1.6;
            display: none;
        }

        #ui div {
            margin: 3px 0;
        }

        #menuButton {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(to bottom, #d4af37, #b8941f);
            color: #000;
            border: 2px solid #f0c950;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: bold;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        #menuButton:hover {
            background: linear-gradient(to bottom, #f0c950, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5);
        }

        #menuButton:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(212, 175, 55, 0.3);
        }

        #questionDisplay {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 1),
                         0 0 40px rgba(212, 175, 55, 0.5);
            z-index: 10;
            padding: 15px 30px;
            background: rgba(0, 0, 10, 0.7);
            border-radius: 10px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        #startScreen, #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 10, 0.98), rgba(10, 10, 26, 0.95));
            padding: 50px;
            border: 3px solid #d4af37;
            border-radius: 15px;
            text-align: center;
            color: #d4af37;
            z-index: 20;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6),
                        inset 0 0 30px rgba(65, 105, 225, 0.1);
            min-width: 400px;
        }

        #gameOver {
            display: none;
        }

        h1 {
            font-size: 52px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 1),
                         0 0 40px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 35px;
            color: #4169e1;
            text-shadow: 0 0 10px rgba(65, 105, 225, 0.8);
        }

        .difficultyButtons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background: linear-gradient(to bottom, #d4af37, #b8941f);
            color: #000;
            border: 2px solid #f0c950;
            padding: 18px 35px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: linear-gradient(to bottom, #f0c950, #d4af37);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(212, 175, 55, 0.4);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        #stats {
            margin-top: 25px;
            font-size: 20px;
            line-height: 2;
            background: rgba(0, 0, 10, 0.5);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        #stats div {
            margin: 8px 0;
        }

        #stats span {
            color: #f0c950;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(240, 201, 80, 0.8);
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            font-size: 14px;
            text-align: center;
            opacity: 0.7;
        }

        .combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #d4af37;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(212, 175, 55, 1),
                         0 0 60px rgba(212, 175, 55, 0.8);
            pointer-events: none;
            z-index: 15;
            display: none;
            animation: comboAnimation 1s ease-out;
        }

        @keyframes comboAnimation {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="time">60</span>s</div>
            <div>Streak: <span id="streak">0</span></div>
            <div>Accuracy: <span id="accuracy">100</span>%</div>
        </div>

        <button id="menuButton" onclick="returnToMenu()">Main Menu</button>

        <div id="questionDisplay"></div>
        <div id="combo" class="combo"></div>

        <div id="startScreen">
            <h1>MATH BLASTER</h1>
            <h2>Choose Your Challenge</h2>
            <div class="difficultyButtons">
                <button onclick="startGame('addition')">➕ Addition</button>
                <button onclick="startGame('subtraction')">➖ Subtraction</button>
                <button onclick="startGame('multiplication')">✖️ Multiplication</button>
                <button onclick="startGame('division')">➗ Division</button>
                <button onclick="startGame('mixed')">🎯 Mixed Practice</button>
            </div>
        </div>

        <div id="gameOver">
            <h1>GAME OVER</h1>
            <div id="stats">
                <div>Final Score: <span id="finalScore">0</span></div>
                <div>Questions Answered: <span id="totalAnswered">0</span></div>
                <div>Correct: <span id="correctAnswers">0</span></div>
                <div>Final Accuracy: <span id="finalAccuracy">0</span>%</div>
                <div>Best Streak: <span id="bestStreak">0</span></div>
            </div>
            <button onclick="returnToMenu()">Main Menu</button>
        </div>

        <div id="instructions">
            Click on the correct answer! Answer quickly for bonus points! 🎯
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameRunning = false;
        let score = 0;
        let timeLeft = 60;
        let streak = 0;
        let bestStreak = 0;
        let totalQuestions = 0;
        let correctCount = 0;
        let difficulty = 'addition';

        let currentQuestion = null;
        let answers = [];
        let particles = [];

        // Stars background
        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.2,
                opacity: Math.random() * 0.5 + 0.5,
                twinkleSpeed: Math.random() * 0.02 + 0.01,
                twinklePhase: Math.random() * Math.PI * 2
            });
        }

        function startGame(mode) {
            difficulty = mode;
            gameRunning = true;
            score = 0;
            timeLeft = 60;
            streak = 0;
            bestStreak = 0;
            totalQuestions = 0;
            correctCount = 0;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('menuButton').style.display = 'block';
            document.getElementById('ui').style.display = 'block';
            generateQuestion();
            startTimer();
            updateUI();
            gameLoop();
        }

        function returnToMenu() {
            gameRunning = false;
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('menuButton').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('questionDisplay').textContent = '';
            answers = [];
            particles = [];
        }

        function generateQuestion() {
            let num1, num2, answer, operation;
            
            if (difficulty === 'mixed') {
                const modes = ['addition', 'subtraction', 'multiplication', 'division'];
                difficulty = modes[Math.floor(Math.random() * modes.length)];
            }

            switch(difficulty) {
                case 'addition':
                    num1 = Math.floor(Math.random() * 50) + 1;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    answer = num1 + num2;
                    operation = '+';
                    break;
                case 'subtraction':
                    num1 = Math.floor(Math.random() * 50) + 20;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                    operation = '-';
                    break;
                case 'multiplication':
                    num1 = Math.floor(Math.random() * 12) + 1;
                    num2 = Math.floor(Math.random() * 12) + 1;
                    answer = num1 * num2;
                    operation = '×';
                    break;
                case 'division':
                    num2 = Math.floor(Math.random() * 12) + 1;
                    answer = Math.floor(Math.random() * 12) + 1;
                    num1 = num2 * answer;
                    operation = '÷';
                    break;
            }

            currentQuestion = {
                num1: num1,
                num2: num2,
                answer: answer,
                operation: operation,
                questionTime: Date.now()
            };

            document.getElementById('questionDisplay').textContent = 
                `${num1} ${operation} ${num2} = ?`;

            generateAnswers(answer);
            
            // Reset difficulty for mixed mode
            if (difficulty === 'mixed') {
                difficulty = 'mixed';
            }
        }

        function generateAnswers(correctAnswer) {
            answers = [];
            const numAnswers = 4;
            const positions = [];
            
            // Generate random positions
            for (let i = 0; i < numAnswers; i++) {
                positions.push({
                    x: 150 + (i % 2) * 400,
                    y: 300 + Math.floor(i / 2) * 120,
                    width: 150,
                    height: 80
                });
            }

            // Shuffle positions
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            // Place correct answer at random position
            const correctIndex = Math.floor(Math.random() * numAnswers);
            
            for (let i = 0; i < numAnswers; i++) {
                let value;
                if (i === correctIndex) {
                    value = correctAnswer;
                } else {
                    // Generate wrong answers
                    do {
                        const offset = Math.floor(Math.random() * 10) - 5;
                        value = correctAnswer + offset;
                    } while (value === correctAnswer || value < 0 || 
                             answers.some(a => a.value === value));
                }
                
                answers.push({
                    value: value,
                    x: positions[i].x,
                    y: positions[i].y,
                    width: positions[i].width,
                    height: positions[i].height,
                    isCorrect: value === correctAnswer,
                    scale: 1
                });
            }
        }

        function drawStars() {
            stars.forEach(star => {
                const twinkle = Math.sin(star.twinklePhase) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(168, 197, 232, ${star.opacity * twinkle})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                star.twinklePhase += star.twinkleSpeed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function drawAnswers() {
            answers.forEach(answer => {
                const centerX = answer.x + answer.width / 2;
                const centerY = answer.y + answer.height / 2;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(answer.scale, answer.scale);
                ctx.translate(-centerX, -centerY);

                // Shadow
                ctx.shadowColor = 'rgba(212, 175, 55, 0.5)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 4;

                // Button background with gradient
                const gradient = ctx.createLinearGradient(
                    answer.x, answer.y, 
                    answer.x, answer.y + answer.height
                );
                gradient.addColorStop(0, '#e6c045');
                gradient.addColorStop(0.5, '#d4af37');
                gradient.addColorStop(1, '#b8941f');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(answer.x, answer.y, answer.width, answer.height, 10);
                ctx.fill();

                // Border
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = answer.scale > 1 ? '#f0c950' : '#d4af37';
                ctx.lineWidth = answer.scale > 1 ? 4 : 3;
                ctx.stroke();

                // Inner glow
                if (answer.scale > 1) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(answer.x + 2, answer.y + 2, answer.width - 4, answer.height - 4, 8);
                    ctx.stroke();
                }

                // Answer text
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 2;
                ctx.fillStyle = '#000';
                ctx.font = 'bold 38px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(answer.value, centerX, centerY);

                ctx.restore();
            });
        }

        function createParticles(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color: color,
                    size: Math.random() * 3 + 2
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function showCombo() {
            if (streak >= 3) {
                const comboEl = document.getElementById('combo');
                const comboText = streak === 3 ? '3x COMBO! 🔥' :
                                 streak === 5 ? '5x STREAK! ⚡' :
                                 streak >= 10 ? `${streak}x UNSTOPPABLE! 💫` :
                                 `${streak}x STREAK! 🔥`;
                comboEl.textContent = comboText;
                comboEl.style.display = 'block';
                setTimeout(() => {
                    comboEl.style.display = 'none';
                }, 1000);
            }
        }

        function flashScreen(color) {
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = color;
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '5';
            flash.style.transition = 'opacity 0.3s';
            document.getElementById('gameContainer').appendChild(flash);
            
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 50);
        }

        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            answers.forEach(answer => {
                if (x >= answer.x && x <= answer.x + answer.width &&
                    y >= answer.y && y <= answer.y + answer.height) {
                    
                    totalQuestions++;
                    
                    if (answer.isCorrect) {
                        // Calculate time bonus
                        const timeTaken = (Date.now() - currentQuestion.questionTime) / 1000;
                        const timeBonus = Math.max(0, Math.floor((5 - timeTaken) * 10));
                        
                        score += 10 + timeBonus + (streak * 5);
                        correctCount++;
                        streak++;
                        
                        if (streak > bestStreak) bestStreak = streak;
                        
                        createParticles(
                            answer.x + answer.width / 2, 
                            answer.y + answer.height / 2,
                            '212, 175, 55',
                            30
                        );
                        
                        // Add extra particles for combos
                        if (streak >= 3) {
                            createParticles(
                                answer.x + answer.width / 2, 
                                answer.y + answer.height / 2,
                                '65, 105, 225',
                                20
                            );
                        }
                        
                        showCombo();
                        generateQuestion();
                    } else {
                        streak = 0;
                        createParticles(
                            answer.x + answer.width / 2, 
                            answer.y + answer.height / 2,
                            '255, 65, 65',
                            25
                        );
                        score = Math.max(0, score - 5);
                        
                        // Flash the screen red briefly
                        flashScreen('rgba(255, 0, 0, 0.2)');
                    }
                    
                    updateUI();
                }
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            answers.forEach(answer => {
                if (x >= answer.x && x <= answer.x + answer.width &&
                    y >= answer.y && y <= answer.y + answer.height) {
                    answer.scale = 1.05;
                    canvas.style.cursor = 'pointer';
                } else {
                    answer.scale = 1;
                }
            });
        });

        function startTimer() {
            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }
                
                timeLeft--;
                updateUI();
                
                // Add urgency when time is running out
                if (timeLeft === 10) {
                    flashScreen('rgba(255, 165, 0, 0.3)');
                }
                
                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timer);
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            
            const timeElement = document.getElementById('time');
            timeElement.textContent = timeLeft;
            
            // Change color when time is low
            if (timeLeft <= 10) {
                timeElement.style.color = '#ff6b6b';
                timeElement.style.textShadow = '0 0 10px rgba(255, 107, 107, 0.8)';
            } else {
                timeElement.style.color = '#d4af37';
                timeElement.style.textShadow = '0 0 10px rgba(212, 175, 55, 0.8)';
            }
            
            document.getElementById('streak').textContent = streak;
            
            const accuracy = totalQuestions > 0 
                ? Math.round((correctCount / totalQuestions) * 100) 
                : 100;
            document.getElementById('accuracy').textContent = accuracy;
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('totalAnswered').textContent = totalQuestions;
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('bestStreak').textContent = bestStreak;
            
            const finalAccuracy = totalQuestions > 0 
                ? Math.round((correctCount / totalQuestions) * 100) 
                : 0;
            document.getElementById('finalAccuracy').textContent = finalAccuracy;
            
            document.getElementById('gameOver').style.display = 'block';
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            updateStars();
            drawStars();
            
            if (answers.length > 0) {
                drawAnswers();
            }
            
            updateParticles();
            drawParticles();

            requestAnimationFrame(gameLoop);
        }

        // Animate background on start screen
        function backgroundLoop() {
            if (gameRunning) return;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updateStars();
            drawStars();
            
            requestAnimationFrame(backgroundLoop);
        }
        
        backgroundLoop();
    </script>
</body>
</html>

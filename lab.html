<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة المحاكاة العلمية | SITEJ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#f0f4f8; }

.header {
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white; padding:20px 40px;
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:15px; position:sticky; top:0; z-index:200;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.logo h1 { font-size:1.8rem; }
.logo p { font-size:0.8rem; opacity:0.8; }
.role-buttons { display:flex; gap:10px; }
.role-btn { padding:8px 25px; border:none; border-radius:30px; font-weight:bold; cursor:pointer; background:rgba(255,255,255,0.2); color:white; font-family:'Cairo',sans-serif; transition:.2s; }
.role-btn:hover { background:rgba(255,255,255,0.35); }
.role-btn.active { background:#ff9800; color:#1e3c72; }

.hero { text-align:center; padding:40px 20px 20px; background:white; }
.hero h2 { color:#1e3c72; font-size:2rem; }
.hero p { color:#555; margin-top:8px; }
.hero-stats { display:flex; justify-content:center; gap:30px; margin-top:20px; flex-wrap:wrap; }
.stat { text-align:center; }
.stat-num { font-size:2rem; font-weight:900; color:#ff9800; }
.stat-lbl { font-size:0.75rem; color:#666; }

.tabs { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; padding:18px 20px; background:white; border-bottom:2px solid #e2e8f0; }
.tab { padding:8px 20px; border:none; border-radius:30px; background:#e2e8f0; cursor:pointer; font-weight:bold; font-family:'Cairo',sans-serif; transition:.2s; font-size:0.85rem; }
.tab:hover { background:#cbd5e1; }
.tab.active { background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; }

.grade-filter { display:flex; justify-content:center; gap:7px; flex-wrap:wrap; padding:14px 20px; background:#f8fafc; }
.grade-btn { padding:5px 13px; border:1.5px solid #cbd5e1; border-radius:20px; background:white; cursor:pointer; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.8rem; transition:.2s; }
.grade-btn:hover { border-color:#2a5298; color:#2a5298; }
.grade-btn.active { background:#2a5298; color:white; border-color:#2a5298; }

.teacher-panel { display:none; background:#fef3c7; border:1px solid #f59e0b; border-radius:15px; padding:15px; margin:20px 40px; text-align:center; }
.teacher-panel h3 { color:#b45309; margin-bottom:10px; }
.teacher-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.teacher-btn { padding:8px 20px; background:#f59e0b; border:none; border-radius:25px; color:white; cursor:pointer; font-family:'Cairo',sans-serif; font-weight:700; transition:.2s; }
.teacher-btn:hover { background:#d97706; }

.search-bar { display:flex; justify-content:center; padding:16px 20px 0; }
.search-bar input { width:100%; max-width:500px; padding:10px 20px; border:2px solid #e2e8f0; border-radius:30px; font-family:'Cairo',sans-serif; font-size:0.9rem; outline:none; transition:.2s; }
.search-bar input:focus { border-color:#2a5298; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:22px; padding:30px 40px 50px; max-width:1400px; margin:0 auto; }
.card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.08); cursor:pointer; transition:.3s; border:2px solid transparent; }
.card:hover { transform:translateY(-6px); box-shadow:0 12px 30px rgba(30,60,114,0.2); border-color:#2a5298; }
.card-icon { height:120px; display:flex; align-items:center; justify-content:center; font-size:3.2rem; position:relative; }
.card-badge { position:absolute; top:10px; right:10px; background:#ff9800; color:white; font-size:0.65rem; padding:3px 8px; border-radius:10px; font-weight:700; }
.card-body { padding:18px; }
.card-title { font-size:1.05rem; font-weight:800; color:#1e3c72; }
.card-desc { color:#666; font-size:0.82rem; margin:6px 0 8px; line-height:1.5; }
.card-grade { color:#2a5298; font-size:0.7rem; margin-bottom:12px; }
.btn-play { width:100%; padding:10px; background:linear-gradient(135deg,#1e3c72,#2a5298); border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer; font-family:'Cairo',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; transition:.2s; }
.btn-play:hover { background:linear-gradient(135deg,#ff9800,#f97316); }

/* MODAL */
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:1000; justify-content:center; align-items:center; padding:15px; }
.modal.active { display:flex; }
.modal-box { width:100%; max-width:980px; max-height:92vh; background:#1e293b; border-radius:24px; overflow:hidden; display:flex; flex-direction:column; border:2px solid #ff9800; box-shadow:0 0 50px rgba(255,152,0,0.2); }
.modal-header { padding:14px 22px; background:#0f172a; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #ff9800; flex-shrink:0; }
.modal-title { font-size:1.1rem; font-weight:800; color:white; }
.modal-close { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); width:34px; height:34px; border-radius:50%; color:white; cursor:pointer; font-size:1rem; transition:.2s; }
.modal-close:hover { background:#ef4444; }
.modal-body { flex:1; overflow-y:auto; padding:22px; }

/* SIM SHARED */
.sim-wrap { color:#e2e8f0; }
.sim-h { font-size:1.4rem; font-weight:900; text-align:center; margin-bottom:18px; color:#ff9800; }
.sim-layout { display:flex; gap:16px; flex-wrap:wrap; }
.sim-canvas-box { background:#060d1a; border-radius:14px; border:1px solid #1e3a5f; overflow:hidden; display:flex; align-items:center; justify-content:center; flex:2; min-width:260px; }
.sim-panel { flex:1; min-width:220px; display:flex; flex-direction:column; gap:12px; }
.ctrl-box { background:#1e293b; border:1px solid #1e3a5f; border-radius:12px; padding:16px; }
.ctrl-lbl { display:flex; justify-content:space-between; font-size:0.82rem; color:#94a3b8; margin-bottom:6px; }
.ctrl-lbl span { color:#ff9800; font-weight:700; }
input[type=range] { width:100%; -webkit-appearance:none; height:5px; background:#1e3a5f; border-radius:3px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:#ff9800; border-radius:50%; cursor:pointer; border:2px solid #0f172a; }
.info-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:8px; }
.ibox { background:#0f172a; border:1px solid #1e3a5f; border-radius:10px; padding:10px; text-align:center; }
.ibox .v { font-size:1.3rem; font-weight:900; color:#ff9800; }
.ibox .l { font-size:0.7rem; color:#94a3b8; margin-top:2px; }
.sbtn { padding:8px 18px; border-radius:20px; border:1.5px solid #ff9800; background:transparent; color:#ff9800; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; transition:.2s; }
.sbtn:hover, .sbtn.on { background:#ff9800; color:#0f172a; }
.sbtn.red { border-color:#ef4444; color:#ef4444; }
.sbtn.red:hover { background:#ef4444; color:white; }
.sbtn.grn { border-color:#10b981; color:#10b981; }
.sbtn.grn:hover { background:#10b981; color:white; }
.sbtn-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:10px; }
.info-card { background:#0f172a; border:1px solid #1e3a5f; border-radius:10px; padding:12px; font-size:0.83rem; line-height:1.7; color:#94a3b8; }
.info-card b { color:#ff9800; }

.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; padding:11px 26px; border-radius:50px; opacity:0; pointer-events:none; transition:.3s; z-index:2000; font-weight:600; font-size:0.9rem; }
.toast.show { opacity:1; }

.footer { text-align:center; padding:22px; background:#1e293b; color:#64748b; font-size:0.82rem; margin-top:20px; }

canvas { display:block; }
@media(max-width:768px) { .header{padding:12px 16px;} .grid{padding:16px;} .teacher-panel{margin:15px;} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1><i class="fas fa-atom"></i> SITEJ</h1>
    <p>منصة المحاكاة العلمية التفاعلية</p>
  </div>
  <div class="role-buttons">
    <button class="role-btn student active" onclick="setRole('student')">📖 طالب</button>
    <button class="role-btn teacher" onclick="setRole('teacher')">👨‍🏫 معلم</button>
  </div>
</div>

<div class="hero">
  <h2>اكتشف العلم بطريقة تفاعلية 🚀</h2>
  <p>محاكاة علمية متكاملة — فيزياء، كيمياء، أحياء، رياضيات، برمجة وأكثر!</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num">28</div><div class="stat-lbl">تجربة تفاعلية</div></div>
    <div class="stat"><div class="stat-num">7</div><div class="stat-lbl">مواد دراسية</div></div>
    <div class="stat"><div class="stat-num">12</div><div class="stat-lbl">صفاً دراسياً</div></div>
  </div>
</div>

<div class="search-bar">
  <input type="text" placeholder="🔍 ابحث عن تجربة..." oninput="searchSims(this.value)">
</div>

<div class="tabs">
  <button class="tab active" data-filter="all">🔭 الكل</button>
  <button class="tab" data-filter="phys">⚡ الفيزياء</button>
  <button class="tab" data-filter="chem">🧪 الكيمياء</button>
  <button class="tab" data-filter="bio">🔬 الأحياء</button>
  <button class="tab" data-filter="earth">🌍 علوم الأرض</button>
  <button class="tab" data-filter="math">📐 الرياضيات</button>
  <button class="tab" data-filter="prog">💻 البرمجة</button>
</div>

<div class="grade-filter">
  <button class="grade-btn active" data-grade="all">الكل</button>
  <button class="grade-btn" data-grade="1">1</button><button class="grade-btn" data-grade="2">2</button>
  <button class="grade-btn" data-grade="3">3</button><button class="grade-btn" data-grade="4">4</button>
  <button class="grade-btn" data-grade="5">5</button><button class="grade-btn" data-grade="6">6</button>
  <button class="grade-btn" data-grade="7">7</button><button class="grade-btn" data-grade="8">8</button>
  <button class="grade-btn" data-grade="9">9</button><button class="grade-btn" data-grade="10">10</button>
  <button class="grade-btn" data-grade="11">11</button><button class="grade-btn" data-grade="12">12</button>
</div>

<div class="teacher-panel" id="teacherPanel">
  <h3><i class="fas fa-chalkboard-teacher"></i> لوحة تحكم المعلم</h3>
  <div class="teacher-btns">
    <button class="teacher-btn" onclick="showMsg('📊 تقرير أداء الطلاب')">تقرير الأداء</button>
    <button class="teacher-btn" onclick="showMsg('📝 تم إنشاء مهمة')">إنشاء مهمة</button>
    <button class="teacher-btn" onclick="showMsg('🔓 تم فتح جميع المحاكيات')">فتح الكل</button>
    <button class="teacher-btn" onclick="showMsg('📤 تم مشاركة التجربة')">مشاركة</button>
  </div>
</div>

<div class="grid" id="simsGrid"></div>
<footer class="footer">© 2025 SITEJ — منصة المحاكاة العلمية | جميع الحقوق محفوظة</footer>

<div class="modal" id="simModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">تجربة تفاعلية</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
/* ══════════ DATA ══════════ */
const experiments = [
  // PHYSICS
  {id:1,  name:"تجربة الكثافة والطفو",      subject:"phys", desc:"اكتشف لماذا تطفو الأجسام — غيّر الكتلة والحجم وشاهد النتيجة", grades:[4,5,6,7,8,9,10,11,12], icon:"⚖️", bg:"linear-gradient(135deg,#1a3a5c,#0e4d6e)", type:"density",     badge:""},
  {id:2,  name:"حركة المقذوفات",             subject:"phys", desc:"أطلق قذيفة وشاهد مسارها مع تغيير الزاوية والسرعة والجاذبية", grades:[9,10,11,12], icon:"🎯", bg:"linear-gradient(135deg,#1a1a2e,#16213e)", type:"projectile", badge:""},
  {id:3,  name:"الموجات الميكانيكية",         subject:"phys", desc:"استكشف التردد والسعة والطول الموجي في موجة حقيقية", grades:[8,9,10,11], icon:"〰️", bg:"linear-gradient(135deg,#0f2027,#203a43)", type:"waves",      badge:""},
  {id:4,  name:"الدوائر الكهربائية",          subject:"phys", desc:"ابنِ دوائر وطبّق قانون أوم وشاهد الإلكترونات تتحرك", grades:[8,9,10,11,12], icon:"⚡", bg:"linear-gradient(135deg,#1a1a00,#2a2a00)", type:"circuit",    badge:""},
  {id:5,  name:"قانون نيوتن — الحركة",       subject:"phys", desc:"طبّق القوة على كتلة وشاهد العجلة والسرعة لحظة بلحظة", grades:[9,10,11,12], icon:"🏃", bg:"linear-gradient(135deg,#0d2137,#1a3a5c)", type:"newton",     badge:"جديد"},
  {id:6,  name:"المغناطيسية والحقول",        subject:"phys", desc:"شاهد خطوط الحقل المغناطيسي حول المغناطيس", grades:[8,9,10,11], icon:"🧲", bg:"linear-gradient(135deg,#1a001a,#2d003d)", type:"magnetic",   badge:"جديد"},
  {id:7,  name:"الحرارة وانتقالها",          subject:"phys", desc:"محاكاة الحرارة من جسم ساخن لآخر — التوصيل والإشعاع", grades:[7,8,9,10,11], icon:"🌡️", bg:"linear-gradient(135deg,#2d0000,#4a0000)", type:"heat",       badge:""},
  {id:8,  name:"الضوء والبصريات",            subject:"phys", desc:"انعكاس وانكسار الضوء — العدسات والمرايا", grades:[9,10,11,12], icon:"🔦", bg:"linear-gradient(135deg,#1a1a00,#2a2600)", type:"optics",     badge:"جديد"},
  // CHEMISTRY
  {id:9,  name:"مقياس pH والتفاعل",          subject:"chem", desc:"أضف أحماضاً وقواعد وشاهد تغيّر اللون والفقاعات", grades:[8,9,10,11,12], icon:"🧪", bg:"linear-gradient(135deg,#12001a,#1a0030)", type:"ph",         badge:""},
  {id:10, name:"التفاعلات الكيميائية",        subject:"chem", desc:"تفاعل بين عناصر مختلفة وشاهد المعادلة الكيميائية", grades:[9,10,11,12], icon:"⚗️", bg:"linear-gradient(135deg,#0a2a00,#143d00)", type:"reactions",  badge:"جديد"},
  {id:11, name:"الجدول الدوري التفاعلي",     subject:"chem", desc:"استكشف عناصر الجدول الدوري وخصائصها", grades:[9,10,11,12], icon:"📊", bg:"linear-gradient(135deg,#001a2e,#002e47)", type:"periodic",   badge:"جديد"},
  // BIOLOGY
  {id:12, name:"الخلية الحية",               subject:"bio", desc:"استكشف مكونات الخلية النباتية والحيوانية بالنقر عليها", grades:[7,8,9,10,11], icon:"🔬", bg:"linear-gradient(135deg,#001a0d,#003318)", type:"cell",       badge:""},
  {id:13, name:"الانقسام الخلوي",            subject:"bio", desc:"شاهد مراحل الانقسام المتساوي (الميتوزا) خطوة بخطوة", grades:[9,10,11,12], icon:"🧬", bg:"linear-gradient(135deg,#001a00,#002e00)", type:"mitosis",    badge:"جديد"},
  {id:14, name:"الهضم والجهاز الهضمي",      subject:"bio", desc:"تتبع رحلة الطعام من الفم حتى الأمعاء", grades:[5,6,7,8,9], icon:"🫁", bg:"linear-gradient(135deg,#1a0a0a,#2e1515)", type:"digestion",  badge:"جديد"},
  {id:15, name:"الوراثة وقوانين مندل",       subject:"bio", desc:"حدد صفات الأب والأم وشاهد احتمالات صفات الأبناء", grades:[10,11,12], icon:"🧫", bg:"linear-gradient(135deg,#00001a,#00002e)", type:"genetics",   badge:"جديد"},
  {id:16, name:"البناء الضوئي",              subject:"bio", desc:"كيف تحوّل النباتات ضوء الشمس إلى طعام؟", grades:[7,8,9,10], icon:"🌿", bg:"linear-gradient(135deg,#002200,#003a00)", type:"photosyn",   badge:"جديد"},
  // EARTH
  {id:17, name:"طبقات الأرض",               subject:"earth", desc:"قطاع تشريحي تفاعلي لباطن الأرض بالأعماق والحرارة", grades:[7,8,9,10], icon:"🌍", bg:"linear-gradient(135deg,#1a0a00,#2e1500)", type:"layers",     badge:""},
  {id:18, name:"النظام الشمسي",              subject:"earth", desc:"حركة الكواكب بسرعات حقيقية نسبية مع معلومات تفصيلية", grades:[4,5,6,7,8], icon:"🪐", bg:"linear-gradient(135deg,#000010,#000a20)", type:"solar",      badge:""},
  {id:19, name:"الزلازل وقياسها",            subject:"earth", desc:"كيف تنشأ الزلازل وكيف يعمل مقياس ريختر", grades:[7,8,9,10,11], icon:"📳", bg:"linear-gradient(135deg,#1a0a00,#2e1a00)", type:"earthquake", badge:"جديد"},
  // MATH
  {id:20, name:"جدول الضرب المرئي",          subject:"math", desc:"تعلّم الضرب بشبكة نقاط ملوّنة تفاعلية", grades:[2,3,4,5], icon:"✖️", bg:"linear-gradient(135deg,#001a1a,#002e2e)", type:"multiplication", badge:""},
  {id:21, name:"الأشكال الهندسية",           subject:"math", desc:"6 أشكال مع حساب المساحة والمحيط تلقائياً", grades:[1,2,3,4,5], icon:"📐", bg:"linear-gradient(135deg,#1a001a,#2e002e)", type:"shapes",     badge:""},
  {id:22, name:"الكسور والنسب",              subject:"math", desc:"افهم الكسور بياناً ومقارنةً بطريقة بصرية", grades:[3,4,5,6,7], icon:"½", bg:"linear-gradient(135deg,#001a0d,#002e18)", type:"fractions",  badge:"جديد"},
  {id:23, name:"الاحتمالات",                subject:"math", desc:"نرد وعملة — جرّب قانون الأعداد الكبيرة", grades:[8,9,10,11,12], icon:"🎲", bg:"linear-gradient(135deg,#1a1200,#2e1f00)", type:"probability", badge:"جديد"},
  {id:24, name:"رسم الدوال والمعادلات",      subject:"math", desc:"ارسم أي دالة رياضية واستكشف شكلها البياني", grades:[8,9,10,11,12], icon:"📈", bg:"linear-gradient(135deg,#001a2e,#002e47)", type:"graphing",   badge:"جديد"},
  {id:25, name:"المتتاليات والأنماط",        subject:"math", desc:"اكتشف أنماط فيبوناتشي والمتتاليات الحسابية والهندسية", grades:[6,7,8,9,10], icon:"🔢", bg:"linear-gradient(135deg,#1a0a1a,#2e1530)", type:"sequences",  badge:"جديد"},
  // PROGRAMMING
  {id:26, name:"تعلّم البرمجة — الحلقات",   subject:"prog", desc:"شاهد كيف تعمل حلقة for بصرياً خطوة بخطوة", grades:[7,8,9,10,11,12], icon:"💻", bg:"linear-gradient(135deg,#001a0a,#002e14)", type:"loops",      badge:"جديد"},
  {id:27, name:"الخوارزميات وترتيب البيانات",subject:"prog", desc:"شاهد خوارزمية الفرز بصرياً — Bubble Sort", grades:[9,10,11,12], icon:"🔀", bg:"linear-gradient(135deg,#0a001a,#14002e)", type:"sorting",    badge:"جديد"},
  {id:28, name:"البيانات الثنائية (Binary)", subject:"prog", desc:"حوّل الأرقام من عشري إلى ثنائي بصرياً", grades:[8,9,10,11,12], icon:"01", bg:"linear-gradient(135deg,#001a1a,#002e2a)", type:"binary",     badge:"جديد"},
];

let currentRole="student", currentFilter="all", currentGrade="all", searchQ="";
let animFrame=null;

function renderCards(){
  let list=experiments.filter(e=>{
    if(currentFilter!=="all"&&e.subject!==currentFilter)return false;
    if(currentGrade!=="all"&&!e.grades.includes(+currentGrade))return false;
    if(searchQ&&!e.name.includes(searchQ)&&!e.desc.includes(searchQ))return false;
    return true;
  });
  const g=document.getElementById("simsGrid");
  if(!list.length){g.innerHTML='<div style="text-align:center;padding:60px;color:#888;grid-column:1/-1;">لا توجد نتائج</div>';return;}
  g.innerHTML=list.map(e=>`
    <div class="card">

function mkCanvas(id,h){
  const c=document.getElementById(id);
  c.width=c.parentElement.offsetWidth||600; c.height=h;

}

function buildDensity(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">⚖️ تجربة الكثافة والطفو</div>
  <div class="sim-layout">
    <div class="sim-canvas-box" style="height:340px"><canvas id="dC" height="330"></canvas></div>
    <div class="sim-panel">
      <div class="ctrl-box">
        <div style="font-weight:700;margin-bottom:10px;color:#e2e8f0">اختر المادة:</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          ${[["حديد","⚙️",7.87,"#8892a4"],["خشب","🪵",0.6,"#8B5E3C"],["صابون","🧼",0.85,"#f4d03f"],["ماء","💧",1.0,"#3b82f6"],["زيت","🛢️",0.92,"#f59e0b"],["نحاس","🔶",8.96,"#cd7f32"],["جليد","🧊",0.92,"#a5f3fc"],["ذهب","🥇",19.3,"#FFD700"]].map(([n,ic,d,c])=>
            `<button class="sbtn" style="text-align:right;padding:9px;font-size:0.78rem" onclick="dSet(${d},'${n}','${ic}','${c}')">${ic} ${n}<br><small style="opacity:.7">${d}</small></button>`).join("")}
        </div>
      </div>
      <div class="ctrl-box">
        <div class="ctrl-lbl">الحجم <span id="dVolLbl">1.0 L</span></div>
        <input type="range" id="dVol" min="0.5" max="3" step="0.1" value="1" oninput="dUpdate()">
      </div>
      <div class="info-row">
        <div class="ibox"><div class="v" id="dMV">7.87</div><div class="l">الكتلة kg</div></div>
        <div class="ibox"><div class="v" id="dVV">1.0</div><div class="l">الحجم L</div></div>
        <div class="ibox"><div class="v" id="dDV">7.87</div><div class="l">الكثافة</div></div>
      </div>
      <div id="dRes" class="info-card" style="text-align:center;font-size:1rem;font-weight:700"></div>
    </div>
  </div></div>`;
  const c=mkCanvas("dC",330), ctx=c.getContext("2d");
  let den=7.87,name="حديد",icon="⚙️",col="#8892a4",vol=1,oy=50,ovy=0;
  window.dSet=(d,n,i,co)=>{den=d;name=n;icon=i;col=co;dUpdate();};
  window.dUpdate=()=>{
    vol=parseFloat(document.getElementById("dVol").value);
    document.getElementById("dVolLbl").textContent=vol.toFixed(1)+" L";
    const m=(den*vol).toFixed(2);
    document.getElementById("dMV").textContent=m;
    document.getElementById("dVV").textContent=vol.toFixed(1);
    document.getElementById("dDV").textContent=den.toFixed(2);
    const r=document.getElementById("dRes");
    if(den>1){r.innerHTML="⬇️ يغرق — كثافته أكبر من الماء";r.style.color="#ef4444";}
    else if(den<1){r.innerHTML="⬆️ يطفو — كثافته أصغر من الماء";r.style.color="#10b981";}
    else{r.innerHTML="⚖️ يتوازن — نفس كثافة الماء";r.style.color="#f59e0b";}
  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);
    const wY=H*0.45;
    // sky
    ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,wY);
    // water
    const wg=ctx.createLinearGradient(0,wY,0,H);
    wg.addColorStop(0,"rgba(37,99,235,0.65)");wg.addColorStop(1,"rgba(29,78,216,0.9)");
    ctx.fillStyle=wg;ctx.fillRect(0,wY,W,H-wY);
    // water surface
    ctx.strokeStyle="rgba(147,197,253,0.5)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,wY);ctx.lineTo(W,wY);ctx.stroke();
    ctx.fillStyle="rgba(147,197,253,0.5)";ctx.font="11px Cairo";
    ctx.fillText("ماء — كثافة = 1.00 kg/L",10,wY+16);
    // target
    const sz=Math.max(30,Math.min(70,vol*40));
    const tgt=den>1?H-sz-15:den<1?wY-sz*0.35:wY-sz*0.5;
    ovy=(tgt-oy)*0.07;oy+=ovy;
    // shadow
    ctx.fillStyle="rgba(0,0,0,0.2)";ctx.beginPath();
    ctx.ellipse(W/2,Math.min(oy+sz+4,H-6),sz*0.45,5,0,0,Math.PI*2);ctx.fill();
    // object
    const og=ctx.createRadialGradient(W/2-sz*0.2,oy+sz*0.2,2,W/2,oy+sz/2,sz);
    og.addColorStop(0,"rgba(255,255,255,0.7)");og.addColorStop(0.4,col);og.addColorStop(1,"#0f172a");
    ctx.fillStyle=og;ctx.beginPath();ctx.roundRect(W/2-sz/2,oy,sz,sz,8);ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.25)";ctx.lineWidth=1.5;ctx.stroke();
    ctx.font=`${sz*0.55}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(icon,W/2,oy+sz/2);
    ctx.textAlign="start";ctx.textBaseline="alphabetic";
    // formula
    ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="12px Cairo";
    ctx.fillText("ρ = m/V = "+(den*vol/vol).toFixed(2)+" kg/L",10,22);
    animFrame=requestAnimationFrame(draw);
  }
  dUpdate();draw();
}

/* ══════════════════════════════════════════════
   2. PROJECTILE
══════════════════════════════════════════════ */
function buildProjectile(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🎯 حركة المقذوفات</div>
  <div class="sim-canvas-box" style="height:320px"><canvas id="pjC" height="310"></canvas></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px">
    <div class="ctrl-box">
      <div class="ctrl-lbl">الزاوية θ <span id="pjAL">45°</span></div>
      <input type="range" id="pjA" min="1" max="89" value="45" oninput="pjCalc()">
    </div>
    <div class="ctrl-box">
      <div class="ctrl-lbl">السرعة v₀ <span id="pjSL">25 م/ث</span></div>
      <input type="range" id="pjS" min="5" max="60" value="25" oninput="pjCalc()">
    </div>
    <div class="ctrl-box">
      <div class="ctrl-lbl">الجاذبية g <span id="pjGL">9.8 م/ث²</span></div>
      <input type="range" id="pjG" min="1" max="25" step="0.1" value="9.8" oninput="pjCalc()">
    </div>
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="pjR">—</div><div class="l">المدى (م)</div></div>
    <div class="ibox"><div class="v" id="pjH">—</div><div class="l">الارتفاع (م)</div></div>
    <div class="ibox"><div class="v" id="pjT">—</div><div class="l">الزمن (ث)</div></div>
    <div class="ibox"><div class="v" id="pjVx">—</div><div class="l">Vx (م/ث)</div></div>
    <div class="ibox"><div class="v" id="pjVy">—</div><div class="l">Vy (م/ث)</div></div>
  </div>
  <div class="sbtn-row">
    <button class="sbtn on" onclick="pjLaunch()">🚀 إطلاق</button>
    <button class="sbtn red" onclick="pjReset()">↺ إعادة</button>
  </div></div>`;
  const c=mkCanvas("pjC",310),ctx=c.getContext("2d");
  let launched=false,t=0,trail=[],vx,vy,range,maxH,totalT,g2=9.8;
  window.pjCalc=()=>{
    const a=+document.getElementById("pjA").value,s=+document.getElementById("pjS").value;
    g2=+document.getElementById("pjGL").value;
    document.getElementById("pjAL").textContent=a+"°";
    document.getElementById("pjSL").textContent=s+" م/ث";
    document.getElementById("pjGL").textContent=g2+" م/ث²";
    const r=a*Math.PI/180;vx=s*Math.cos(r);vy=s*Math.sin(r);
    totalT=2*vy/g2;range=vx*totalT;maxH=vy*vy/(2*g2);
    document.getElementById("pjR").textContent=range.toFixed(1);
    document.getElementById("pjH").textContent=maxH.toFixed(1);
    document.getElementById("pjT").textContent=totalT.toFixed(2);
    document.getElementById("pjVx").textContent=vx.toFixed(1);
    document.getElementById("pjVy").textContent=vy.toFixed(1);
    launched=false;t=0;trail=[];
  };
  window.pjLaunch=()=>{pjCalc();launched=true;t=0;trail=[];};
  window.pjReset=()=>{launched=false;t=0;trail=[];};
  function w2c(x,y){
    const W=c.width,H=c.height,pd=45;
    return[pd+(x/range)*(W-pd*2), H-pd-(y/(maxH||1))*(H-pd*1.5)];
  }
  function draw(){
    const W=c.width,H=c.height,pd=45;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle="#166534";ctx.fillRect(pd,H-pd,W-pd*2,5);
    // grid
    ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;
    for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(pd,pd+(H-pd*2)*i/5);ctx.lineTo(W-pd,pd+(H-pd*2)*i/5);ctx.stroke();}
    // preview path
    ctx.setLineDash([4,8]);ctx.strokeStyle="rgba(255,152,0,0.2)";ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let tt=0;tt<=totalT;tt+=0.05){
      const[px,py]=w2c(vx*tt,vy*tt-0.5*g2*tt*tt);
      tt===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();ctx.setLineDash([]);
    // trail
    for(let i=1;i<trail.length;i++){
      ctx.strokeStyle=`rgba(255,152,0,${i/trail.length})`;
      ctx.lineWidth=1.5+i/trail.length*2;
      ctx.beginPath();ctx.moveTo(trail[i-1][0],trail[i-1][1]);ctx.lineTo(trail[i][0],trail[i][1]);ctx.stroke();
    }
    // angle arrow
    const[ox,oy]=w2c(0,0);
    const ang=Math.atan2(vy,vx);
    ctx.strokeStyle="rgba(0,212,255,0.7)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+45*Math.cos(ang),oy-45*Math.sin(ang));ctx.stroke();
    // ball
    let bx=ox,by=oy;
    if(launched&&t<=totalT){
      [bx,by]=w2c(vx*t,vy*t-0.5*g2*t*t);
      trail.push([bx,by]);if(trail.length>90)trail.shift();
      t+=0.04;
    }else if(launched&&t>totalT){launched=false;}
    const bg=ctx.createRadialGradient(bx,by,0,bx,by,14);
    bg.addColorStop(0,"rgba(255,152,0,0.9)");bg.addColorStop(1,"transparent");
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bx,by,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#ff9800";ctx.beginPath();ctx.arc(bx,by,7,0,Math.PI*2);ctx.fill();
    animFrame=requestAnimationFrame(draw);
  }
  pjCalc();draw();
}

/* ══════════════════════════════════════════════
   3. WAVES
══════════════════════════════════════════════ */
function buildWaves(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">〰️ الموجات الميكانيكية</div>
  <div class="sim-canvas-box" style="height:240px"><canvas id="wvC" height="230"></canvas></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
    <div class="ctrl-box">
      <div class="ctrl-lbl">التردد f <span id="wvFL">2 Hz</span></div>
      <input type="range" id="wvF" min="0.5" max="8" step="0.5" value="2" oninput="wvUpdate()">
    </div>
    <div class="ctrl-box">
      <div class="ctrl-lbl">السعة A <span id="wvAL">40</span></div>
      <input type="range" id="wvA" min="10" max="90" value="40" oninput="wvUpdate()">
    </div>
  </div>
  <div class="sbtn-row">
    <button class="sbtn on" id="wvTyp" onclick="wvToggle()">موجة عرضية</button>
    <button class="sbtn" onclick="wvAddWave()">+ أضف موجة</button>
    <button class="sbtn red" onclick="wvClearExtra()">مسح</button>
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="wvFI">2</div><div class="l">التردد (Hz)</div></div>
    <div class="ibox"><div class="v" id="wvTI">0.5</div><div class="l">الدور (ث)</div></div>
    <div class="ibox"><div class="v" id="wvLI">150</div><div class="l">λ النسبي</div></div>
    <div class="ibox"><div class="v" id="wvSI">300</div><div class="l">السرعة</div></div>
  </div></div>`;
  const c=mkCanvas("wvC",230),ctx=c.getContext("2d");
  let freq=2,amp=40,phase=0,wtype="t",extra=[];
  const colors=["#ff9800","#00d4ff","#10b981","#f43f5e","#a78bfa"];
  window.wvUpdate=()=>{
    freq=parseFloat(document.getElementById("wvF").value);
    amp=parseInt(document.getElementById("wvA").value);
    document.getElementById("wvFL").textContent=freq+" Hz";
    document.getElementById("wvAL").textContent=amp;
    document.getElementById("wvFI").textContent=freq;
    document.getElementById("wvTI").textContent=(1/freq).toFixed(2);
    document.getElementById("wvLI").textContent=Math.round(300/freq);
    document.getElementById("wvSI").textContent=300;
  };
  window.wvToggle=()=>{wtype=wtype==="t"?"l":"t";document.getElementById("wvTyp").textContent=wtype==="t"?"موجة عرضية":"موجة طولية";};
  window.wvAddWave=()=>{if(extra.length<3)extra.push({f:freq+0.5,a:amp*0.7,ph:phase});};
  window.wvClearExtra=()=>{extra=[];};
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    ctx.strokeStyle="rgba(255,255,255,0.07)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    if(wtype==="t"){
      [[freq,amp,phase,0],...extra.map((e,i)=>[e.f,e.a,e.ph,i+1])].forEach(([f,a,ph,ci])=>{
        ctx.shadowColor=colors[ci];ctx.shadowBlur=ci===0?12:6;
        ctx.strokeStyle=colors[ci];ctx.lineWidth=ci===0?3:1.5;
        ctx.beginPath();
        for(let x=0;x<=W;x++){ctx.lineTo(x,H/2+a*Math.sin(2*Math.PI*f*x/W-ph));}
        ctx.stroke();ctx.shadowBlur=0;
      });
      // particles
      for(let j=0;j<10;j++){
        const px=(j/10)*W;
        const py=H/2+amp*Math.sin(2*Math.PI*freq*px/W-phase);
        ctx.fillStyle="#ff9800";ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
      }
    }else{
      for(let i=0;i<Math.round(freq*6);i++){
        const x=((i/(freq*6))*W+(phase*40))%W;
        const d=0.5+0.5*Math.sin(2*Math.PI*i/(freq*6));
        const bw=W/(freq*6);
        const gg=ctx.createLinearGradient(x,0,x+bw,0);
        gg.addColorStop(0,"rgba(255,152,0,0)");gg.addColorStop(0.5,`rgba(255,152,0,${d*0.6})`);gg.addColorStop(1,"rgba(255,152,0,0)");
        ctx.fillStyle=gg;ctx.fillRect(x,H*0.2,bw,H*0.6);
      }
      ctx.fillStyle="rgba(255,152,0,0.6)";ctx.font="12px Cairo";ctx.fillText("تضاغط ← → تخلخل",10,20);
    }
    phase+=0.04*freq;
    extra.forEach(e=>e.ph+=0.04*e.f);
    animFrame=requestAnimationFrame(draw);
  }
  wvUpdate();draw();
}

/* ══════════════════════════════════════════════
   4. CIRCUIT
══════════════════════════════════════════════ */
function buildCircuit(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">⚡ الدوائر الكهربائية</div>
  <div class="sim-layout">
    <div class="sim-canvas-box" style="height:300px"><canvas id="ciC" height="290"></canvas></div>
    <div class="sim-panel">
      <div class="ctrl-box">
        <div class="ctrl-lbl">الجهد V <span id="ciVL">9 V</span></div>
        <input type="range" id="ciV" min="1" max="24" value="9" oninput="ciUpdate()">
        <div class="ctrl-lbl" style="margin-top:10px">المقاومة R <span id="ciRL">100 Ω</span></div>
        <input type="range" id="ciR" min="10" max="1000" step="10" value="100" oninput="ciUpdate()">
      </div>
      <div class="info-row">
        <div class="ibox"><div class="v" id="ciVI">9</div><div class="l">V (فولت)</div></div>
        <div class="ibox"><div class="v" id="ciRI">100</div><div class="l">R (أوم)</div></div>
        <div class="ibox"><div class="v" id="ciII">0.09</div><div class="l">I (أمبير)</div></div>
        <div class="ibox"><div class="v" id="ciPI">0.81</div><div class="l">P (واط)</div></div>
      </div>
      <div class="sbtn-row">
        <button class="sbtn on" id="ciModeBtn" onclick="ciToggleMode()">مباشر</button>
        <button class="sbtn" onclick="ciAddBulb()">+ مصباح</button>
      </div>
      <div class="info-card">V = I × R<br>P = V × I<br><b>I = V/R = </b><span id="ciFormRes">0.09</span> A</div>
    </div>
  </div></div>`;
  const c=mkCanvas("ciC",290),ctx=c.getContext("2d");
  let V=9,R=100,mode="s",electrons=[],bulbs=1;
  for(let i=0;i<16;i++)electrons.push({t:i/16,speed:0});
  window.ciUpdate=()=>{
    V=+document.getElementById("ciV").value;R=+document.getElementById("ciR").value;
    document.getElementById("ciVL").textContent=V+" V";document.getElementById("ciRL").textContent=R+" Ω";
    const I=V/R,P=V*I;
    document.getElementById("ciVI").textContent=V;document.getElementById("ciRI").textContent=R;
    document.getElementById("ciII").textContent=I.toFixed(3);document.getElementById("ciPI").textContent=P.toFixed(2);
    document.getElementById("ciFormRes").textContent=I.toFixed(3);
    electrons.forEach(e=>e.speed=I);
  };
  window.ciToggleMode=()=>{mode=mode==="s"?"p":"s";document.getElementById("ciModeBtn").textContent=mode==="s"?"مباشر":"متوازي";};
  window.ciAddBulb=()=>{bulbs=bulbs<3?bulbs+1:1;};
  function draw(){
    const W=c.width,H=c.height,cx=W/2,cy=H/2;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    const I=V/R,bright=Math.min(I/0.09,1);
    const rw=W*0.36,rh=H*0.36;
    const path=[[cx-rw,cy-rh],[cx+rw,cy-rh],[cx+rw,cy+rh],[cx-rw,cy+rh]];
    // wire
    ctx.strokeStyle="#334155";ctx.lineWidth=4;
    ctx.beginPath();path.forEach(([x,y])=>ctx.lineTo(x,y));ctx.closePath();ctx.stroke();
    // battery
    const bx=cx-rw;
    ctx.strokeStyle="#10b981";ctx.lineWidth=3;
    [[bx-8,cy-15],[bx+8,cy-15]].forEach(([x1,x2])=>{ctx.beginPath();ctx.moveTo(x1,cy-15);ctx.lineTo(x2,cy-15);ctx.lineWidth=4;ctx.stroke();});
    ctx.beginPath();ctx.moveTo(bx-4,cy+15);ctx.lineTo(bx+4,cy+15);ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle="#10b981";ctx.font="bold 12px Cairo";ctx.fillText(V+"V",bx+13,cy+5);
    // resistor
    const rx2=cx+rw;
    ctx.strokeStyle="#f59e0b";ctx.lineWidth=2;
    ctx.strokeRect(rx2-12,cy-40,24,80);
    ctx.fillStyle="#f59e0b";ctx.font="bold 11px Cairo";ctx.fillText(R+"Ω",rx2+14,cy+4);
    // bulbs on top
    for(let b=0;b<bulbs;b++){
      const bx2=cx-rw+(b+1)*rw*2/(bulbs+1),by=cy-rh;
      const bG=ctx.createRadialGradient(bx2,by,0,bx2,by,22);
      bG.addColorStop(0,`rgba(255,220,60,${bright*0.95})`);
      bG.addColorStop(0.5,`rgba(255,150,0,${bright*0.5})`);
      bG.addColorStop(1,"transparent");
      ctx.fillStyle=bG;ctx.beginPath();ctx.arc(bx2,by,22,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(255,220,60,${0.2+bright*0.8})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bx2,by,10,0,Math.PI*2);ctx.stroke();
      ctx.font="16px serif";ctx.textAlign="center";ctx.fillText("💡",bx2,by+5);ctx.textAlign="start";
    }
    // electrons
    electrons.forEach(e=>{
      e.t=(e.t+(I*0.004))%1;
      const seg=Math.floor(e.t*4),st=(e.t*4)%1;
      const s=Math.min(seg,3);
      const ex=path[s][0]+(path[(s+1)%4][0]-path[s][0])*st;
      const ey=path[s][1]+(path[(s+1)%4][1]-path[s][1])*st;
      ctx.fillStyle="rgba(0,212,255,0.9)";ctx.beginPath();ctx.arc(ex,ey,3.5,0,Math.PI*2);ctx.fill();
    });
    animFrame=requestAnimationFrame(draw);
  }
  ciUpdate();draw();
}

/* ══════════════════════════════════════════════
   5. NEWTON
══════════════════════════════════════════════ */
function buildNewton(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🏃 قانون نيوتن — F = ma</div>
  <div class="sim-canvas-box" style="height:260px"><canvas id="ntC" height="250"></canvas></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px">
    <div class="ctrl-box">
      <div class="ctrl-lbl">القوة F <span id="ntFL">50 N</span></div>
      <input type="range" id="ntF" min="0" max="200" value="50" oninput="ntUpdate()">
    </div>
    <div class="ctrl-box">
      <div class="ctrl-lbl">الكتلة m <span id="ntML">5 kg</span></div>
      <input type="range" id="ntM" min="1" max="50" value="5" oninput="ntUpdate()">
    </div>
    <div class="ctrl-box">
      <div class="ctrl-lbl">الاحتكاك μ <span id="ntFrL">0.1</span></div>
      <input type="range" id="ntFr" min="0" max="0.8" step="0.05" value="0.1" oninput="ntUpdate()">
    </div>
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="ntAI">9.0</div><div class="l">العجلة م/ث²</div></div>
    <div class="ibox"><div class="v" id="ntVI">0</div><div class="l">السرعة م/ث</div></div>
    <div class="ibox"><div class="v" id="ntXI">0</div><div class="l">الإزاحة م</div></div>
    <div class="ibox"><div class="v" id="ntFfI">4.9</div><div class="l">الاحتكاك N</div></div>
  </div>
  <div class="sbtn-row">
    <button class="sbtn on" onclick="ntStart()">▶ تشغيل</button>
    <button class="sbtn red" onclick="ntReset()">↺ إعادة</button>
  </div></div>`;
  const c=mkCanvas("ntC",250),ctx=c.getContext("2d");
  let F=50,m=5,fr=0.1,vv=0,xx=0,running=false,dt=0.05;
  window.ntUpdate=()=>{
    F=+document.getElementById("ntF").value;m=+document.getElementById("ntM").value;fr=+document.getElementById("ntFr").value;
    document.getElementById("ntFL").textContent=F+" N";document.getElementById("ntML").textContent=m+" kg";document.getElementById("ntFrL").textContent=fr;
    const Ff=fr*m*9.8,a=(F-Ff)/m;
    document.getElementById("ntAI").textContent=Math.max(a,0).toFixed(2);document.getElementById("ntFfI").textContent=Ff.toFixed(1);
  };
  window.ntStart=()=>{running=true;};
  window.ntReset=()=>{running=false;vv=0;xx=0;document.getElementById("ntVI").textContent=0;document.getElementById("ntXI").textContent=0;};
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle="#1e3a5f";ctx.fillRect(0,H*0.72,W,H*0.28);
    ctx.strokeStyle="#2a5298";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,H*0.72);ctx.lineTo(W,H*0.72);ctx.stroke();
    // grid
    for(let xi=0;xi<W;xi+=60){ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xi,0);ctx.lineTo(xi,H);ctx.stroke();}
    if(running){
      const Ff=fr*m*9.8,a=Math.max((F-Ff)/m,0);
      vv+=a*dt;xx+=vv*dt;
      document.getElementById("ntVI").textContent=vv.toFixed(1);
      document.getElementById("ntXI").textContent=xx.toFixed(1);
      if(xx>W*0.8/30){xx=0;vv=0;}
    }
    // box
    const bx=60+xx*30,by=H*0.72-55,bs=50;
    const bg=ctx.createLinearGradient(bx,by,bx+bs,by+bs);
    bg.addColorStop(0,"#2a5298");bg.addColorStop(1,"#1e3c72");
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(bx,by,bs,bs,6);ctx.fill();
    ctx.strokeStyle="rgba(255,152,0,0.6)";ctx.lineWidth=2;ctx.stroke();
    ctx.font="24px serif";ctx.textAlign="center";ctx.fillText("📦",bx+bs/2,by+bs/2+8);ctx.textAlign="start";
    // force arrow
    if(F>0){
      const al=Math.min(F*0.8,120);
      ctx.strokeStyle="#ff9800";ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(bx+bs,by+bs/2);ctx.lineTo(bx+bs+al,by+bs/2);ctx.stroke();
      ctx.fillStyle="#ff9800";ctx.beginPath();ctx.moveTo(bx+bs+al,by+bs/2-7);ctx.lineTo(bx+bs+al+14,by+bs/2);ctx.lineTo(bx+bs+al,by+bs/2+7);ctx.fill();
      ctx.font="11px Cairo";ctx.fillText("F="+F+"N",bx+bs+al/2-10,by+bs/2-10);
    }
    // friction arrow
    const Ff2=fr*m*9.8;
    if(Ff2>0&&vv>0){
      ctx.strokeStyle="#ef4444";ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx,by+bs/2);ctx.lineTo(bx-Ff2*1.5,by+bs/2);ctx.stroke();
      ctx.font="10px Cairo";ctx.fillStyle="#ef4444";ctx.fillText("Ff",bx-25,by+bs/2-8);
    }
    // velocity indicator
    ctx.fillStyle="rgba(16,185,129,0.8)";ctx.font="bold 12px Cairo";
    ctx.fillText("v="+vv.toFixed(1)+" م/ث",10,20);
    animFrame=requestAnimationFrame(draw);
  }
  ntUpdate();draw();
}

/* ══════════════════════════════════════════════
   6. MAGNETIC FIELD
══════════════════════════════════════════════ */
function buildMagnetic(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🧲 الحقل المغناطيسي</div>
  <div class="sim-canvas-box" style="height:340px"><canvas id="mgC" height="330"></canvas></div>
  <div class="sbtn-row" style="margin-top:14px">
    <button class="sbtn on" id="mgTypeBtn" onclick="mgToggle()">مغناطيس قضيبي</button>
    <button class="sbtn" onclick="mgAddMagnet()">+ مغناطيس آخر</button>
    <button class="sbtn red" onclick="mgReset()">مسح</button>
  </div>
  <div class="info-card" style="margin-top:10px">خطوط الحقل تخرج من القطب الشمالي (N) وتدخل القطب الجنوبي (S). كثافة الخطوط تعكس شدة الحقل.</div>
  </div>`;
  const c=mkCanvas("mgC",330),ctx=c.getContext("2d");
  let mtype="bar",magnets=[{x:0.5,y:0.5,pole:1}],dragging=null;
  window.mgToggle=()=>{mtype=mtype==="bar"?"circular":"bar";document.getElementById("mgTypeBtn").textContent=mtype==="bar"?"مغناطيس قضيبي":"ملف دائري";};
  window.mgAddMagnet=()=>{if(magnets.length<3)magnets.push({x:0.3+Math.random()*0.4,y:0.3+Math.random()*0.4,pole:-1});};
  window.mgReset=()=>{magnets=[{x:0.5,y:0.5,pole:1}];};
  c.addEventListener("mousedown",e=>{
    const r=c.getBoundingClientRect(),mx=(e.clientX-r.left)/c.width,my=(e.clientY-r.top)/c.height;
    magnets.forEach((m,i)=>{if(Math.hypot(mx-m.x,my-m.y)<0.06)dragging=i;});
  });
  c.addEventListener("mousemove",e=>{if(dragging!==null){const r=c.getBoundingClientRect();magnets[dragging].x=(e.clientX-r.left)/c.width;magnets[dragging].y=(e.clientY-r.top)/c.height;}});
  c.addEventListener("mouseup",()=>dragging=null);
  function fieldAt(px,py){
    let bx=0,by=0;
    magnets.forEach(m=>{
      const dx=px-m.x*c.width,dy=py-m.y*c.height;
      const r2=dx*dx+dy*dy+1;
      bx+=m.pole*dx/Math.pow(r2,1.5)*5e7;by+=m.pole*dy/Math.pow(r2,1.5)*5e7;
      bx-=m.pole*(-dx)/Math.pow(r2,1.5)*5e7;by-=m.pole*(-dy)/Math.pow(r2,1.5)*5e7;
    });
    return[bx,by];
  }
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    // field lines
    const step=30;
    for(let row=0;row<H;row+=step){
      for(let col=0;col<W;col+=step){
        const[bx,by]=fieldAt(col,row);
        const mag=Math.sqrt(bx*bx+by*by);
        if(mag<0.01)continue;
        const nx=bx/mag,ny=by/mag;
        const strength=Math.min(mag/50,1);
        ctx.strokeStyle=`rgba(255,152,0,${0.15+strength*0.5})`;
        ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(col,row);ctx.lineTo(col+nx*12,row+ny*12);ctx.stroke();
        // arrow
        ctx.fillStyle=`rgba(255,152,0,${0.15+strength*0.5})`;
        const ax=col+nx*12,ay=row+ny*12;
        ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-nx*5+ny*3,ay-ny*5-nx*3);ctx.lineTo(ax-nx*5-ny*3,ay-ny*5+nx*3);ctx.fill();
      }
    }
    // magnets
    magnets.forEach(m=>{
      const mx=m.x*W,my=m.y*H;
      if(mtype==="bar"){
        ctx.fillStyle=m.pole>0?"#dc2626":"#2563eb";ctx.beginPath();ctx.roundRect(mx-30,my-12,30,24,4);ctx.fill();
        ctx.fillStyle="white";ctx.font="bold 11px Cairo";ctx.textAlign="center";ctx.fillText(m.pole>0?"N":"S",mx-15,my+4);
        ctx.fillStyle=m.pole>0?"#2563eb":"#dc2626";ctx.beginPath();ctx.roundRect(mx,my-12,30,24,4);ctx.fill();
        ctx.fillStyle="white";ctx.fillText(m.pole>0?"S":"N",mx+15,my+4);ctx.textAlign="start";
      }else{
        ctx.strokeStyle=m.pole>0?"#ff9800":"#3b82f6";ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(mx,my,22,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=m.pole>0?"#ff9800":"#3b82f6";ctx.font="bold 13px Cairo";ctx.textAlign="center";
        ctx.fillText(m.pole>0?"N":"S",mx,my+4);ctx.textAlign="start";
      }
    });
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

/* ══════════════════════════════════════════════
   7. HEAT
══════════════════════════════════════════════ */
function buildHeat(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🌡️ انتقال الحرارة</div>
  <div class="sim-canvas-box" style="height:280px"><canvas id="htC" height="270"></canvas></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
    <div class="ctrl-box">
      <div class="ctrl-lbl">درجة حرارة المصدر <span id="htTL">400°</span></div>
      <input type="range" id="htT" min="100" max="1000" value="400" oninput="htUpdate()">
    </div>
    <div class="ctrl-box">
      <div class="ctrl-lbl">الموصلية k <span id="htKL">متوسطة</span></div>
      <input type="range" id="htK" min="1" max="5" value="3" oninput="htUpdate()">
    </div>
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="htH">400</div><div class="l">T الساخن °</div></div>
    <div class="ibox"><div class="v" id="htM">25</div><div class="l">T المنتصف °</div></div>
    <div class="ibox"><div class="v" id="htC2">25</div><div class="l">T البارد °</div></div>
  </div></div>`;
  const c=mkCanvas("htC",270),ctx=c.getContext("2d");
  let Th=400,k=3,t=0;
  window.htUpdate=()=>{
    Th=+document.getElementById("htT").value;k=+document.getElementById("htK").value;
    document.getElementById("htTL").textContent=Th+"°";
    const klbl=["","منخفضة","منخفضة","متوسطة","عالية","عالية جداً"][k];
    document.getElementById("htKL").textContent=klbl;
  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    t+=0.02;
    const Tc=25;
    // heat map along rod
    const rY=H*0.5,rH=30,rX=40,rW=W-80;
    for(let i=0;i<=rW;i++){
      const frac=i/rW;
      const T=Tc+(Th-Tc)*Math.exp(-k*frac*2);
      const heat=Math.min((T-Tc)/(Th-Tc),1);
      // temp to color: blue->yellow->red
      const r=Math.round(heat>0.5?(255):(heat*2*255));
      const g=Math.round(heat<0.5?heat*2*180:Math.max(0,(1-heat)*2*180));
      const b=Math.round(heat<0.5?(1-heat*2)*200:0);
      ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(rX+i,rY-rH/2,1,rH);
      // update display
      if(i===0)document.getElementById("htH").textContent=Math.round(T);
      if(i===Math.round(rW/2))document.getElementById("htM").textContent=Math.round(T);
      if(i===rW)document.getElementById("htC2").textContent=Math.round(Tc+5);
    }
    ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=2;
    ctx.strokeRect(rX,rY-rH/2,rW,rH);
    // particles moving
    for(let p=0;p<20;p++){
      const frac=(((p/20)+t*0.05*k)%1);
      const T2=Tc+(Th-Tc)*Math.exp(-k*frac*2);
      const ht2=Math.min((T2-Tc)/(Th-Tc),1);
      const px=rX+frac*rW;
      const py=rY+(Math.sin(t*2+p)*ht2*12);
      ctx.fillStyle=`rgba(255,${Math.round(255*(1-ht2))},0,0.7)`;
      ctx.beginPath();ctx.arc(px,py,ht2*4+1,0,Math.PI*2);ctx.fill();
    }
    // labels
    ctx.fillStyle="rgba(255,80,80,0.9)";ctx.font="bold 12px Cairo";ctx.fillText("🔥 ساخن",rX,rY+32);
    ctx.fillStyle="rgba(100,150,255,0.9)";ctx.fillText("❄️ بارد",rX+rW-45,rY+32);
    animFrame=requestAnimationFrame(draw);
  }
  htUpdate();draw();
}

/* ══════════════════════════════════════════════
   8. OPTICS
══════════════════════════════════════════════ */
function buildOptics(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🔦 الضوء والبصريات</div>
  <div class="sim-canvas-box" style="height:300px"><canvas id="opC" height="290"></canvas></div>
  <div class="sbtn-row" style="margin-top:14px">
    <button class="sbtn on" id="opTypeBtn" onclick="opSetType('reflection')">انعكاس</button>
    <button class="sbtn" id="opRefBtn" onclick="opSetType('refraction')">انكسار</button>
    <button class="sbtn" id="opLensBtn" onclick="opSetType('lens')">عدسة محدبة</button>
  </div>
  <div class="ctrl-box" style="margin-top:12px">
    <div class="ctrl-lbl">زاوية الشعاع <span id="opAnLbl">45°</span></div>
    <input type="range" id="opAn" min="5" max="85" value="45" oninput="opUpdate()">
  </div>
  <div class="info-card" style="margin-top:10px" id="opInfo">انعكاس: زاوية السقوط = زاوية الانعكاس</div>
  </div>`;
  const c=mkCanvas("opC",290),ctx=c.getContext("2d");
  let opType="reflection",angle=45;
  window.opSetType=(t)=>{
    opType=t;
    document.querySelectorAll("[id$=Btn]").forEach(b=>b.classList.remove("on"));
    document.getElementById("op"+t.charAt(0).toUpperCase()+t.slice(1)+"Btn")?.classList.add("on");
    const infos={reflection:"انعكاس: زاوية السقوط = زاوية الانعكاس",refraction:"انكسار: الضوء يتغير اتجاهه عند دخول وسط مختلف — قانون سنيل",lens:"العدسة المحدبة تجمع الأشعة في نقطة البؤرة F"};
    document.getElementById("opInfo").textContent=infos[t];
  };
  window.opUpdate=()=>{angle=+document.getElementById("opAn").value;document.getElementById("opAnLbl").textContent=angle+"°";};
  function draw(){
    const W=c.width,H=c.height,cx=W/2,cy=H/2;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    const rad=angle*Math.PI/180;
    if(opType==="reflection"){
      // mirror
      ctx.strokeStyle="rgba(147,197,253,0.6)";ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(cx,cy-100);ctx.lineTo(cx,cy+100);ctx.stroke();
      // normal
      ctx.setLineDash([5,8]);ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx-80,cy);ctx.lineTo(cx+80,cy);ctx.stroke();ctx.setLineDash([]);
      // incident
      ctx.strokeStyle="#ff9800";ctx.lineWidth=2;ctx.shadowColor="#ff9800";ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(cx-Math.cos(rad)*120,cy-Math.sin(rad)*120);ctx.lineTo(cx,cy);ctx.stroke();
      // reflected
      ctx.strokeStyle="#00d4ff";
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx-Math.cos(rad)*120,cy+Math.sin(rad)*120);ctx.stroke();
      ctx.shadowBlur=0;
      // angles
      ctx.fillStyle="rgba(255,152,0,0.8)";ctx.font="12px Cairo";
      ctx.fillText(angle+"°",cx-60,cy-20);
      ctx.fillStyle="rgba(0,212,255,0.8)";ctx.fillText(angle+"°",cx-60,cy+30);
    }else if(opType==="refraction"){
      // surface
      ctx.fillStyle="rgba(30,58,138,0.3)";ctx.fillRect(0,cy,W,cy);
      ctx.strokeStyle="rgba(147,197,253,0.5)";ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
      ctx.fillStyle="rgba(30,58,138,0.15)";ctx.fillText("n₂ = 1.5 (زجاج)",10,cy+20);
      ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fillText("n₁ = 1.0 (هواء)",10,cy-20);
      // normal
      ctx.setLineDash([5,8]);ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx,cy-100);ctx.lineTo(cx,cy+100);ctx.stroke();ctx.setLineDash([]);
      const refAngle=Math.asin(Math.sin(rad)/1.5);
      ctx.strokeStyle="#ff9800";ctx.lineWidth=2;ctx.shadowColor="#ff9800";ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(cx-Math.cos(Math.PI/2-rad)*120,cy-Math.sin(Math.PI/2-rad)*120);ctx.lineTo(cx,cy);ctx.stroke();
      ctx.strokeStyle="#00d4ff";
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.sin(refAngle)*100,cy+Math.cos(refAngle)*100);ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle="rgba(255,152,0,0.8)";ctx.font="12px Cairo";ctx.fillText("θ₁="+angle+"°",cx-55,cy-30);
      ctx.fillStyle="rgba(0,212,255,0.8)";ctx.fillText("θ₂="+Math.round(refAngle*180/Math.PI)+"°",cx+10,cy+40);
    }else{
      // lens
      ctx.strokeStyle="rgba(147,197,253,0.6)";ctx.lineWidth=3;
      ctx.beginPath();ctx.ellipse(cx,cy,15,80,0,0,Math.PI*2);ctx.stroke();
      const f=100;
      ctx.setLineDash([4,8]);ctx.strokeStyle="rgba(255,255,255,0.15)";

function buildPH(el){
  el.innerHTML=`<div class="sim-wrap">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          ${[["HCl قوي","🧴",1,"#ef4444"],["حمض خل","🍋",3,"#f97316"],["ليمون","🍊",4.5,"#fb923c"],["ماء مقطر","💧",7,"#3b82f6"],["صودا الخبز","🥛",8.3,"#8b5cf6"],["أمونيا","🧹",11,"#7c3aed"],["NaOH","🧪",13.5,"#6d28d9"]].map(([n,i,ph,c])=>
            `<button class="sbtn" style="text-align:right;padding:8px;font-size:0.78rem" onclick="phSet(${ph},'${c}')">${i} ${n}</button>`).join("")}
        </div>
        <div class="ctrl-lbl" style="margin-top:12px">ضبط يدوي <span id="phML">7</span></div>
        <input type="range" id="phR" min="0" max="14" step="0.1" value="7" oninput="phManual()">
      </div>
      <div class="ibox" style="text-align:center;padding:16px">
        <div class="v" id="phNum" style="font-size:2.5rem">7.0</div>
        <div class="l" id="phTyp">محايد</div>
      </div>
      <div class="info-card" id="phDesc">pH 7 = محايد<br>pH &lt; 7 = حمض<br>pH &gt; 7 = قاعدة</div>
    </div>
  </div></div>`;
  const c=mkCanvas("phC",310),ctx=c.getContext("2d");
  let phVal=7,phCol="#3b82f6",bubbles=[];
  for(let i=0;i<25;i++)bubbles.push({x:30+Math.random()*80,y:Math.random()*180,r:1.5+Math.random()*4,s:0.3+Math.random()*0.8});
  window.phSet=(ph,col)=>{phVal=ph;phCol=col;document.getElementById("phR").value=ph;phDisp(ph);};
  window.phManual=()=>{phVal=+document.getElementById("phR").value;phCol=phToCol(phVal);phDisp(phVal);};
  function phToCol(ph){
    if(ph<2)return"#ef4444";if(ph<5)return"#f97316";if(ph<7)return"#eab308";
    if(ph===7)return"#3b82f6";if(ph<10)return"#8b5cf6";return"#6d28d9";
  }
  function phDisp(ph){
    document.getElementById("phML").textContent=ph.toFixed(1);document.getElementById("phNum").textContent=ph.toFixed(1);
    document.getElementById("phNum").style.color=phToCol(ph);
    const desc=ph<2?"حمض قوي جداً ⚠️":ph<4?"حمض قوي":ph<7?"حمض خفيف":ph===7?"محايد 💧":ph<10?"قاعدة خفيفة":ph<12?"قاعدة قوية":"قاعدة قوية جداً ⚠️";
    document.getElementById("phTyp").textContent=desc;
  }
  function lerpHex(a,b,t){
    const r=c=>parseInt(c.slice(1,3),16);
    const ri=(c,i)=>parseInt(c.slice(i,i+2),16);
    return`rgb(${Math.round(ri(a,1)+(ri(b,1)-ri(a,1))*t)},${Math.round(ri(a,3)+(ri(b,3)-ri(a,3))*t)},${Math.round(ri(a,5)+(ri(b,5)-ri(a,5))*t)})`;
  }
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    const bx=W/2-50,by=40,bw=100,bh=200,liqH=bh*0.75;
    // liquid
    ctx.fillStyle=phCol+"99";ctx.beginPath();ctx.roundRect(bx+4,by+bh-liqH,bw-8,liqH,4);ctx.fill();
    // bubbles
    const intensity=Math.abs(7-phVal)/7;
    if(intensity>0.1){
      bubbles.forEach(b=>{
        b.y-=b.s*(0.5+intensity*3);
        if(b.y<by+bh-liqH)b.y=by+bh;
        ctx.strokeStyle=phCol;ctx.lineWidth=1;ctx.globalAlpha=0.4;
        ctx.beginPath();ctx.arc(bx+5+b.x,by+bh-liqH+b.y%liqH,b.r,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=1;
      });
    }
    // beaker
    ctx.strokeStyle="rgba(147,197,253,0.6)";ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by+bh);ctx.lineTo(bx+bw,by+bh);ctx.lineTo(bx+bw,by);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx-12,by);ctx.lineTo(bx+bw+12,by);ctx.stroke();
    // pH strip
    const sx=W-35,sy=by+10,sh=bh-20;
    const sg=ctx.createLinearGradient(sx,sy,sx,sy+sh);
    sg.addColorStop(0,"#ef4444");sg.addColorStop(0.2,"#f97316");sg.addColorStop(0.4,"#eab308");
    sg.addColorStop(0.5,"#22c55e");sg.addColorStop(0.65,"#3b82f6");sg.addColorStop(1,"#6d28d9");
    ctx.fillStyle=sg;ctx.fillRect(sx,sy,18,sh);
    const my=sy+(14-phVal)/14*sh;
    ctx.fillStyle="#fff";ctx.beginPath();ctx.moveTo(sx-8,my);ctx.lineTo(sx,my+5);ctx.lineTo(sx,my-5);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.8)";ctx.font="10px Cairo";ctx.fillText(phVal.toFixed(1),sx-32,my+3);
    ["0","7","14"].forEach((lbl,i)=>{ctx.fillStyle="rgba(255,255,255,0.4)";ctx.fillText(lbl,sx+22,sy+i*sh/2+4);});
    animFrame=requestAnimationFrame(draw);
  }
  phDisp(7);draw();
}

══════════════════════════════════════════════ */
function buildReactions(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">⚗️ التفاعلات الكيميائية</div>
  <div class="sim-canvas-box" style="height:280px"><canvas id="rxC" height="270"></canvas></div>
  <div style="margin-top:14px">
    <div style="font-weight:700;color:#e2e8f0;margin-bottom:10px">اختر التفاعل:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
      ${[["H₂ + O₂ → H₂O","تكوين الماء","#3b82f6","water"],["C + O₂ → CO₂","احتراق الكربون","#f97316","burn"],["Na + Cl₂ → NaCl","ملح الطعام","#fbbf24","nacl"],["Fe + O₂ → Fe₂O₃","الصدأ","#dc2626","rust"],["HCl + NaOH → H₂O+NaCl","تعادل حمض-قاعدة","#10b981","neutralize"],["2H₂O → 2H₂+O₂","تحليل الماء","#a78bfa","electrolysis"]].map(([eq,n,c,t])=>
        `<button class="sbtn" onclick="rxSet('${t}','${eq}','${c}')" style="text-align:right;padding:10px;font-size:0.78rem">
          <div style="font-size:0.9rem;font-weight:800">${eq}</div>
          <div style="font-size:0.7rem;opacity:0.7">${n}</div>
        </button>`).join("")}
    </div>
  </div>
  <div class="info-card" style="margin-top:12px" id="rxInfo">اختر تفاعلاً كيميائياً لمشاهدة المحاكاة</div>
  </div>`;
  const c=mkCanvas("rxC",270),ctx=c.getContext("2d");
  let rxType="water",rxColor="#3b82f6",rxEq="H₂ + O₂ → H₂O",particles=[],t2=0;
  function makeParticles(){
    particles=[];
    for(let i=0;i<40;i++)particles.push({
      x:Math.random()*c.width,y:Math.random()*c.height,
      vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
      r:4+Math.random()*4,phase:Math.random()<0.5?"reactant":"product",timer:Math.random()*100
    });
  }
  window.rxSet=(t,eq,col)=>{rxType=t;rxEq=eq;rxColor=col;makeParticles();document.getElementById("rxInfo").textContent="معادلة: "+eq;};
  makeParticles();
  const effects={water:{reactColors:["#3b82f6","#a3e635"],productColor:"#06b6d4"},
    burn:{reactColors:["#1a1a1a","#ef4444"],productColor:"#f97316"},
    nacl:{reactColors:["#c0c0c0","#facc15"],productColor:"#fbbf24"},
    rust:{reactColors:["#6b7280","#ef4444"],productColor:"#dc2626"},
    neutralize:{reactColors:["#ef4444","#3b82f6"],productColor:"#10b981"},
    electrolysis:{reactColors:["#06b6d4","#06b6d4"],productColor:"#a78bfa"}};
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    t2++;
    const eff=effects[rxType]||effects.water;
    // reaction zone
    const rxLine=W/2;
    ctx.strokeStyle="rgba(255,152,0,0.3)";ctx.lineWidth=1;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.moveTo(rxLine,0);ctx.lineTo(rxLine,H);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="rgba(255,152,0,0.3)";ctx.font="10px Cairo";ctx.textAlign="center";
    ctx.fillText("منطقة التفاعل",rxLine,20);ctx.textAlign="start";
    // equation
    ctx.fillStyle="rgba(255,255,255,0.7)";ctx.font="bold 13px Cairo";ctx.textAlign="center";
    ctx.fillText(rxEq,W/2,H-10);ctx.textAlign="start";
    // particles
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      p.timer--;
      if(p.timer<=0&&p.phase==="reactant"&&Math.abs(p.x-rxLine)<50){p.phase="product";p.timer=60;}
      const col=p.phase==="reactant"?eff.reactColors[Math.floor(p.r)%eff.reactColors.length]:eff.productColor;
      const pulse=p.phase==="product"?1+0.2*Math.sin(t2*0.1):1;
      ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=p.phase==="product"?8:0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*pulse,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    });
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

      ctx.fillText(p.lbl,ex,ey+rya+13);
    });
    ctx.textAlign="start";
    animFrame=requestAnimationFrame(draw);
  }
  c.addEventListener("click",ev=>{
    const r=c.getBoundingClientRect(),mx=(ev.clientX-r.left)*(c.width/r.width),my=(ev.clientY-r.top)*(c.height/r.height);
    const cx2=c.width/2,cy2=c.height*.52;
    hov=null;
    Object.entries(parts).forEach(([k,p])=>{
      const ex=cx2+(p.x-.5)*c.width*.65,ey=cy2+(p.y-.5)*c.height*.75;
      if(Math.pow((mx-ex)/(c.width*p.rx),2)+Math.pow((my-ey)/(c.height*p.ry),2)<1.4){hov=k;document.getElementById("clInfo").innerHTML=`<b style="color:${p.c}">${p.lbl}</b><br>${p.info}`;}
    });
  });
  draw();
}

/* ══════════════════════════════════════════════
   13. MITOSIS
══════════════════════════════════════════════ */
function buildMitosis(el){
  const stages=["ما قبل الانقسام (Interphase)","الطور التمهيدي (Prophase)","الطور الاستوائي (Metaphase)","الطور الانفصالي (Anaphase)","الطور النهائي (Telophase)","الانقسام الكامل"];
  const descs=["الخلية في حالة راحة. تضاعف الحمض النووي DNA. الكروموسومات غير مرئية.","تتكثف الكروموسومات وتصبح مرئية. يتفكك الغشاء النووي. تتشكل خيوط المغزل.","تتصف الكروموسومات في منتصف الخلية على الصفيحة الاستوائية.","تنفصل الكروماتيدات الشقيقة وتتحرك نحو قطبَي الخلية.","تتشكل نواتان جديدتان. تبدأ الكروموسومات بالتفكك.","الانقسام السيتوبلازمي. تنتج خليتان متطابقتان."];
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🧬 الانقسام الخلوي (الميتوزا)</div>
  <div class="sim-canvas-box" style="height:280px"><canvas id="mtC" height="270"></canvas></div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px" id="mtStages">
    ${stages.map((s,i)=>`<button class="sbtn ${i===0?"on":""}" onclick="mtGo(${i})" style="font-size:0.72rem;padding:7px 12px">${s}</button>`).join("")}
  </div>
  <div class="info-card" style="margin-top:12px" id="mtInfo">${descs[0]}</div>
  <div class="sbtn-row"><button class="sbtn on" onclick="mtAuto()">▶ تشغيل تلقائي</button><button class="sbtn red" onclick="mtStop()">⏹ إيقاف</button></div>
  </div>`;
  const c=mkCanvas("mtC",270),ctx=c.getContext("2d");
  let stage=0,autoPlay=false,autoT=0;
  window.mtGo=(s)=>{stage=s;document.getElementById("mtInfo").textContent=descs[s];document.querySelectorAll("[id=mtStages] .sbtn").forEach((b,i)=>b.classList.toggle("on",i===s));};
  window.mtAuto=()=>{autoPlay=true;};
  window.mtStop=()=>{autoPlay=false;};
  let t3=0;
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    t3+=0.02;
    if(autoPlay){autoT+=0.005;if(autoT>=1){autoT=0;stage=(stage+1)%6;mtGo(stage);}}
    const cx=W/2,cy=H/2,cr=Math.min(W,H)*0.38;
    // cell outline
    const cellShape=stage>=5?0.5:1;
    if(stage>=4){
      // two cells forming
      const sep=(stage-3)*30;
      ctx.fillStyle="rgba(16,185,129,.05)";ctx.strokeStyle="rgba(16,185,129,.6)";ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(cx-sep,cy,cr*.7,cr*.7,0,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.ellipse(cx+sep,cy,cr*.7,cr*.7,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    }else{
      ctx.fillStyle="rgba(16,185,129,.05)";ctx.strokeStyle="rgba(16,185,129,.6)";ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(cx,cy,cr,cr*.8,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
    // chromosomes
    const chrColors=["#ef4444","#3b82f6","#10b981","#f59e0b"];
    if(stage===0){ctx.fillStyle="rgba(139,92,246,.5)";ctx.beginPath();ctx.arc(cx,cy,cr*.4,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#8b5cf6";ctx.lineWidth=1.5;ctx.stroke();}
    if(stage>=1&&stage<=3){
      const angleStep=Math.PI*2/4;
      for(let i=0;i<4;i++){
        const a=i*angleStep+t3*.3;
        const spread=stage===2?0:1;
        const r=(stage===2?cr*.25:(cr*.5+Math.sin(t3)*5));
        const bx=stage===3?cx+(i<2?-1:1)*r*1.2:cx+Math.cos(a)*r*spread;
        const by=stage===3?cy+(i%2===0?-1:1)*r*.5:cy+Math.sin(a)*r*spread;
        ctx.fillStyle=chrColors[i];ctx.shadowColor=chrColors[i];ctx.shadowBlur=8;
        ctx.beginPath();ctx.ellipse(bx,by,12,6,a,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      }
    }
    if(stage===2){ctx.strokeStyle="rgba(255,255,255,.2)";ctx.lineWidth=1;ctx.setLineDash([3,6]);ctx.beginPath();ctx.moveTo(cx,cy-cr*.7);ctx.lineTo(cx,cy+cr*.7);ctx.stroke();ctx.setLineDash([]);}
    if(stage>=4){const sep=(stage-3)*30;[-1,1].forEach(s2=>{ctx.fillStyle="rgba(139,92,246,.5)";ctx.beginPath();ctx.arc(cx+s2*sep,cy,cr*.22,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#8b5cf6";ctx.lineWidth=1;ctx.stroke();});}
    ctx.font="bold 12px Cairo";ctx.fillStyle="rgba(255,255,255,.6)";ctx.textAlign="center";ctx.fillText(stages[stage],W/2,H-8);ctx.textAlign="start";
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

function buildDigestion(el){
  const organs=[{n:"الفم",desc:"مضغ الطعام وخلطه باللعاب (أميليز)",color:"#f59e0b",y:.1},{n:"المريء",desc:"أنبوب عضلي ينقل الطعام للمعدة بحركات تمعجية",color:"#f97316",y:.25},{n:"المعدة",desc:"حمض HCl وإنزيمات تهضم البروتينات",color:"#ef4444",y:.42},{n:"الأمعاء الدقيقة",desc:"امتصاص العناصر الغذائية — 6 أمتار طول",color:"#10b981",y:.6},{n:"الأمعاء الغليظة",desc:"امتصاص الماء وتشكيل الفضلات",color:"#3b82f6",y:.76},{n:"الشرج",desc:"طرح الفضلات خارج الجسم",color:"#8b5cf6",y:.9}];
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🫁 الجهاز الهضمي</div>
  <div class="sim-layout">
    <div class="sim-canvas-box" style="height:360px"><canvas id="dgC" height="350"></canvas></div>
    <div class="sim-panel">
      <div class="info-card" id="dgInfo">انقر على أي عضو لمعرفة وظيفته</div>
      <div style="margin-top:10px">
        ${organs.map(o=>`<div onclick="dgClick('${o.n}')" style="padding:8px 12px;margin-bottom:5px;border-radius:8px;border:1px solid ${o.color}44;background:${o.color}11;cursor:pointer;font-size:0.82rem;color:${o.color};transition:.2s" onmouseover="this.style.background='${o.color}22'" onmouseout="this.style.background='${o.color}11'">${o.n}</div>`).join("")}
      </div>
    </div>
  </div></div>`;
  const c=mkCanvas("dgC",350),ctx=c.getContext("2d");
  let foodPos=0,hov2=null,t4=0;
  window.dgClick=(n)=>{const o=organs.find(x=>x.n===n);if(o){hov2=n;document.getElementById("dgInfo").innerHTML=`<b style="color:${o.color}">${o.n}</b><br>${o.desc}`;}};
  function draw(){
    const W=c.width,H=c.height,cx=W*.35;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    t4+=0.01;foodPos=(foodPos+0.003)%1;
    organs.forEach((o,i)=>{
      const y=H*o.y,isH=hov2===o.n;
      const wide=i===2?40:i===3?25:20;
      const fill=ctx.createLinearGradient(cx-wide,y,cx+wide,y+15);
      fill.addColorStop(0,o.color+"88");fill.addColorStop(1,o.color+"44");
      ctx.fillStyle=fill;
      if(i===2){ctx.beginPath();ctx.ellipse(cx,y,wide,25,0,0,Math.PI*2);ctx.fill();}
      else if(i===3){ctx.strokeStyle=o.color+"99";ctx.lineWidth=8;ctx.beginPath();for(let s=0;s<20;s++){ctx.lineTo(cx+Math.sin(s*.8+t4)*12,y+s*4);}ctx.stroke();}
      else{ctx.fillStyle=o.color+"66";ctx.beginPath();ctx.roundRect(cx-wide/2,y-8,wide,16,8);ctx.fill();}
      if(isH){ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();}
      ctx.fillStyle=o.color;ctx.font="bold 10px Cairo";ctx.fillText(o.n,cx+45,y+4);
    });
    // food particle
    const fp=foodPos,fy=H*(fp*0.85+0.05);
    ctx.fillStyle="#ff9800";ctx.shadowColor="#ff9800";ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(cx,fy,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // tube connecting
    ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=4;
    ctx.beginPath();organs.forEach(o=>ctx.lineTo(cx,H*o.y));ctx.stroke();
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

/* ══════════════════════════════════════════════

function buildPhotosyn(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🌿 عملية البناء الضوئي</div>
  <div class="sim-canvas-box" style="height:300px"><canvas id="psC" height="290"></canvas></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px">
    <div class="ctrl-box"><div class="ctrl-lbl">شدة الضوء <span id="psLL">50%</span></div><input type="range" id="psL" min="0" max="100" value="50" oninput="psUpdate()"></div>
    <div class="ctrl-box"><div class="ctrl-lbl">CO₂ <span id="psCL">50%</span></div><input type="range" id="psC2" min="0" max="100" value="50" oninput="psUpdate()"></div>
    <div class="ctrl-box"><div class="ctrl-lbl">درجة الحرارة <span id="psTL">25°C</span></div><input type="range" id="psT2" min="5" max="45" value="25" oninput="psUpdate()"></div>
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="psO2">50</div><div class="l">إنتاج O₂</div></div>
    <div class="ibox"><div class="v" id="psGlc">50</div><div class="l">إنتاج جلوكوز</div></div>
    <div class="ibox"><div class="v" id="psRate">متوسط</div><div class="l">معدل التفاعل</div></div>
  </div>
  <div class="info-card" style="margin-top:10px">6CO₂ + 6H₂O + ضوء → C₆H₁₂O₆ + 6O₂</div>
  </div>`;
  const c=mkCanvas("psC",290),ctx=c.getContext("2d");
  let light=50,co2=50,temp=25,t5=0,bubbles2=[];
  for(let i=0;i<30;i++)bubbles2.push({x:Math.random()*200+100,y:200+Math.random()*50,s:0.5+Math.random()});
  window.psUpdate=()=>{
    light=+document.getElementById("psL").value;co2=+document.getElementById("psC2").value;temp=+document.getElementById("psT2").value;
    document.getElementById("psLL").textContent=light+"%";document.getElementById("psCL").textContent=co2+"%";document.getElementById("psTL").textContent=temp+"°C";
    const tempFactor=temp<10||temp>40?0.3:temp<15||temp>35?0.7:1;
    const rate=Math.round((light+co2)/2*tempFactor);
    document.getElementById("psO2").textContent=rate;document.getElementById("psGlc").textContent=Math.round(rate*.9);
    document.getElementById("psRate").textContent=rate<20?"بطيء":rate<60?"متوسط":"سريع";
  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    t5+=0.03;
    // sun
    const lightFrac=light/100;
    const sunG=ctx.createRadialGradient(W*.15,H*.15,0,W*.15,H*.15,80);
    sunG.addColorStop(0,`rgba(255,220,60,${lightFrac*.9})`);sunG.addColorStop(1,"transparent");
    ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(W*.15,H*.15,80,0,Math.PI*2);ctx.fill();
    // light rays
    ctx.strokeStyle=`rgba(255,220,60,${lightFrac*.6})`;ctx.lineWidth=1.5;
    for(let r=0;r<6;r++){const ra=r*Math.PI/3;ctx.beginPath();ctx.moveTo(W*.15+Math.cos(ra)*25,H*.15+Math.sin(ra)*25);ctx.lineTo(W*.15+Math.cos(ra)*60,H*.15+Math.sin(ra)*60);ctx.stroke();}
    // leaf
    const lx=W/2,ly=H*.5;
    ctx.fillStyle="rgba(22,163,74,.8)";ctx.strokeStyle="#16a34a";ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(lx,ly,W*.22,H*.25,Math.PI*.15,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle="rgba(134,239,172,.5)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lx-W*.15,ly+H*.1);ctx.lineTo(lx+W*.15,ly-H*.1);ctx.stroke();
    for(let v=1;v<4;v++){ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+Math.cos(v*0.6)*60,ly-Math.sin(v*0.4)*40);ctx.stroke();}
    // bubbles (O2)
    const rate2=(light+co2)/200;
    bubbles2.forEach(b=>{
      b.y-=b.s*rate2*2;if(b.y<H*.1)b.y=H*.65;
      ctx.fillStyle="rgba(96,165,250,.6)";ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    });
    ctx.font="11px Cairo";ctx.fillStyle="rgba(96,165,250,.8)";ctx.fillText("O₂",W*.6,H*.15);
    // CO2 arrows going in
    ctx.strokeStyle=`rgba(156,163,175,${co2/200})`;ctx.lineWidth=1.5;
    for(let ci=0;ci<3;ci++){ctx.beginPath();ctx.moveTo(W*.75,H*.2+ci*30);ctx.lineTo(W*.6,H*.4+ci*20);ctx.stroke();}
    ctx.font="11px Cairo";ctx.fillStyle="rgba(156,163,175,.6)";ctx.fillText("CO₂",W*.75,H*.2);
    animFrame=requestAnimationFrame(draw);
  }
  psUpdate();draw();
}

  const c=mkCanvas("lyC",350),ctx=c.getContext("2d");
  let hov3=null,rot6=0;
  window.lyClick=(i)=>{hov3=i;document.getElementById("lyInfo").innerHTML=`<b style="color:${layers[i].c1}">${layers[i].name}</b><br>${layers[i].info}`;};
  function draw(){
    const W=c.width,H=c.height,cx=W/2,cy=H/2;
    const mr=Math.min(W,H)*.44;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    rot6+=.003;
    let r=mr;
    layers.forEach((l,i)=>{
      const inner=r-l.thick*mr;
      const g=ctx.createRadialGradient(cx-r*.2,cy-r*.2,inner*.1,cx,cy,r);
      g.addColorStop(0,l.c2);g.addColorStop(1,l.c1);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
      if(hov3===i){ctx.strokeStyle="#fff";ctx.lineWidth=2.5;ctx.stroke();}
      const lr=(r+inner)/2;
      const lx=cx+lr*.55*Math.cos(rot6+i),ly=cy+lr*.3*Math.sin(rot6*.5+i);
      ctx.fillStyle=hov3===i?"#fff":"rgba(255,255,255,.75)";ctx.font="bold 10px Cairo";ctx.textAlign="center";
      ctx.fillText(l.name,lx,ly);r=inner;
    });
    // cross lines
    ctx.strokeStyle="rgba(255,255,255,.08)";ctx.lineWidth=1;ctx.setLineDash([3,6]);
    ctx.beginPath();ctx.moveTo(cx,cy-mr);ctx.lineTo(cx,cy+mr);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-mr,cy);ctx.lineTo(cx+mr,cy);ctx.stroke();
    ctx.setLineDash([]);ctx.textAlign="start";
    animFrame=requestAnimationFrame(draw);
  }
  c.addEventListener("click",ev=>{
    const r=c.getBoundingClientRect(),mx=(ev.clientX-r.left)*(c.width/r.width)-c.width/2,my=(ev.clientY-r.top)*(c.height/r.height)-c.height/2;
    const d=Math.sqrt(mx*mx+my*my),mr=Math.min(c.width,c.height)*.44;
    let rv=mr;
    for(let i=0;i<layers.length;i++){const inner=rv-layers[i].thick*mr;if(d<=rv&&d>=inner){lyClick(i);break;}rv=inner;}
  });
  draw();
}

function buildEarthquake(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">📳 الزلازل ومقياس ريختر</div>
  <div class="sim-canvas-box" style="height:280px"><canvas id="eqC" height="270"></canvas></div>
  <div class="ctrl-box" style="margin-top:12px">
    <div class="ctrl-lbl">قوة الزلزال (ريختر) <span id="eqML">5.0</span></div>
    <input type="range" id="eqM" min="1" max="9" step="0.1" value="5" oninput="eqUpdate()">
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="eqMag">5.0</div><div class="l">المقياس</div></div>
    <div class="ibox"><div class="v" id="eqDesc">متوسط</div><div class="l">التوصيف</div></div>
    <div class="ibox"><div class="v" id="eqEnergy">~10¹²</div><div class="l">الطاقة (J)</div></div>
  </div>
  <div class="sbtn-row"><button class="sbtn on" onclick="eqTrigger()">💥 أطلق الزلزال</button></div>
  </div>`;
  const c=mkCanvas("eqC",270),ctx=c.getContext("2d");
  let mag=5,eqActive=false,eqT=0,waves2=[];
  window.eqUpdate=()=>{
    mag=+document.getElementById("eqM").value;document.getElementById("eqML").textContent=mag.toFixed(1);
    document.getElementById("eqMag").textContent=mag.toFixed(1);
    const descs={1:"ضعيف جداً",2:"ضعيف",3:"خفيف",4:"محسوس",5:"متوسط",6:"قوي",7:"قوي جداً",8:"مدمر",9:"كارثي"};
    document.getElementById("eqDesc").textContent=descs[Math.round(mag)]||"كارثي";
    document.getElementById("eqEnergy").textContent="~10^"+Math.round(4.8+1.5*mag);
  };
  window.eqTrigger=()=>{waves2=[];eqActive=true;eqT=0;};
  const seismograph=[];
  for(let i=0;i<200;i++)seismograph.push(0);
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle="#1e3a1e";ctx.fillRect(0,H*.6,W,H*.4);
    ctx.strokeStyle="#2d6a2d";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H*.6);ctx.lineTo(W,H*.6);ctx.stroke();
    // buildings
    [[.1,60,30],[.25,80,25],[.4,50,35],[.55,90,25],[.7,65,28],[.85,55,30]].forEach(([fx,h,w])=>{
      const bx=W*fx-w/2,by=H*.6-h;
      const shake=eqActive?Math.sin(eqT*10)*(mag-1):0;
      ctx.fillStyle="#1e2d3d";ctx.fillRect(bx+shake,by,w,h);
      ctx.strokeStyle="#2a5298";ctx.lineWidth=1;ctx.strokeRect(bx+shake,by,w,h);
      // windows
      for(let wr=0;wr<3;wr++)for(let wc=0;wc<2;wc++){
        const lit=Math.random()>.4;
        ctx.fillStyle=lit?"rgba(255,220,60,.8)":"rgba(0,0,0,.5)";
        ctx.fillRect(bx+shake+wc*10+4,by+wr*12+4,6,7);
      }
    });
    // seismic waves
    if(eqActive){
      eqT+=0.06;
      if(eqT<1)waves2.push({r:eqT*W*.5,alpha:1-eqT});
      seismograph.shift();
      seismograph.push(Math.sin(eqT*20)*mag*(1-Math.min(eqT,1)*.8)*5);
      if(eqT>3)eqActive=false;
    }else{seismograph.shift();seismograph.push(0);}
    waves2.forEach(w=>{
      ctx.strokeStyle=`rgba(255,152,0,${w.alpha*.6})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(W*.5,H*.6,w.r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(W*.5,H*.6,w.r*.6,0,Math.PI*2);ctx.stroke();
      w.r+=3;w.alpha-=.02;
    });
    waves2=waves2.filter(w=>w.alpha>0);
    // seismograph
    ctx.strokeStyle="rgba(255,152,0,.6)";ctx.lineWidth=1.5;
    ctx.beginPath();seismograph.forEach((v,i)=>{const sx=i*(W/200),sy=H*.3+v;i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,.4)";ctx.font="10px Cairo";ctx.fillText("السيزموغراف",5,H*.25);
    animFrame=requestAnimationFrame(draw);
  }
  eqUpdate();draw();
}

        <input type="range" id="mlN2" min="1" max="12" value="3" oninput="mlUpdate()">
      </div>
      <div style="text-align:center;padding:16px;background:#0f172a;border-radius:12px;border:1px solid #1e3a5f">
        <span id="mlEq1" style="font-size:2rem;font-weight:900;color:#ff9800">5</span>
        <span style="font-size:1.5rem;color:#94a3b8"> × </span>
        <span id="mlEq2" style="font-size:2rem;font-weight:900;color:#00d4ff">3</span>
        <span style="font-size:1.5rem;color:#94a3b8"> = </span>
        <span id="mlEqR" style="font-size:2rem;font-weight:900;color:#10b981">15</span>
      </div>
      <div class="info-card" id="mlDesc">5 صفوف × 3 أعمدة = 15 نقطة</div>
      <div style="margin-top:10px;font-size:0.85rem;color:#94a3b8">جدول ضرب العدد <span id="mlTable" style="color:#ff9800"></span></div>
    </div>
  </div></div>`;
  const c=mkCanvas("mlC",290),ctx=c.getContext("2d");
  let n1=5,n2=3;
  window.mlUpdate=()=>{
    n1=+document.getElementById("mlN1").value;n2=+document.getElementById("mlN2").value;
    document.getElementById("mlN1L").textContent=n1;document.getElementById("mlN2L").textContent=n2;
    document.getElementById("mlEq1").textContent=n1;document.getElementById("mlEq2").textContent=n2;document.getElementById("mlEqR").textContent=n1*n2;
    document.getElementById("mlDesc").textContent=`${n1} صفوف × ${n2} أعمدة = ${n1*n2} نقطة`;
    let table="";for(let i=1;i<=10;i++)table+=`${n1}×${i}=${n1*i}  `;
    document.getElementById("mlTable").textContent=n1;

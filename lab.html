  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    if(!n1||!n2)return;
    const pd=25,dw=(W-pd*2)/Math.max(n2,1),dh=(H-pd*2)/Math.max(n1,1);
    const dr=Math.min(dw,dh)*.38;
    for(let row=0;row<n1;row++)for(let col=0;col<n2;col++){
      const x=pd+col*dw+dw/2,y=pd+row*dh+dh/2;
      const hue=120+row*20+col*10;
      const g=ctx.createRadialGradient(x,y,0,x,y,dr);
      g.addColorStop(0,`hsl(${hue},90%,80%)`);g.addColorStop(1,`hsl(${hue},80%,35%)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,dr,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,.1)";ctx.lineWidth=1;ctx.stroke();
    }
    ctx.fillStyle="rgba(255,255,255,.4)";ctx.font="11px Cairo";
    ctx.fillText(`${n1}×${n2}=${n1*n2}`,8,18);
  }
  mlUpdate();
}

function buildShapes(el){
  const shapeList=[
    {id:"square",name:"مربع",info:(s)=>`المساحة: ${s*s} | المحيط: ${4*s}`},
    {id:"rect",name:"مستطيل",info:(s)=>`المساحة: ${s*Math.round(s*.6)} | المحيط: ${2*(s+Math.round(s*.6))}`},
    {id:"circle",name:"دائرة",info:(s)=>`المساحة: ${(Math.PI*(s/2)**2).toFixed(1)} | المحيط: ${(Math.PI*s).toFixed(1)}`},
    {id:"triangle",name:"مثلث متساوٍ",info:(s)=>`المساحة: ${(Math.sqrt(3)/4*s*s).toFixed(1)} | المحيط: ${3*s}`},
    {id:"rhombus",name:"معيّن",info:(s)=>`المحيط: ${4*s} | الزوايا: 60° و120°`},
    {id:"pentagon",name:"خماسي",info:(s)=>`المحيط: ${5*Math.round(s*.6)} | الزوايا الداخلية: 108°`},
    {id:"hexagon",name:"سداسي",info:(s)=>`المحيط: ${6*Math.round(s*.5)} | الزوايا: 120°`},
    {id:"ellipse",name:"بيضاوي",info:(s)=>`المساحة ≈ ${(Math.PI*s/2*s*.35).toFixed(1)} | محور رئيسي: ${s}`},
  ];
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">📐 الأشكال الهندسية</div>
  <div class="sim-layout">
    <div class="sim-canvas-box" style="height:300px"><canvas id="shC" height="290"></canvas></div>
    <div class="sim-panel">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px">
        ${shapeList.map(s=>`<button class="sbtn" id="shBtn_${s.id}" onclick="shSet('${s.id}')" style="font-size:0.8rem;padding:9px">${s.name}</button>`).join("")}
      </div>
      <div class="ctrl-box">
        <div class="ctrl-lbl">الحجم <span id="shSzL">100</span></div>
        <input type="range" id="shSz" min="40" max="160" value="100" oninput="shUpdate()">
      </div>
      <div class="info-card" style="margin-top:10px" id="shInfo">اختر شكلاً</div>
    </div>
  </div></div>`;
  const c=mkCanvas("shC",290),ctx=c.getContext("2d");
  let shape2="square",sz2=100,rot7=0;
  window.shSet=(s)=>{shape2=s;document.querySelectorAll("[id^=shBtn_]").forEach(b=>b.classList.remove("on"));document.getElementById("shBtn_"+s)?.classList.add("on");shUpdate();};
  window.shUpdate=()=>{sz2=+document.getElementById("shSz").value;document.getElementById("shSzL").textContent=sz2;const sl=shapeList.find(x=>x.id===shape2);if(sl)document.getElementById("shInfo").innerHTML=`<b>${sl.name}</b><br>${sl.info(sz2)}`;};
  shSet("square");
  function draw(){
    const W=c.width,H=c.height,cx=W/2,cy=H/2;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    rot7+=.007;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.sin(rot7)*.06);
    const g=ctx.createLinearGradient(-sz2,-sz2,sz2,sz2);
    g.addColorStop(0,"#ff9800");g.addColorStop(.5,"#f97316");g.addColorStop(1,"#ea580c");
    ctx.fillStyle=g;ctx.strokeStyle="rgba(255,255,255,.35)";ctx.lineWidth=2;
    ctx.shadowColor="#ff9800";ctx.shadowBlur=25;
    const s=sz2;
    if(shape2==="square"){ctx.beginPath();ctx.roundRect(-s/2,-s/2,s,s,5);ctx.fill();ctx.stroke();}
    else if(shape2==="rect"){ctx.beginPath();ctx.roundRect(-s/2,-s*.3,s,s*.6,5);ctx.fill();ctx.stroke();}
    else if(shape2==="circle"){ctx.beginPath();ctx.arc(0,0,s/2,0,Math.PI*2);ctx.fill();ctx.stroke();}
    else if(shape2==="triangle"){ctx.beginPath();ctx.moveTo(0,-s*.55);ctx.lineTo(s*.5,s*.33);ctx.lineTo(-s*.5,s*.33);ctx.closePath();ctx.fill();ctx.stroke();}
    else if(shape2==="rhombus"){ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.35,0);ctx.lineTo(0,s*.5);ctx.lineTo(-s*.35,0);ctx.closePath();ctx.fill();ctx.stroke();}
    else if(shape2==="pentagon"){ctx.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;ctx.lineTo(Math.cos(a)*s*.5,Math.sin(a)*s*.5);}ctx.closePath();ctx.fill();ctx.stroke();}
    else if(shape2==="hexagon"){ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(Math.cos(a)*s*.5,Math.sin(a)*s*.5);}ctx.closePath();ctx.fill();ctx.stroke();}
    else if(shape2==="ellipse"){ctx.beginPath();ctx.ellipse(0,0,s*.5,s*.3,0,0,Math.PI*2);ctx.fill();ctx.stroke();}
    ctx.restore();ctx.shadowBlur=0;
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

      <input type="range" id="frA2" min="1" max="10" value="1" oninput="frUpdate()">
      <div class="ctrl-lbl" style="margin-top:8px">المقام (d) <span id="frB2L">3</span></div>

    </div>
  </div>
  <div class="info-row" style="margin-top:12px">
    <div class="ibox"><div class="v" id="frF1">½</div><div class="l">الكسر الأول</div></div>
    <div class="ibox"><div class="v" id="frComp">></div><div class="l">المقارنة</div></div>
    <div class="ibox"><div class="v" id="frF2">⅓</div><div class="l">الكسر الثاني</div></div>
    <div class="ibox"><div class="v" id="frSum">—</div><div class="l">المجموع</div></div>
  </div>
  </div>`;
  const c=mkCanvas("frC",250),ctx=c.getContext("2d");
  let a1=1,b1=2,a2=1,b2=3;
  window.frUpdate=()=>{
    a1=+document.getElementById("frA1").value;b1=+document.getElementById("frB1").value;
    a2=+document.getElementById("frA2").value;b2=+document.getElementById("frB2").value;
    document.getElementById("frA1L").textContent=a1;document.getElementById("frB1L").textContent=b1;
    document.getElementById("frA2L").textContent=a2;document.getElementById("frB2L").textContent=b2;
    document.getElementById("frF1").textContent=a1+"/"+b1;document.getElementById("frF2").textContent=a2+"/"+b2;
    const v1=a1/b1,v2=a2/b2;
    document.getElementById("frComp").textContent=v1>v2?">":(v1<v2?"<":"=");
    const sumN=a1*b2+a2*b1,sumD=b1*b2,g=gcd(sumN,sumD);
    document.getElementById("frSum").textContent=(sumN/g)+"/"+(sumD/g);
    draw();
  };
  function gcd(a,b){return b===0?a:gcd(b,a%b);}
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    [[a1,b1,"#ff9800",W*.18],[a2,b2,"#00d4ff",W*.68]].forEach(([a,b,col,cx2])=>{
      const r=Math.min(H*.38,W*.12);
      // full circle
      ctx.strokeStyle=col+"44";ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx2,H/2,r,0,Math.PI*2);ctx.stroke();
      // filled slice
      for(let i=0;i<a;i++){
        const startA=-Math.PI/2+i*(Math.PI*2/b),endA=startA+(Math.PI*2/b);
        const sg=ctx.createRadialGradient(cx2,H/2,0,cx2,H/2,r);
        sg.addColorStop(0,col+"cc");sg.addColorStop(1,col+"55");
        ctx.fillStyle=sg;ctx.beginPath();ctx.moveTo(cx2,H/2);ctx.arc(cx2,H/2,r,startA,endA);ctx.closePath();ctx.fill();
        ctx.strokeStyle="rgba(0,0,0,.3)";ctx.lineWidth=1;ctx.stroke();
      }
      // dividers
      for(let i=0;i<b;i++){const a3=-Math.PI/2+i*(Math.PI*2/b);ctx.strokeStyle="rgba(0,0,0,.4)";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx2,H/2);ctx.lineTo(cx2+Math.cos(a3)*r,H/2+Math.sin(a3)*r);ctx.stroke();}
      // label
      ctx.fillStyle=col;ctx.font="bold 16px Cairo";ctx.textAlign="center";
      ctx.fillText(a+"/"+b,cx2,H*.88);
      ctx.fillText((a/b*100).toFixed(0)+"%",cx2,H*.95);
    });
    ctx.textAlign="start";
  }
  frUpdate();
}

function buildProbability(el){

  <div class="info-card" style="margin-top:10px" id="pbInfo">قانون الأعداد الكبيرة: كلما زادت التجارب اقتربت النسب من الاحتمال النظري</div>
  </div>`;
  const c=mkCanvas("pbC",230),ctx=c.getContext("2d");
  let mode3="dice",counts=[0,0,0,0,0,0],total=0,coinH=0,coinT=0;
  window.pbToggle=()=>{mode3=mode3==="dice"?"coin":"dice";document.getElementById("pbMode").textContent=mode3==="dice"?"نرد 🎲":"عملة 🪙";pbReset();};
  window.pbReset=()=>{counts=[0,0,0,0,0,0];total=0;coinH=0;coinT=0;draw();document.getElementById("pbResults").innerHTML="";};
  window.pbRoll=(n)=>{
    for(let i=0;i<n;i++){
      if(mode3==="dice"){const r=Math.floor(Math.random()*6);counts[r]++;total++;}
      else{Math.random()>.5?coinH++:coinT++;total++;}
    }
    const ri=document.getElementById("pbResults");
    if(mode3==="dice"){ri.innerHTML=counts.map((v,i)=>`<div class="ibox"><div class="v" style="color:#ff9800">${v}</div><div class="l">${i+1} (${total?Math.round(v/total*100):0}%)</div></div>`).join("");}
    else{ri.innerHTML=`<div class="ibox"><div class="v" style="color:#ff9800">${coinH}</div><div class="l">وجه (${total?Math.round(coinH/total*100):0}%)</div></div><div class="ibox"><div class="v" style="color:#00d4ff">${coinT}</div><div class="l">ظهر (${total?Math.round(coinT/total*100):0}%)</div></div>`;}
    draw();
  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    if(mode3==="dice"){
      const pd=30,bw=(W-pd*2)/6,maxC=Math.max(...counts,1);
      counts.forEach((v,i)=>{
        const bh=(v/maxC)*(H-pd*2),bx=pd+i*bw;
        const bg=ctx.createLinearGradient(bx,H-pd-bh,bx,H-pd);
        bg.addColorStop(0,"#ff9800");bg.addColorStop(1,"#f97316");
        ctx.fillStyle=bg;ctx.fillRect(bx+4,H-pd-bh,bw-8,bh);
        ctx.fillStyle="rgba(255,255,255,.6)";ctx.font="bold 12px Cairo";ctx.textAlign="center";
        ctx.fillText(i+1,bx+bw/2,H-pd+14);
        if(v>0)ctx.fillText(v,bx+bw/2,H-pd-bh-5);
        // theoretical line
        const th=(total/6/maxC)*(H-pd*2);
        ctx.strokeStyle="rgba(0,212,255,.5)";ctx.lineWidth=1;ctx.setLineDash([4,6]);
        ctx.beginPath();ctx.moveTo(pd,H-pd-th);ctx.lineTo(W-pd,H-pd-th);ctx.stroke();ctx.setLineDash([]);
      });
    }else{
      const tot=coinH+coinT||1;
      [[coinH,"صورة","#ff9800",.25],[coinT,"ظهر","#00d4ff",.75]].forEach(([v,lbl,col,cx2])=>{
        const ang=v/tot*Math.PI*2,r=H*.35;
        const ga=ctx.createRadialGradient(W*cx2,H/2,0,W*cx2,H/2,r);
        ga.addColorStop(0,col+"cc");ga.addColorStop(1,col+"44");
        ctx.fillStyle=ga;ctx.beginPath();ctx.moveTo(W*cx2,H/2);ctx.arc(W*cx2,H/2,r,-Math.PI/2,-Math.PI/2+ang);ctx.closePath();ctx.fill();
        ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.arc(W*cx2,H/2,r,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=col;ctx.font="bold 13px Cairo";ctx.textAlign="center";ctx.fillText(lbl+" "+v,W*cx2,H*.85);ctx.fillText((v/tot*100).toFixed(1)+"%",W*cx2,H*.93);
      });
    }
    ctx.textAlign="start";
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

function buildGraphing(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">📈 رسم الدوال الرياضية</div>
  <div class="sim-canvas-box" style="height:300px"><canvas id="grC" height="290"></canvas></div>
  <div class="ctrl-box" style="margin-top:12px">
    <div style="font-weight:700;margin-bottom:8px">اختر الدالة أو أدخلها:</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      ${[["y=x","y=x"],["y=x²","y=x*x"],["y=x³","y=x*x*x"],["y=sin(x)","Math.sin(x)"],["y=cos(x)","Math.cos(x)"],["y=|x|","Math.abs(x)"],["y=√x","Math.sqrt(Math.abs(x))"],["y=1/x","1/x"]].map(([n,f])=>`<button class="sbtn" style="font-size:0.78rem;padding:7px 12px" onclick="grSetFn('${f}')">${n}</button>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div class="ctrl-lbl">a <span id="grAL">1</span></div><input type="range" id="grA" min="-5" max="5" step=".5" value="1" oninput="grUpdate()"></div>
      <div><div class="ctrl-lbl">b <span id="grBL">0</span></div><input type="range" id="grB" min="-5" max="5" step=".5" value="0" oninput="grUpdate()"></div>
      <div><div class="ctrl-lbl">c <span id="grCL">0</span></div><input type="range" id="grC2" min="-5" max="5" step=".5" value="0" oninput="grUpdate()"></div>
    </div>
  </div>
  <div class="info-card" style="margin-top:10px" id="grInfo">اختر دالة أو غيّر معاملات a و b و c</div>
  </div>`;
  const c=mkCanvas("grC",290),ctx=c.getContext("2d");
  let fn="x",a=1,b2=0,c2b=0;
  window.grSetFn=(f)=>{fn=f;grUpdate();};
  window.grUpdate=()=>{
    a=+document.getElementById("grA").value;b2=+document.getElementById("grB").value;c2b=+document.getElementById("grC2").value;
    document.getElementById("grAL").textContent=a;document.getElementById("grBL").textContent=b2;document.getElementById("grCL").textContent=c2b;
    draw();
  };
  function eval2(x){try{return eval(fn.replace(/x/g,`(${x})`))*a+b2*x+c2b;}catch{return NaN;}}
  function draw(){
    const W=c.width,H=c.height,cx=W/2,cy=H/2,scale=30;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    // grid
    ctx.strokeStyle="rgba(255,255,255,.05)";ctx.lineWidth=1;
    for(let gx=-W/2;gx<=W/2;gx+=scale){ctx.beginPath();ctx.moveTo(cx+gx,0);ctx.lineTo(cx+gx,H);ctx.stroke();}
    for(let gy=-H/2;gy<=H/2;gy+=scale){ctx.beginPath();ctx.moveTo(0,cy+gy);ctx.lineTo(W,cy+gy);ctx.stroke();}
    // axes
    ctx.strokeStyle="rgba(255,255,255,.3)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,.4)";ctx.font="10px Cairo";ctx.fillText("x",W-12,cy-6);ctx.fillText("y",cx+6,10);
    // axis labels
    for(let i=-5;i<=5;i++){if(i===0)continue;ctx.fillStyle="rgba(255,255,255,.3)";ctx.font="9px Cairo";ctx.textAlign="center";ctx.fillText(i,cx+i*scale,cy+12);ctx.fillText(-i,cx-4,cy+i*scale+3);}
    // function curve
    ctx.strokeStyle="#ff9800";ctx.lineWidth=2.5;ctx.shadowColor="#ff9800";ctx.shadowBlur=8;
    ctx.beginPath();let first=true;
    for(let px=0;px<=W;px++){
      const x=(px-cx)/scale;const y=eval2(x);
      if(isNaN(y)||!isFinite(y)||Math.abs(y)>20){first=true;continue;}
      const sy=cy-y*scale;
      if(first){ctx.moveTo(px,sy);first=false;}else ctx.lineTo(px,sy);
    }
    ctx.stroke();ctx.shadowBlur=0;ctx.textAlign="start";
  }
  grSetFn("x");
}

/* ══════════════════════════════════════════════
   25. SEQUENCES
══════════════════════════════════════════════ */
function buildSequences(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🔢 المتتاليات والأنماط</div>
  <div class="sbtn-row">
    <button class="sbtn on" onclick="sqSet('arith')">حسابية</button>
    <button class="sbtn" onclick="sqSet('geo')">هندسية</button>
    <button class="sbtn" onclick="sqSet('fib')">فيبوناتشي</button>
    <button class="sbtn" onclick="sqSet('square')">مربعات</button>
    <button class="sbtn" onclick="sqSet('prime')">أعداد أولية</button>
  </div>
  <div class="sim-canvas-box" style="height:220px;margin-top:14px"><canvas id="sqC" height="210"></canvas></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px" id="sqCtrls"></div>
  <div class="info-card" style="margin-top:12px" id="sqInfo"></div>
  <div style="background:#0f172a;border:1px solid #1e3a5f;border-radius:12px;padding:14px;margin-top:10px;font-size:0.9rem;font-family:monospace;color:#ff9800;word-break:break-all" id="sqTerms"></div>
  </div>`;
  const c=mkCanvas("sqC",210),ctx=c.getContext("2d");
  let sqType="arith",sqA=1,sqD=2,sqR=2;
  function getSeq(){
    if(sqType==="arith")return Array.from({length:12},(_,i)=>sqA+i*sqD);
    if(sqType==="geo")return Array.from({length:10},(_,i)=>sqA*Math.pow(sqR,i));
    if(sqType==="fib"){let s=[1,1];for(let i=2;i<12;i++)s.push(s[i-1]+s[i-2]);return s;}
    if(sqType==="square")return Array.from({length:12},(_,i)=>(i+1)*(i+1));
    if(sqType==="prime"){const p=[];let n=2;while(p.length<12){let ok=true;for(let f=2;f<=Math.sqrt(n);f++)if(n%f===0){ok=false;break;}if(ok)p.push(n);n++;}return p;}
    return [];
  }
  window.sqSet=(t)=>{
    sqType=t;
    const ctrls={
      arith:`<div class="ctrl-box"><div class="ctrl-lbl">الحد الأول a <span id="sqAL">1</span></div><input type="range" id="sqA" min="-10" max="20" value="1" oninput="sqUpdate()"></div><div class="ctrl-box"><div class="ctrl-lbl">الأساس d <span id="sqDL">2</span></div><input type="range" id="sqD" min="-10" max="20" value="2" oninput="sqUpdate()"></div>`,
      geo:`<div class="ctrl-box"><div class="ctrl-lbl">الحد الأول a <span id="sqAL">1</span></div><input type="range" id="sqA" min="1" max="10" value="1" oninput="sqUpdate()"></div><div class="ctrl-box"><div class="ctrl-lbl">الأساس r <span id="sqRL">2</span></div><input type="range" id="sqR" min="1" max="5" step=".5" value="2" oninput="sqUpdate()"></div>`,
      fib:"",square:"",prime:""
    };
    document.getElementById("sqCtrls").innerHTML=ctrls[t]||"";
    const infos={arith:"a_n = a₁ + (n-1)×d",geo:"a_n = a₁ × rⁿ⁻¹",fib:"F_n = F_{n-1} + F_{n-2}",square:"a_n = n²",prime:"أعداد لا تقبل القسمة إلا على 1 وعلى نفسها"};
    document.getElementById("sqInfo").textContent=infos[t];
    sqUpdate();
  };
  window.sqUpdate=()=>{
    if(document.getElementById("sqA"))sqA=+document.getElementById("sqA").value;
    if(document.getElementById("sqD"))sqD=+document.getElementById("sqD").value;if(document.getElementById("sqAL"))document.getElementById("sqAL").textContent=sqA;if(document.getElementById("sqDL"))document.getElementById("sqDL").textContent=sqD;
    if(document.getElementById("sqR"))sqR=+document.getElementById("sqR").value;if(document.getElementById("sqRL"))document.getElementById("sqRL").textContent=sqR;
    const seq=getSeq();
    document.getElementById("sqTerms").textContent=seq.map((v,i)=>`a${i+1}=${typeof v==="number"&&v>1e6?v.toExponential(1):v}`).join(" , ");
    draw();
  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    const seq=getSeq();
    if(!seq.length)return;
    const min2=Math.min(...seq.filter(v=>v<Infinity)),max2=Math.max(...seq.filter(v=>v<Infinity));
    const rng=max2-min2||1;
    const pd=30,w=(W-pd*2)/seq.length;
    seq.forEach((v,i)=>{
      if(!isFinite(v))return;
      const bh=((v-min2)/rng)*(H-pd*2);
      const bx=pd+i*w;
      const bg=ctx.createLinearGradient(bx,H-pd-bh,bx,H-pd);
      bg.addColorStop(0,"#ff9800");bg.addColorStop(1,"#f97316");
      ctx.fillStyle=bg;ctx.fillRect(bx+2,H-pd-bh,w-4,bh);
      ctx.fillStyle="rgba(255,255,255,.6)";ctx.font="9px Cairo";ctx.textAlign="center";
      if(i<10)ctx.fillText(v>999?v.toExponential(0):v,bx+w/2,H-pd-bh-5);
    });
    // line
    ctx.strokeStyle="rgba(0,212,255,.5)";ctx.lineWidth=1.5;ctx.beginPath();
    seq.forEach((v,i)=>{if(!isFinite(v))return;const x=pd+i*w+w/2,y=H-pd-((v-min2)/rng)*(H-pd*2);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.textAlign="start";
  }
  sqSet("arith");
}

function buildLoops(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">💻 حلقة for — البرمجة</div>
  <div class="sim-layout">
    <div class="sim-canvas-box" style="height:320px"><canvas id="loC" height="310"></canvas></div>
    <div class="sim-panel">
      <div class="ctrl-box">
        <div style="font-weight:700;color:#e2e8f0;margin-bottom:8px">برمجة حلقة for:</div>
        <div style="background:#0f172a;border-radius:10px;padding:12px;font-family:monospace;font-size:0.88rem;color:#10b981;line-height:1.8">
          <span style="color:#7c3aed">for</span> (<span style="color:#ff9800">i</span>=<span id="loStartD">0</span>; <span style="color:#ff9800">i</span>&lt;<span id="loEndD">5</span>; <span style="color:#ff9800">i</span>++) {<br>
          &nbsp;&nbsp;<span id="loBodyD" style="color:#00d4ff">print(i)</span><br>
          }
        </div>
        <div class="ctrl-lbl" style="margin-top:12px">البداية <span id="loStL">0</span></div>
        <input type="range" id="loSt" min="0" max="5" value="0" oninput="loUpdate()">
        <div class="ctrl-lbl" style="margin-top:8px">النهاية <span id="loEnL">5</span></div>
        <input type="range" id="loEn" min="1" max="15" value="5" oninput="loUpdate()">
        <div class="ctrl-lbl" style="margin-top:8px">الخطوة step <span id="loSpL">1</span></div>
        <input type="range" id="loSp" min="1" max="5" value="1" oninput="loUpdate()">
      </div>
      <div class="sbtn-row">
        <button class="sbtn on" onclick="loRun()">▶ تشغيل</button>
        <button class="sbtn red" onclick="loReset()">↺</button>
      </div>
      <div class="info-card" id="loOutput" style="font-family:monospace;font-size:0.85rem;max-height:100px;overflow-y:auto"></div>
    </div>
  </div></div>`;
  const c=mkCanvas("loC",310),ctx=c.getContext("2d");
  let loStart=0,loEnd=5,loStep=1,loRunning=false,loI=0,loDelay=0;
  window.loUpdate=()=>{
    loStart=+document.getElementById("loSt").value;loEnd=+document.getElementById("loEn").value;loStep=+document.getElementById("loSp").value;
    document.getElementById("loStL").textContent=loStart;document.getElementById("loEnL").textContent=loEnd;document.getElementById("loSpL").textContent=loStep;
    document.getElementById("loStartD").textContent=loStart;document.getElementById("loEndD").textContent=loEnd;
    loReset();
  };
  window.loRun=()=>{loRunning=true;loI=loStart;document.getElementById("loOutput").textContent="";};
  window.loReset=()=>{loRunning=false;loI=loStart;document.getElementById("loOutput").textContent="";};
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    if(loRunning){loDelay++;if(loDelay%18===0){
      if(loI<loEnd){
        document.getElementById("loOutput").textContent+="i = "+loI+"\n";
        document.getElementById("loOutput").scrollTop=9999;
        loI+=loStep;
      }else{loRunning=false;}
    }}
    // visual: draw circles for each iteration done
    const total=Math.ceil((loEnd-loStart)/loStep);
    const done=Math.ceil((loI-loStart)/loStep);
    const cols=Math.ceil(Math.sqrt(total));
    const sz=Math.min((W-40)/cols,35);
    for(let idx=0;idx<total;idx++){
      const col=idx%cols,row=Math.floor(idx/cols);
      const x=20+col*sz+sz/2,y=20+row*sz+sz/2,val=loStart+idx*loStep;
      const isDone=idx<done;
      ctx.fillStyle=isDone?"rgba(255,152,0,.8)":"rgba(30,58,138,.4)";
      ctx.strokeStyle=isDone?"#ff9800":"rgba(255,255,255,.2)";
      ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,sz*.4,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle=isDone?"#fff":"rgba(255,255,255,.4)";ctx.font=`${sz*.3}px Cairo`;ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(val,x,y);
    }
    ctx.textAlign="start";ctx.textBaseline="alphabetic";
    // progress bar
    ctx.fillStyle="#1e3a5f";ctx.fillRect(20,H-25,W-40,10);
    ctx.fillStyle="#ff9800";ctx.fillRect(20,H-25,(W-40)*(done/Math.max(total,1)),10);
    ctx.font="11px Cairo";ctx.fillStyle="rgba(255,255,255,.5)";ctx.fillText(`التكرار: ${done} / ${total}`,20,H-8);
    animFrame=requestAnimationFrame(draw);
  }
  loUpdate();draw();
}

/* ══════════════════════════════════════════════
   27. SORTING
══════════════════════════════════════════════ */
function buildSorting(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">🔀 خوارزمية الفرز (Bubble Sort)</div>
  <div class="sim-canvas-box" style="height:280px"><canvas id="bsC" height="270"></canvas></div>
  <div class="sbtn-row" style="margin-top:14px">
    <button class="sbtn on" onclick="bsStart()">▶ ابدأ الفرز</button>
    <button class="sbtn" onclick="bsShuffle()">🔀 اخلط</button>
    <button class="sbtn red" onclick="bsReset()">↺</button>
  </div>
  <div class="ctrl-box" style="margin-top:12px">
    <div class="ctrl-lbl">عدد العناصر <span id="bsSzL">12</span></div>
    <input type="range" id="bsSz" min="5" max="25" value="12" oninput="bsSzUpdate()">
    <div class="ctrl-lbl" style="margin-top:8px">السرعة <span id="bsSpL">متوسط</span></div>
    <input type="range" id="bsSp" min="1" max="10" value="5" oninput="bsSpUpdate()">
  </div>
  <div class="info-row" style="margin-top:10px">
    <div class="ibox"><div class="v" id="bsSwaps">0</div><div class="l">التبادلات</div></div>
    <div class="ibox"><div class="v" id="bsComps">0</div><div class="l">المقارنات</div></div>
    <div class="ibox"><div class="v" id="bsStatus">—</div><div class="l">الحالة</div></div>
  </div></div>`;
  const c=mkCanvas("bsC",270),ctx=c.getContext("2d");
  let arr=[],n=12,sorting=false,si=0,sj=0,swaps=0,comps=0,speed3=5,done2=false,delay2=0;
  function init(){arr=Array.from({length:n},(_,i)=>Math.floor(Math.random()*90)+10);si=0;sj=0;swaps=0;comps=0;done2=false;document.getElementById("bsSwaps").textContent=0;document.getElementById("bsComps").textContent=0;document.getElementById("bsStatus").textContent="جاهز";}
  window.bsStart=()=>{sorting=true;document.getElementById("bsStatus").textContent="يفرز...";};
  window.bsShuffle=()=>{sorting=false;init();};
  window.bsReset=()=>{sorting=false;init();};
  window.bsSzUpdate=()=>{n=+document.getElementById("bsSz").value;document.getElementById("bsSzL").textContent=n;init();};
  window.bsSpUpdate=()=>{speed3=+document.getElementById("bsSp").value;const spLbl=speed3<4?"بطيء":speed3<7?"متوسط":"سريع";document.getElementById("bsSpL").textContent=spLbl;};
  init();
  function step(){
    if(!sorting||done2)return;
    delay2++;if(delay2<11-speed3)return;delay2=0;
    if(si<n-1){
      comps++;document.getElementById("bsComps").textContent=comps;
      if(arr[sj]>arr[sj+1]){[arr[sj],arr[sj+1]]=[arr[sj+1],arr[sj]];swaps++;document.getElementById("bsSwaps").textContent=swaps;}
      sj++;
      if(sj>=n-1-si){sj=0;si++;}
    }else{done2=true;sorting=false;document.getElementById("bsStatus").textContent="✅ مرتّب!";}
  }
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    step();
    const pd=20,bw=(W-pd*2)/arr.length;
    arr.forEach((v,i)=>{
      const bh=(v/100)*(H-pd*2);
      const isA=i===sj,isB=i===sj+1;
      const col=done2?"#10b981":isA||isB?"#ff9800":"#2a5298";
      const bg=ctx.createLinearGradient(pd+i*bw,H-pd-bh,pd+i*bw,H-pd);
      bg.addColorStop(0,col);bg.addColorStop(1,col+"88");
      ctx.fillStyle=bg;ctx.fillRect(pd+i*bw+2,H-pd-bh,bw-4,bh);
      if(isA||isB){ctx.strokeStyle="#ff9800";ctx.lineWidth=1.5;ctx.strokeRect(pd+i*bw+2,H-pd-bh,bw-4,bh);}
      if(bw>20){ctx.fillStyle="rgba(255,255,255,.6)";ctx.font="9px Cairo";ctx.textAlign="center";ctx.fillText(v,pd+i*bw+bw/2,H-pd+12);}
    });
    ctx.textAlign="start";
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

/* ══════════════════════════════════════════════
   28. BINARY
══════════════════════════════════════════════ */
function buildBinary(el){
  el.innerHTML=`<div class="sim-wrap">
  <div class="sim-h">01 البيانات الثنائية (Binary)</div>
  <div class="sim-canvas-box" style="height:220px"><canvas id="bnC" height="210"></canvas></div>
  <div class="ctrl-box" style="margin-top:12px">
    <div class="ctrl-lbl">الرقم العشري (Decimal) <span id="bnDL">42</span></div>
    <input type="range" id="bnD" min="0" max="255" value="42" oninput="bnUpdate()">
  </div>
  <div class="info-row" style="margin-top:12px">
    <div class="ibox"><div class="v" id="bnDec">42</div><div class="l">عشري (Dec)</div></div>
    <div class="ibox"><div class="v" id="bnBin" style="font-size:1rem">00101010</div><div class="l">ثنائي (Bin)</div></div>
    <div class="ibox"><div class="v" id="bnHex">2A</div><div class="l">سداسي (Hex)</div></div>
    <div class="ibox"><div class="v" id="bnOct">52</div><div class="l">ثماني (Oct)</div></div>
  </div>
  <div style="margin-top:14px">
    <div style="font-weight:700;color:#e2e8f0;margin-bottom:8px">انقر على البتات لتبديلها يدوياً:</div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap" id="bnBits"></div>
  </div>
  <div class="info-card" style="margin-top:12px">البيانات في الكمبيوتر تُمثَّل بصورة 0 و1 فقط. كل خانة (bit) تمثل قوة من قوى 2.</div>
  </div>`;
  const c=mkCanvas("bnC",210),ctx=c.getContext("2d");
  let dec=42;
  window.bnUpdate=()=>{dec=+document.getElementById("bnD").value;document.getElementById("bnDL").textContent=dec;bnRefresh();};
  function bnRefresh(){
    document.getElementById("bnDec").textContent=dec;
    document.getElementById("bnBin").textContent=dec.toString(2).padStart(8,"0");
    document.getElementById("bnHex").textContent=dec.toString(16).toUpperCase();
    document.getElementById("bnOct").textContent=dec.toString(8);
    // interactive bits
    const bits=dec.toString(2).padStart(8,"0");
    document.getElementById("bnBits").innerHTML=bits.split("").map((b,i)=>{
      const pow=Math.pow(2,7-i);
      return`<div onclick="bnToggle(${i})" style="width:52px;height:60px;background:${b==="1"?"rgba(255,152,0,.2)":"rgba(30,58,138,.2)"};border:2px solid ${b==="1"?"#ff9800":"#1e3a5f"};border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s">
        <div style="font-size:1.2rem;font-weight:900;color:${b==="1"?"#ff9800":"#94a3b8"}">${b}</div>
        <div style="font-size:0.65rem;color:#64748b">2^${7-i}</div>
        <div style="font-size:0.65rem;color:#64748b">${pow}</div>
      </div>`;}).join("");
    draw();
  }
  window.bnToggle=(i)=>{
    const bits=dec.toString(2).padStart(8,"0").split("");
    bits[i]=bits[i]==="1"?"0":"1";
    dec=parseInt(bits.join(""),2);
    document.getElementById("bnD").value=dec;document.getElementById("bnDL").textContent=dec;
    bnRefresh();
  };
  function draw(){
    const W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#060d1a";ctx.fillRect(0,0,W,H);
    const bits=dec.toString(2).padStart(8,"0");
    const bw=(W-40)/8,by=H*.25;
    bits.split("").forEach((b,i)=>{
      const bx=20+i*bw;const isOne=b==="1";
      const bg=ctx.createLinearGradient(bx,by-30,bx,by+30);
      bg.addColorStop(0,isOne?"#ff9800":"#1e3a5f");bg.addColorStop(1,isOne?"#f97316":"#0f172a");
      ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(bx+3,by-25,bw-6,50,6);ctx.fill();
      ctx.strokeStyle=isOne?"#ff9800":"rgba(255,255,255,.1)";ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle=isOne?"#fff":"#64748b";ctx.font=`bold ${Math.min(bw*.6,22)}px monospace`;ctx.textAlign="center";
      ctx.fillText(b,bx+bw/2,by+7);
      ctx.fillStyle="rgba(255,255,255,.4)";ctx.font="9px Cairo";
      ctx.fillText("2^"+(7-i),bx+bw/2,by+35);
    });
    // value display
    ctx.font="bold 20px Cairo";ctx.fillStyle="#ff9800";ctx.textAlign="center";
    ctx.fillText(dec+" = "+bits,W/2,H-15);
    ctx.textAlign="start";
    animFrame=requestAnimationFrame(draw);
  }
  bnRefresh();
}

renderCards();
</script>

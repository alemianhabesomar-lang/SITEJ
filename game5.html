<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #1a2942;
            --navy-lighter: #3d5a7f;
            --accent-blue: #4a90e2;
            --accent-light-blue: #6fa8ec;
            --accent-sky: #87ceeb;
            --gradient-blue-glow: linear-gradient(135deg, #4a90e2 0%, #6fa8ec 50%, #87ceeb 100%);
            --gradient-navy-soft: linear-gradient(135deg, #1a2942 0%, #3d5a7f 50%, #b8c9dc 100%);
            --border-blue: rgba(74,144,226,0.3);
            --shadow-blue: rgba(74,144,226,0.22);
            --text-navy: #0a1628;
            --text-gray: #6b7c93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #e8eef5 25%, #b8c9dc 60%, #3d5a7f 85%, #1a2942 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cairo', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 900px;
            height: 650px;
            background: linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(232,238,245,0.97) 100%);
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 40px rgba(74,144,226,0.3), inset 0 0 40px rgba(74,144,226,0.04);
            border-radius: 20px;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%; height: 100%;
            position: absolute;
            top: 0; left: 0;
            border-radius: 20px;
        }

        #startScreen, #gameOver {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.98);
            padding: 36px 44px;
            border: 2px solid var(--accent-blue);
            border-radius: 24px;
            text-align: center;
            color: var(--navy-dark);
            z-index: 20;
            box-shadow: 0 20px 60px rgba(74,144,226,0.22);
            min-width: 580px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #gameOver { display: none; }

        h1 {
            font-size: 36px;
            margin-bottom: 8px;
            font-weight: 900;
            background: var(--gradient-navy-soft);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 17px;
            margin-bottom: 20px;
            color: var(--accent-blue);
            font-weight: 700;
        }

        .modeButtons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            background: var(--gradient-blue-glow);
            color: #fff;
            border: none;
            padding: 13px 22px;
            font-size: 15px;
            font-family: 'Cairo', Arial, sans-serif;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: 700;
            box-shadow: 0 4px 14px var(--shadow-blue);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(74,144,226,0.42);
        }

        button:active { transform: translateY(-1px); }

        #menuButton {
            position: absolute;
            top: 15px; right: 15px;
            background: var(--gradient-blue-glow);
            color: #fff;
            border: none;
            padding: 10px 22px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: 700;
            z-index: 30;
            display: none;
            box-shadow: 0 4px 14px var(--shadow-blue);
        }

        #menuButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(74,144,226,0.42);
        }

        #gameArea {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        #stats {
            background: rgba(255,255,255,0.93);
            padding: 14px 20px;
            border-bottom: 1.5px solid var(--border-blue);
            display: flex;
            justify-content: space-around;
            color: var(--navy-dark);
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 2px 12px rgba(74,144,226,0.08);
        }

        #stats span { color: var(--accent-blue); font-weight: 900; }

        #questionArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 30px;
            gap: 18px;
            overflow-y: auto;
            background: rgba(248,249,250,0.5);
        }

        #questionDisplay {
            font-size: 32px;
            color: var(--navy-dark);
            font-weight: 800;
            background: rgba(255,255,255,0.95);
            padding: 22px 40px;
            border-radius: 18px;
            border: 2px solid var(--border-blue);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.6;
            box-shadow: 0 4px 16px var(--shadow-blue);
            width: 100%;
            max-width: 720px;
        }

        #questionHint {
            font-size: 15px;
            color: var(--text-gray);
            font-weight: 700;
            background: rgba(74,144,226,0.07);
            padding: 10px 22px;
            border-radius: 50px;
            border: 1.5px solid var(--border-blue);
        }

        #answersArea {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 13px;
            width: 100%;
            max-width: 680px;
        }

        .answerButton {
            padding: 16px 18px;
            font-size: 18px;
            background: rgba(255,255,255,0.95);
            color: var(--navy-dark);
            border: 2px solid var(--border-blue);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            font-family: 'Cairo', Arial, sans-serif;
            box-shadow: 0 3px 12px rgba(74,144,226,0.1);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .answerButton:hover {
            background: rgba(74,144,226,0.08);
            border-color: var(--accent-blue);
            transform: scale(1.04);
            box-shadow: 0 6px 18px var(--shadow-blue);
            color: var(--accent-blue);
        }

        .answerButton.correct {
            background: rgba(32,201,151,0.12);
            border-color: #20c997;
            color: #0d7a5f;
            animation: correctPulse 0.5s;
        }

        .answerButton.incorrect {
            background: rgba(238,90,111,0.1);
            border-color: #ee5a6f;
            color: #c0392b;
            animation: shake 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.07); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-8px); }
            75%       { transform: translateX(8px); }
        }

        #inputArea {
            width: 100%;
            max-width: 580px;
            display: none;
        }

        #textInput {
            width: 100%;
            padding: 16px 20px;
            font-size: 22px;
            font-family: 'Cairo', Arial, sans-serif;
            background: rgba(255,255,255,0.95);
            border: 2px solid var(--border-blue);
            border-radius: 14px;
            color: var(--navy-dark);
            outline: none;
            text-align: center;
            font-weight: 700;
            transition: all 0.3s;
        }

        #textInput:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(74,144,226,0.1);
            background: #fff;
        }

        #textInput::placeholder { color: rgba(74,144,226,0.4); }

        #submitButton {
            margin-top: 12px;
            width: 100%;
            padding: 15px;
            font-size: 17px;
            border-radius: 50px;
        }

        #resultsStats {
            margin: 20px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .resultItem {
            background: rgba(74,144,226,0.06);
            padding: 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border-blue);
        }

        .resultLabel {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .resultValue {
            font-size: 30px;
            font-weight: 900;
            color: var(--accent-blue);
        }

        .rating {
            font-size: 20px;
            font-weight: 800;
            margin-top: 14px;
            padding: 14px;
            background: rgba(74,144,226,0.07);
            border-radius: 14px;
            border: 1.5px solid var(--border-blue);
            color: var(--navy-dark);
        }

        #feedback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 42px;
            font-weight: 900;
            color: var(--accent-blue);
            pointer-events: none;
            z-index: 25;
            display: none;
            animation: feedbackAnimation 1s ease-out;
            background: rgba(255,255,255,0.95);
            padding: 14px 30px;
            border-radius: 18px;
            border: 2px solid var(--border-blue);
            box-shadow: 0 8px 28px var(--shadow-blue);
            text-align: center;
            max-width: 80%;
        }

        @keyframes feedbackAnimation {
            0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50%  { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1);   opacity: 0; }
        }

        .mode-icon { font-size: 20px; margin-right: 8px; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="650"></canvas>

    <button id="menuButton" onclick="returnToMenu()">Main Menu</button>

    <div id="startScreen">
        <h1>📚 English Learning Academy</h1>
        <h2>Choose Your Learning Topic</h2>
        <div class="modeButtons">
            <button onclick="startGame('alphabet')"><span class="mode-icon">🔤</span> Alphabet</button>
            <button onclick="startGame('vocabulary')"><span class="mode-icon">📖</span> Vocabulary</button>
            <button onclick="startGame('grammar')"><span class="mode-icon">✍️</span> Grammar</button>
            <button onclick="startGame('spelling')"><span class="mode-icon">📝</span> Spelling</button>
            <button onclick="startGame('synonyms')"><span class="mode-icon">🔄</span> Synonyms</button>
            <button onclick="startGame('antonyms')"><span class="mode-icon">↔️</span> Antonyms</button>
            <button onclick="startGame('idioms')"><span class="mode-icon">💡</span> Idioms</button>
            <button onclick="startGame('mixed')"><span class="mode-icon">🎲</span> Mixed Challenge</button>
        </div>
    </div>

    <div id="gameArea">
        <div id="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Question: <span id="questionNumber">1</span>/10</div>
            <div>Correct: <span id="correct">0</span></div>
            <div>Accuracy: <span id="accuracy">100%</span></div>
        </div>
        <div id="questionArea">
            <div id="questionDisplay"></div>
            <div id="questionHint"></div>
            <div id="answersArea"></div>
            <div id="inputArea">
                <input type="text" id="textInput" placeholder="Type your answer here...">
                <button id="submitButton" onclick="checkTextAnswer()">Submit</button>
            </div>
        </div>
    </div>

    <div id="gameOver">
        <h1>Final Results! 🏆</h1>
        <div id="resultsStats">
            <div class="resultItem">
                <div class="resultLabel">Final Score</div>
                <div class="resultValue" id="finalScore">0</div>
            </div>
            <div class="resultItem">
                <div class="resultLabel">Correct Answers</div>
                <div class="resultValue"><span id="finalCorrect">0</span>/10</div>
            </div>
            <div class="resultItem">
                <div class="resultLabel">Accuracy</div>
                <div class="resultValue"><span id="finalAccuracy">0</span>%</div>
            </div>
            <div class="resultItem">
                <div class="resultLabel">Level</div>
                <div class="resultValue" id="level" style="font-size:24px;">Beginner</div>
            </div>
        </div>
        <div class="rating" id="rating">⭐ Excellent!</div>
        <button onclick="returnToMenu()" style="margin-top:18px;">Main Menu</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameRunning = false;
    let gameMode = 'alphabet';
    let score = 0, correctAnswers = 0, wrongAnswers = 0;
    let currentQuestion = null, questionCount = 0;
    let maxQuestions = 10, usedQuestions = [];

    const gameData = {
        alphabet: [
            { q:'Which letter comes between F and H?', a:['E','G','I','J'], correct:'G', hint:'Middle letter' },
            { q:'What is the 10th letter of the alphabet?', a:['I','J','K','L'], correct:'J', hint:'Count from A' },
            { q:'Which letter comes after P?', a:['O','Q','R','S'], correct:'Q', hint:'17th letter' },
            { q:'How many vowels are in the alphabet?', a:['3','4','5','6'], correct:'5', hint:'A, E, I, O, U' },
            { q:'Which is the 3rd letter?', a:['A','B','C','D'], correct:'C', hint:'After B' },
            { q:'Which letter comes before K?', a:['I','J','L','M'], correct:'J', hint:'One before K' },
            { q:'Which word comes last alphabetically?', a:['Zebra','Apple','Mango','Dog'], correct:'Zebra', hint:'Z is last' },
            { q:'Which is NOT a vowel?', a:['U','I','T','O'], correct:'T', hint:'Consonant' },
            { q:'What letter comes after S?', a:['R','T','U','V'], correct:'T', hint:'20th letter' },
            { q:'Which comes first: Dog, Ball, or Cat?', a:['Dog','Ball','Cat','All same'], correct:'Ball', hint:'B before C and D' }
        ],
        vocabulary: [
            { q:'🌙 What is this?', a:['Sun','Star','Moon','Cloud'], correct:'Moon', hint:'Shines at night' },
            { q:'🐶 What is this animal?', a:['Cat','Dog','Mouse','Bird'], correct:'Dog', hint:'Says woof' },
            { q:'🍌 What is this fruit?', a:['Apple','Orange','Banana','Grape'], correct:'Banana', hint:'Yellow and curved' },
            { q:'✈️ What is this vehicle?', a:['Car','Boat','Plane','Train'], correct:'Plane', hint:'Flies in sky' },
            { q:'⭐ What is this?', a:['Moon','Star','Sun','Planet'], correct:'Star', hint:'Twinkles at night' },
            { q:'🎸 What is this?', a:['Piano','Guitar','Drum','Flute'], correct:'Guitar', hint:'String instrument' },
            { q:'🏫 What is this place?', a:['Hospital','School','Mall','Park'], correct:'School', hint:'Where students learn' },
            { q:'⚽ What is this sport item?', a:['Basketball','Baseball','Football','Tennis ball'], correct:'Football', hint:'Soccer ball' },
            { q:'🍕 What is this food?', a:['Burger','Pizza','Sandwich','Pasta'], correct:'Pizza', hint:'Italian dish' },
            { q:'🌳 What is this?', a:['Bush','Flower','Tree','Grass'], correct:'Tree', hint:'Tall plant with trunk' }
        ],
        grammar: [
            { q:'She ___ to school every day.', a:['go','goes','going','gone'], correct:'goes', hint:'Third person singular' },
            { q:'We ___ playing outside now.', a:['is','am','are','be'], correct:'are', hint:'Plural subject' },
            { q:'Yesterday, I ___ to the park.', a:['go','went','gone','going'], correct:'went', hint:'Past tense' },
            { q:'What is the plural of "foot"?', a:['foots','feet','footes','feets'], correct:'feet', hint:'Irregular plural' },
            { q:'What is the past tense of "eat"?', a:['eated','eaten','ate','eating'], correct:'ate', hint:'Past simple' },
            { q:'Which is correct?', a:['They is happy','They are happy','They am happy','They be happy'], correct:'They are happy', hint:'Plural verb' },
            { q:'Which is an adverb?', a:['quick','quickly','quickness','quicker'], correct:'quickly', hint:'Describes how' },
            { q:'Which sentence is correct?', a:['I has a pen','I have a pen','I haves a pen','I having a pen'], correct:'I have a pen', hint:'First person' },
            { q:'What type of word is "beautiful"?', a:['Noun','Verb','Adjective','Adverb'], correct:'Adjective', hint:'Describes' },
            { q:'What is the plural of "mouse"?', a:['mouses','mice','mices','mouse'], correct:'mice', hint:'Irregular' }
        ],
        spelling: [
            { q:'Spell: Necessary', correct:'necessary', hint:'N-E-C-E-S-S-A-R-Y', type:'text' },
            { q:'Spell: Restaurant', correct:'restaurant', hint:'Place to eat', type:'text' },
            { q:'Spell: Library', correct:'library', hint:'Place with books', type:'text' },
            { q:'Spell: Chocolate', correct:'chocolate', hint:'Sweet treat', type:'text' },
            { q:'Which is correct?', a:['accomodate','accommodate','acomodate','acommodate'], correct:'accommodate', hint:'Double C and M' },
            { q:'Which is correct?', a:['wierd','weird','werid','weerd'], correct:'weird', hint:'Exception to I before E' },
            { q:'Which is correct?', a:['goverment','governmant','government','govermant'], correct:'government', hint:'Rules a country' },
            { q:'Which is correct?', a:['enviroment','environment','enviornment','enviorment'], correct:'environment', hint:'Nature around us' },
            { q:'Which is correct?', a:['beleive','believe','beleave','belive'], correct:'believe', hint:'I before E' },
            { q:'Which is correct?', a:['fourty','forty','fourthy','fourty'], correct:'forty', hint:'Number 40' }
        ],
        synonyms: [
            { q:'Synonym of "tiny"?', a:['huge','small','tall','wide'], correct:'small', hint:'Very small' },
            { q:'Synonym of "brave"?', a:['scared','courageous','weak','shy'], correct:'courageous', hint:'Fearless' },
            { q:'Synonym of "angry"?', a:['happy','mad','calm','kind'], correct:'mad', hint:'Upset' },
            { q:'Synonym of "talk"?', a:['listen','speak','write','read'], correct:'speak', hint:'Use words' },
            { q:'Synonym of "funny"?', a:['sad','boring','hilarious','serious'], correct:'hilarious', hint:'Makes you laugh' },
            { q:'Synonym of "start"?', a:['end','begin','finish','stop'], correct:'begin', hint:'Commence' },
            { q:'Synonym of "quiet"?', a:['loud','noisy','silent','busy'], correct:'silent', hint:'No noise' },
            { q:'Synonym of "glad"?', a:['sad','angry','happy','tired'], correct:'happy', hint:'Joyful' },
            { q:'Synonym of "rich"?', a:['poor','wealthy','broke','cheap'], correct:'wealthy', hint:'Lots of money' },
            { q:'Synonym of "easy"?', a:['hard','simple','difficult','tough'], correct:'simple', hint:'Not complicated' }
        ],
        antonyms: [
            { q:'Opposite of "light"?', a:['bright','dark','white','clear'], correct:'dark', hint:'No light' },
            { q:'Opposite of "right"?', a:['correct','left','up','down'], correct:'left', hint:'Direction' },
            { q:'Opposite of "full"?', a:['filled','complete','empty','whole'], correct:'empty', hint:'Nothing inside' },
            { q:'Opposite of "loud"?', a:['noisy','quiet','sound','music'], correct:'quiet', hint:'Soft sound' },
            { q:'Opposite of "clean"?', a:['pure','dirty','neat','tidy'], correct:'dirty', hint:'Not clean' },
            { q:'Opposite of "good"?', a:['great','nice','bad','fine'], correct:'bad', hint:'Not good' },
            { q:'Opposite of "wet"?', a:['water','rain','dry','damp'], correct:'dry', hint:'No water' },
            { q:'Opposite of "happy"?', a:['joyful','glad','sad','excited'], correct:'sad', hint:'Not happy' },
            { q:'Opposite of "high"?', a:['tall','up','low','top'], correct:'low', hint:'Near ground' },
            { q:'Opposite of "thick"?', a:['fat','wide','thin','big'], correct:'thin', hint:'Not thick' }
        ],
        idioms: [
            { q:'Complete: Bite off more than you can ___', a:['eat','chew','swallow','drink'], correct:'chew', hint:'Take too much' },
            { q:'Complete: Under the ___', a:['sun','weather','sky','rain'], correct:'weather', hint:'Feeling sick' },
            { q:'Complete: Costs an arm and a ___', a:['hand','leg','foot','toe'], correct:'leg', hint:'Very expensive' },
            { q:'Complete: Hit the nail on the ___', a:['roof','head','ball','wall'], correct:'head', hint:'Exactly right' },
            { q:'Complete: Barking up the wrong ___', a:['dog','tree','cat','house'], correct:'tree', hint:'Wrong approach' },
            { q:'Complete: Let the cat out of the ___', a:['house','box','room','bag'], correct:'bag', hint:'Reveal a secret' },
            { q:'Complete: A blessing in ___', a:['heaven','disguise','peace','love'], correct:'disguise', hint:'Good from bad' },
            { q:'Complete: Actions speak louder than ___', a:['sounds','words','music','voice'], correct:'words', hint:"Do, don't just say" },
            { q:'Complete: Bite the ___', a:['food','bullet','apple','hand'], correct:'bullet', hint:'Face something difficult' },
            { q:'Complete: Best of both ___', a:['sides','worlds','ways','times'], correct:'worlds', hint:'Two good things' }
        ]
    };

    let dots = [];
    for (let i = 0; i < 55; i++) {
        dots.push({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            radius: Math.random()*2.5+0.8, speed: Math.random()*0.35+0.1,
            opacity: Math.random()*0.14+0.04,
            color: Math.random()>0.5 ? '74,144,226' : '26,41,66'
        });
    }

    function drawBackground() {
        const bg = ctx.createLinearGradient(0,0,0,canvas.height);
        bg.addColorStop(0,'#f8f9fa'); bg.addColorStop(1,'#e8eef5');
        ctx.fillStyle = bg;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        dots.forEach(d => {
            ctx.fillStyle = `rgba(${d.color},${d.opacity})`;
            ctx.beginPath(); ctx.arc(d.x,d.y,d.radius,0,Math.PI*2); ctx.fill();
            d.y += d.speed;
            if (d.y > canvas.height) { d.y=0; d.x=Math.random()*canvas.width; }
        });
    }

    function backgroundLoop() { drawBackground(); requestAnimationFrame(backgroundLoop); }

    function startGame(mode) {
        gameMode = mode; gameRunning = true;
        score=0; correctAnswers=0; wrongAnswers=0; questionCount=0; usedQuestions=[];
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameArea').style.display = 'flex';
        document.getElementById('menuButton').style.display = 'block';
        updateStats(); generateQuestion();
    }

    function generateQuestion() {
        if (questionCount >= maxQuestions) { endGame(); return; }
        questionCount++;
        let questionSet;
        if (gameMode === 'mixed') {
            const modes = ['alphabet','vocabulary','grammar','spelling','synonyms','antonyms','idioms'];
            questionSet = gameData[modes[Math.floor(Math.random()*modes.length)]];
        } else { questionSet = gameData[gameMode]; }

        let available = questionSet.filter((q,i) => !usedQuestions.includes(gameMode+i));
        if (available.length === 0) { usedQuestions=[]; available=questionSet; }
        const selected = available[Math.floor(Math.random()*available.length)];
        usedQuestions.push(gameMode+questionSet.indexOf(selected));
        currentQuestion = selected;
        displayQuestion();
    }

    function displayQuestion() {
        document.getElementById('questionDisplay').textContent = currentQuestion.q;
        document.getElementById('questionHint').textContent = currentQuestion.hint || '';
        const answersArea = document.getElementById('answersArea');
        const inputArea = document.getElementById('inputArea');
        if (currentQuestion.type === 'text') {
            answersArea.style.display = 'none'; inputArea.style.display = 'block';
            document.getElementById('textInput').value = '';
            document.getElementById('textInput').focus();
        } else {
            answersArea.style.display = 'grid'; inputArea.style.display = 'none';
            answersArea.innerHTML = '';
            currentQuestion.a.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'answerButton'; btn.textContent = answer;
                btn.onclick = () => checkAnswer(answer, btn);
                answersArea.appendChild(btn);
            });
        }
    }

    function checkAnswer(answer, btnEl) {
        document.querySelectorAll('.answerButton').forEach(b => b.style.pointerEvents='none');
        if (answer === currentQuestion.correct) {
            btnEl.classList.add('correct'); score+=10; correctAnswers++;
            showFeedback('Correct! ✅', '#20c997');
        } else {
            btnEl.classList.add('incorrect'); wrongAnswers++;
            showFeedback('Try Again! ❌', '#ee5a6f');
            document.querySelectorAll('.answerButton').forEach(b => {
                if (b.textContent === currentQuestion.correct) b.classList.add('correct');
            });
        }
        updateStats();
        setTimeout(generateQuestion, 1500);
    }

    function checkTextAnswer() {
        const ua = document.getElementById('textInput').value.trim().toLowerCase();
        if (ua === currentQuestion.correct.toLowerCase()) {
            score+=10; correctAnswers++;
            showFeedback('Perfect! ✅', '#20c997');
        } else {
            wrongAnswers++;
            showFeedback('Answer: '+currentQuestion.correct, '#ee5a6f');
        }
        updateStats();
        setTimeout(generateQuestion, 2000);
    }

    document.getElementById('textInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') checkTextAnswer();
    });

    function showFeedback(text, color) {
        const fb = document.getElementById('feedback');
        fb.textContent = text; fb.style.color = color;
        fb.style.borderColor = color+'55'; fb.style.display = 'block';
        setTimeout(() => fb.style.display='none', 1000);
    }

    function updateStats() {
        document.getElementById('score').textContent = score;
        document.getElementById('questionNumber').textContent = questionCount;
        document.getElementById('correct').textContent = correctAnswers;
        const total = correctAnswers+wrongAnswers;
        document.getElementById('accuracy').textContent = (total>0?Math.round((correctAnswers/total)*100):100)+'%';
    }

    function getLevel(s) {
        if (s>=90) return 'Expert 🏆'; if (s>=70) return 'Advanced 🌟';
        if (s>=50) return 'Intermediate ⭐'; return 'Beginner 📚';
    }

    function getRating(acc) {
        if (acc>=90) return "🏆 Outstanding! You're a star!";
        if (acc>=75) return "⭐ Excellent! Keep it up!";
        if (acc>=60) return "👍 Good job! Practice more!";
        if (acc>=50) return "💪 Not bad! Keep trying!";
        return "📚 Need more practice!";
    }

    function endGame() {
        gameRunning = false;
        const total = correctAnswers+wrongAnswers;
        const fa = total>0?Math.round((correctAnswers/total)*100):0;
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalCorrect').textContent = correctAnswers;
        document.getElementById('finalAccuracy').textContent = fa;
        document.getElementById('level').textContent = getLevel(score);
        document.getElementById('rating').textContent = getRating(fa);
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('gameOver').style.display = 'block';
    }

    function returnToMenu() {
        gameRunning=false; questionCount=0; usedQuestions=[];
        document.getElementById('startScreen').style.display = 'block';
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('gameOver').style.display = 'none';
        document.getElementById('menuButton').style.display = 'none';
    }

    backgroundLoop();
</script>
</body>
</html>

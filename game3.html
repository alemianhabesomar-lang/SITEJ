<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Racer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a12, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 900px;
            height: 650px;
            background: linear-gradient(to bottom, #000000, #0a0a1a);
            border: 3px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), 
                        inset 0 0 50px rgba(65, 105, 225, 0.1);
            border-radius: 5px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #startScreen, #resultsScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 10, 0.98), rgba(10, 10, 26, 0.95));
            padding: 50px;
            border: 3px solid #d4af37;
            border-radius: 15px;
            text-align: center;
            color: #d4af37;
            z-index: 20;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6),
                        inset 0 0 30px rgba(65, 105, 225, 0.1);
            min-width: 500px;
        }

        #resultsScreen {
            display: none;
        }

        h1 {
            font-size: 52px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 1),
                         0 0 40px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 35px;
            color: #4169e1;
            text-shadow: 0 0 10px rgba(65, 105, 225, 0.8);
        }

        .difficultyButtons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background: linear-gradient(to bottom, #d4af37, #b8941f);
            color: #000;
            border: 2px solid #f0c950;
            padding: 18px 35px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: linear-gradient(to bottom, #f0c950, #d4af37);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(212, 175, 55, 0.4);
        }

        #menuButton {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(to bottom, #d4af37, #b8941f);
            color: #000;
            border: 2px solid #f0c950;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: bold;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        #menuButton:hover {
            background: linear-gradient(to bottom, #f0c950, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5);
        }

        #menuButton:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(212, 175, 55, 0.3);
        }

        #gameArea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        #stats {
            background: rgba(0, 0, 10, 0.6);
            padding: 20px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: space-around;
            color: #d4af37;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        #stats div {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        #stats .label {
            font-size: 14px;
            opacity: 0.8;
        }

        #stats .value {
            font-size: 32px;
            font-weight: bold;
            color: #f0c950;
            text-shadow: 0 0 15px rgba(240, 201, 80, 0.8);
        }

        #textDisplay {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #textContent {
            font-size: 28px;
            line-height: 2;
            color: #a8c5e8;
            text-align: left;
            max-width: 800px;
            letter-spacing: 2px;
            word-spacing: 8px;
        }

        .correct {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
            font-weight: bold;
        }

        .incorrect {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.3);
            padding: 2px 4px;
            border-radius: 3px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
            text-decoration: line-through;
        }

        .current {
            background: rgba(212, 175, 55, 0.4);
            border-bottom: 3px solid #d4af37;
            padding: 2px 4px;
            margin: 0 2px;
            border-radius: 3px;
            animation: pulse 1s infinite, glow 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
            }
            50% {
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.9);
            }
        }

        #inputArea {
            background: rgba(0, 0, 10, 0.8);
            padding: 30px;
            border-top: 2px solid rgba(212, 175, 55, 0.3);
        }

        #typingInput {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 10, 0.9);
            border: 2px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            outline: none;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3),
                        inset 0 0 10px rgba(65, 105, 225, 0.1);
            text-align: center;
            transition: all 0.2s;
        }

        #typingInput:focus {
            border-color: #f0c950;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5),
                        inset 0 0 15px rgba(65, 105, 225, 0.2);
        }

        #typingInput.correct-flash {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }

        #typingInput.incorrect-flash {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #typingInput::placeholder {
            color: rgba(212, 175, 55, 0.4);
        }

        #resultsStats {
            margin: 30px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .resultItem {
            background: rgba(0, 0, 10, 0.5);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .resultLabel {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .resultValue {
            font-size: 36px;
            font-weight: bold;
            color: #f0c950;
            text-shadow: 0 0 10px rgba(240, 201, 80, 0.8);
        }

        .resultUnit {
            font-size: 18px;
            opacity: 0.8;
            margin-left: 5px;
        }

        #progressBar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 10, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        #progressFill {
            height: 100%;
            background: linear-gradient(to right, #d4af37, #f0c950);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        .rating {
            font-size: 28px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            border: 2px solid rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="650"></canvas>

        <button id="menuButton" onclick="returnToMenu()">Main Menu</button>

        <div id="startScreen">
            <h1>TYPING SPEED RACER</h1>
            <h2>Choose Your Challenge</h2>
            <div class="difficultyButtons">
                <button onclick="startGame('easy')">🌱 Easy - Simple Words</button>
                <button onclick="startGame('medium')">⚡ Medium - Mixed Text</button>
                <button onclick="startGame('hard')">🔥 Hard - Complex Sentences</button>
                <button onclick="startGame('extreme')">💫 Extreme - Advanced Vocabulary</button>
            </div>
        </div>

        <div id="gameArea">
            <div id="stats">
                <div>
                    <span class="label">WPM</span>
                    <span class="value" id="wpm">0</span>
                </div>
                <div>
                    <span class="label">Accuracy</span>
                    <span class="value" id="accuracy">100%</span>
                </div>
                <div>
                    <span class="label">Time</span>
                    <span class="value" id="timer">60</span>
                </div>
                <div>
                    <span class="label">Progress</span>
                    <span class="value" id="progress">0%</span>
                </div>
            </div>

            <div id="textDisplay">
                <div id="textContent"></div>
            </div>

            <div id="inputArea">
                <input type="text" id="typingInput" placeholder="Start typing..." autocomplete="off" spellcheck="false">
                <div id="progressBar">
                    <div id="progressFill"></div>
                </div>
            </div>
        </div>

        <div id="resultsScreen">
            <h1>RACE COMPLETE! 🏁</h1>
            <div id="resultsStats">
                <div class="resultItem">
                    <div class="resultLabel">Words Per Minute</div>
                    <div class="resultValue"><span id="finalWPM">0</span><span class="resultUnit">WPM</span></div>
                </div>
                <div class="resultItem">
                    <div class="resultLabel">Accuracy</div>
                    <div class="resultValue"><span id="finalAccuracy">0</span><span class="resultUnit">%</span></div>
                </div>
                <div class="resultItem">
                    <div class="resultLabel">Characters Typed</div>
                    <div class="resultValue" id="finalChars">0</div>
                </div>
                <div class="resultItem">
                    <div class="resultLabel">Correct Words</div>
                    <div class="resultValue" id="finalWords">0</div>
                </div>
            </div>
            <div class="rating" id="rating">⭐ Excellent Typing!</div>
            <button onclick="returnToMenu()" style="margin-top: 20px;">Main Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameRunning = false;
        let difficulty = 'medium';
        let currentText = '';
        let currentIndex = 0;
        let startTime = null;
        let timeLeft = 60;
        let correctChars = 0;
        let totalChars = 0;
        let correctWords = 0;

        // Text samples for different difficulties
        const textSamples = {
            easy: [
                "the quick brown fox jumps over the lazy dog",
                "a cat sat on a mat and looked at the rat",
                "the sun is bright and warm today",
                "I like to play games and have fun",
                "the tree has green leaves in summer",
                "birds fly high in the blue sky",
                "water is clear and cool to drink",
                "the moon shines at night with stars",
                "dogs bark and cats meow all day",
                "fish swim in the deep blue sea",
                "red apples grow on tall green trees",
                "rain falls down from gray clouds above"
            ],
            medium: [
                "Technology has transformed the way we communicate and work in modern society",
                "Learning new skills requires dedication, practice, and a willingness to make mistakes",
                "The ancient library contained thousands of books written in various languages",
                "Scientists continue to discover amazing facts about our universe and its mysteries",
                "Cooking delicious meals requires fresh ingredients and proper techniques",
                "Music has the power to evoke emotions and create lasting memories",
                "Reading books expands your imagination and knowledge of the world around you",
                "Exercise and healthy eating habits contribute to a long and fulfilling life",
                "History teaches us valuable lessons from the successes and failures of the past",
                "Teamwork and collaboration are essential skills in the modern workplace"
            ],
            hard: [
                "The philosophical implications of artificial intelligence challenge our understanding of consciousness and human nature",
                "Biodiversity plays a crucial role in maintaining ecological balance and ensuring the sustainability of our planet",
                "Quantum mechanics revolutionized physics by introducing uncertainty and wave-particle duality concepts",
                "The Renaissance period marked a significant transformation in art, science, and human thought across Europe",
                "Climate change represents one of the most pressing challenges facing humanity in the twenty-first century",
                "Democratic institutions require constant vigilance and active participation from informed citizens",
                "Economic globalization has interconnected markets and cultures in unprecedented ways",
                "Archaeological discoveries continue to reshape our understanding of ancient civilizations"
            ],
            extreme: [
                "The epistemological ramifications of post-modernist discourse necessitate a comprehensive reassessment of traditional paradigms",
                "Neuroplasticity demonstrates the brain's remarkable capacity for reorganization and adaptation throughout one's lifespan",
                "Cryptocurrency and blockchain technology have precipitated unprecedented disruption in traditional financial systems",
                "The juxtaposition of indigenous knowledge systems with contemporary scientific methodologies reveals fascinating insights",
                "Anthropogenic factors contributing to environmental degradation require immediate interdisciplinary intervention strategies",
                "Phenomenological approaches to consciousness studies challenge reductionist neuroscientific interpretations",
                "Macroeconomic policy decisions have far-reaching ramifications for international trade and diplomatic relations",
                "Bioethical considerations surrounding genetic engineering demand rigorous philosophical and legislative frameworks"
            ]
        };

        // Stars background
        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.2,
                opacity: Math.random() * 0.5 + 0.5,
                twinkleSpeed: Math.random() * 0.02 + 0.01,
                twinklePhase: Math.random() * Math.PI * 2
            });
        }

        function drawStars() {
            stars.forEach(star => {
                const twinkle = Math.sin(star.twinklePhase) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(168, 197, 232, ${star.opacity * twinkle})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                star.twinklePhase += star.twinkleSpeed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function backgroundLoop() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updateStars();
            drawStars();
            
            requestAnimationFrame(backgroundLoop);
        }

        function startGame(level) {
            difficulty = level;
            gameRunning = true;
            currentIndex = 0;
            correctChars = 0;
            totalChars = 0;
            correctWords = 0;
            timeLeft = 60;
            startTime = null;

            // Get random text based on difficulty
            const texts = textSamples[difficulty];
            currentText = texts[Math.floor(Math.random() * texts.length)];

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('menuButton').style.display = 'block';
            
            displayText();
            document.getElementById('typingInput').focus();
            
            startTimer();
        }

        function returnToMenu() {
            gameRunning = false;
            currentIndex = 0;
            correctChars = 0;
            totalChars = 0;
            correctWords = 0;
            timeLeft = 60;
            startTime = null;
            
            const inputElement = document.getElementById('typingInput');
            inputElement.value = '';
            inputElement.classList.remove('correct-flash', 'incorrect-flash');
            
            // Reset timer styling
            document.getElementById('timer').style.color = '#f0c950';
            document.getElementById('timer').style.textShadow = '0 0 15px rgba(240, 201, 80, 0.8)';
            
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('menuButton').style.display = 'none';
        }

        function displayText() {
            const textContent = document.getElementById('textContent');
            textContent.innerHTML = '';

            for (let i = 0; i < currentText.length; i++) {
                const span = document.createElement('span');
                span.textContent = currentText[i];
                
                if (i < currentIndex) {
                    if (document.getElementById('typingInput').value[i] === currentText[i]) {
                        span.className = 'correct';
                    } else {
                        span.className = 'incorrect';
                    }
                } else if (i === currentIndex) {
                    span.className = 'current';
                }
                
                textContent.appendChild(span);
            }

            updateProgress();
        }

        function updateProgress() {
            const progressPercent = (currentIndex / currentText.length) * 100;
            document.getElementById('progress').textContent = Math.floor(progressPercent) + '%';
            document.getElementById('progressFill').style.width = progressPercent + '%';
        }

        function calculateWPM() {
            if (!startTime) return 0;
            const timeElapsed = (Date.now() - startTime) / 1000 / 60; // in minutes
            if (timeElapsed === 0) return 0;
            // Standard: 5 characters = 1 word
            const wordsTyped = correctChars / 5;
            return Math.round(wordsTyped / timeElapsed);
        }

        function calculateAccuracy() {
            if (totalChars === 0) return 100;
            return Math.round((correctChars / totalChars) * 100);
        }

        function updateStats() {
            const wpm = calculateWPM();
            const accuracy = calculateAccuracy();
            
            document.getElementById('wpm').textContent = wpm;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('timer').textContent = timeLeft;

            const timeElement = document.getElementById('timer');
            if (timeLeft <= 10) {
                timeElement.style.color = '#ff6b6b';
                timeElement.style.textShadow = '0 0 15px rgba(255, 107, 107, 0.8)';
            } else {
                timeElement.style.color = '#f0c950';
                timeElement.style.textShadow = '0 0 15px rgba(240, 201, 80, 0.8)';
            }
            
            // Highlight WPM milestones
            const wpmElement = document.getElementById('wpm');
            if (wpm >= 80) {
                wpmElement.style.color = '#4CAF50';
                wpmElement.style.textShadow = '0 0 20px rgba(76, 175, 80, 1)';
            } else if (wpm >= 60) {
                wpmElement.style.color = '#4169e1';
                wpmElement.style.textShadow = '0 0 20px rgba(65, 105, 225, 1)';
            } else {
                wpmElement.style.color = '#f0c950';
                wpmElement.style.textShadow = '0 0 15px rgba(240, 201, 80, 0.8)';
            }
            
            // Highlight accuracy
            const accuracyElement = document.getElementById('accuracy');
            if (accuracy >= 95) {
                accuracyElement.style.color = '#4CAF50';
                accuracyElement.style.textShadow = '0 0 20px rgba(76, 175, 80, 1)';
            } else if (accuracy < 70) {
                accuracyElement.style.color = '#ff6b6b';
                accuracyElement.style.textShadow = '0 0 20px rgba(255, 107, 107, 1)';
            } else {
                accuracyElement.style.color = '#f0c950';
                accuracyElement.style.textShadow = '0 0 15px rgba(240, 201, 80, 0.8)';
            }
        }

        document.getElementById('typingInput').addEventListener('input', (e) => {
            if (!gameRunning) return;
            
            if (!startTime) {
                startTime = Date.now();
            }

            const typed = e.target.value;
            const inputElement = e.target;
            
            // Only allow typing if the character matches
            if (typed.length > currentIndex) {
                const newChar = typed[typed.length - 1];
                
                if (newChar === currentText[currentIndex]) {
                    correctChars++;
                    totalChars++;
                    currentIndex++;
                    
                    // Visual feedback for correct character
                    inputElement.classList.remove('incorrect-flash');
                    inputElement.classList.add('correct-flash');
                    setTimeout(() => inputElement.classList.remove('correct-flash'), 100);
                    
                    // Check if word is completed
                    if (currentText[currentIndex] === ' ' || currentIndex === currentText.length) {
                        correctWords++;
                    }
                    
                    // Check if text is completed
                    if (currentIndex >= currentText.length) {
                        endGame();
                        return;
                    }
                } else {
                    totalChars++;
                    // Visual feedback for incorrect character
                    inputElement.classList.remove('correct-flash');
                    inputElement.classList.add('incorrect-flash');
                    setTimeout(() => inputElement.classList.remove('incorrect-flash'), 300);
                    
                    // Remove the incorrect character
                    e.target.value = typed.slice(0, -1);
                }
            }

            displayText();
            updateStats();
        });

        document.getElementById('typingInput').addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            // Prevent backspace
            if (e.key === 'Backspace') {
                e.preventDefault();
            }
        });

        function startTimer() {
            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }
                
                timeLeft--;
                updateStats();

                const timeElement = document.getElementById('timer');
                if (timeLeft <= 10) {
                    timeElement.style.color = '#ff6b6b';
                    timeElement.style.textShadow = '0 0 15px rgba(255, 107, 107, 0.8)';
                }
                
                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timer);
                }
            }, 1000);
        }

        function getRating(wpm, accuracy) {
            if (wpm >= 80 && accuracy >= 95) return "🏆 Legendary Typist!";
            if (wpm >= 60 && accuracy >= 90) return "⭐ Outstanding Performance!";
            if (wpm >= 40 && accuracy >= 85) return "✨ Excellent Work!";
            if (wpm >= 30 && accuracy >= 80) return "👍 Good Job!";
            if (wpm >= 20 && accuracy >= 70) return "💪 Keep Practicing!";
            return "🎯 Room for Improvement!";
        }

        function endGame() {
            gameRunning = false;
            
            const finalWPM = calculateWPM();
            const finalAccuracy = calculateAccuracy();
            
            document.getElementById('finalWPM').textContent = finalWPM;
            document.getElementById('finalAccuracy').textContent = finalAccuracy;
            document.getElementById('finalChars').textContent = correctChars;
            document.getElementById('finalWords').textContent = correctWords;
            
            const rating = getRating(finalWPM, finalAccuracy);
            const completedEarly = currentIndex >= currentText.length && timeLeft > 0;
            
            if (completedEarly) {
                document.getElementById('rating').textContent = "🎉 " + rating + " (Finished Early!)";
            } else {
                document.getElementById('rating').textContent = rating;
            }
            
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }

        backgroundLoop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Racer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #1a2942;
            --navy-lighter: #3d5a7f;
            --accent-blue: #4a90e2;
            --accent-light-blue: #6fa8ec;
            --accent-sky: #87ceeb;
            --gradient-blue-glow: linear-gradient(135deg, #4a90e2 0%, #6fa8ec 50%, #87ceeb 100%);
            --gradient-navy-soft: linear-gradient(135deg, #1a2942 0%, #3d5a7f 50%, #b8c9dc 100%);
            --border-blue: rgba(74,144,226,0.3);
            --shadow-blue: rgba(74,144,226,0.22);
            --text-navy: #0a1628;
            --text-gray: #6b7c93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #e8eef5 25%, #b8c9dc 60%, #3d5a7f 85%, #1a2942 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cairo', 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 900px;
            height: 650px;
            background: linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(232,238,245,0.97) 100%);
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 40px rgba(74,144,226,0.3), inset 0 0 40px rgba(74,144,226,0.04);
            border-radius: 20px;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            border-radius: 20px;
        }

        #startScreen, #resultsScreen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.98);
            padding: 44px 50px;
            border: 2px solid var(--accent-blue);
            border-radius: 24px;
            text-align: center;
            color: var(--navy-dark);
            z-index: 20;
            box-shadow: 0 20px 60px rgba(74,144,226,0.22);
            min-width: 480px;
        }

        #resultsScreen { display: none; }

        h1 {
            font-size: 42px;
            margin-bottom: 8px;
            font-weight: 900;
            background: var(--gradient-navy-soft);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 26px;
            color: var(--accent-blue);
            font-weight: 700;
        }

        .difficultyButtons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            background: var(--gradient-blue-glow);
            color: #fff;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-family: 'Cairo', monospace;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: 700;
            box-shadow: 0 4px 14px var(--shadow-blue);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(74,144,226,0.42);
        }

        button:active { transform: translateY(-1px); }

        #menuButton {
            position: absolute;
            top: 15px; right: 15px;
            background: var(--gradient-blue-glow);
            color: #fff;
            border: none;
            padding: 10px 22px;
            font-size: 14px;
            font-family: 'Cairo', monospace;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: 700;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 14px var(--shadow-blue);
        }

        #menuButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(74,144,226,0.42);
        }

        #gameArea {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        #stats {
            background: rgba(255,255,255,0.92);
            padding: 16px 20px;
            border-bottom: 1.5px solid var(--border-blue);
            display: flex;
            justify-content: space-around;
            color: var(--navy-dark);
            font-size: 16px;
            box-shadow: 0 2px 12px rgba(74,144,226,0.08);
        }

        #stats div {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        #stats .label {
            font-size: 12px;
            color: var(--text-gray);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #stats .value {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent-blue);
        }

        #textDisplay {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 44px;
            background: rgba(248,249,250,0.6);
        }

        #textContent {
            font-size: 24px;
            line-height: 2;
            color: var(--text-gray);
            text-align: left;
            max-width: 800px;
            letter-spacing: 1.5px;
            word-spacing: 6px;
        }

        .correct {
            color: var(--accent-blue);
            font-weight: 700;
        }

        .incorrect {
            color: #ee5a6f;
            background: rgba(238,90,111,0.1);
            padding: 2px 3px;
            border-radius: 4px;
            text-decoration: line-through;
        }

        .current {
            background: rgba(74,144,226,0.18);
            border-bottom: 2.5px solid var(--accent-blue);
            padding: 2px 4px;
            margin: 0 1px;
            border-radius: 4px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.55; }
        }

        #inputArea {
            background: rgba(255,255,255,0.95);
            padding: 22px 28px;
            border-top: 1.5px solid var(--border-blue);
        }

        #typingInput {
            width: 100%;
            padding: 16px 20px;
            font-size: 20px;
            font-family: 'Cairo', monospace;
            background: rgba(248,249,250,0.9);
            border: 2px solid var(--border-blue);
            border-radius: 14px;
            color: var(--navy-dark);
            outline: none;
            text-align: center;
            transition: all 0.2s;
            font-weight: 600;
        }

        #typingInput:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(74,144,226,0.1);
            background: #fff;
        }

        #typingInput.correct-flash {
            border-color: #20c997;
            box-shadow: 0 0 0 4px rgba(32,201,151,0.15);
        }

        #typingInput.incorrect-flash {
            border-color: #ee5a6f;
            box-shadow: 0 0 0 4px rgba(238,90,111,0.15);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-5px); }
            75%       { transform: translateX(5px); }
        }

        #typingInput::placeholder {
            color: rgba(74,144,226,0.45);
            font-weight: 600;
        }

        #progressBar {
            width: 100%;
            height: 6px;
            background: rgba(74,144,226,0.12);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        #progressFill {
            height: 100%;
            background: var(--gradient-blue-glow);
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }

        #resultsStats {
            margin: 24px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .resultItem {
            background: rgba(74,144,226,0.06);
            padding: 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border-blue);
        }

        .resultLabel {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .resultValue {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-blue);
        }

        .resultUnit {
            font-size: 16px;
            color: var(--text-gray);
            font-weight: 600;
            margin-left: 4px;
        }

        .rating {
            font-size: 22px;
            font-weight: 800;
            margin-top: 16px;
            padding: 14px;
            background: rgba(74,144,226,0.07);
            border-radius: 14px;
            border: 1.5px solid var(--border-blue);
            color: var(--navy-dark);
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="650"></canvas>

    <button id="menuButton" onclick="returnToMenu()">Main Menu</button>

    <div id="startScreen">
        <h1>TYPING RACER</h1>
        <h2>Choose Your Challenge</h2>
        <div class="difficultyButtons">
            <button onclick="startGame('easy')">🌱 Easy - Simple Words</button>
            <button onclick="startGame('medium')">⚡ Medium - Mixed Text</button>
            <button onclick="startGame('hard')">🔥 Hard - Complex Sentences</button>
            <button onclick="startGame('extreme')">💫 Extreme - Advanced Vocabulary</button>
        </div>
    </div>

    <div id="gameArea">
        <div id="stats">
            <div><span class="label">WPM</span><span class="value" id="wpm">0</span></div>
            <div><span class="label">Accuracy</span><span class="value" id="accuracy">100%</span></div>
            <div><span class="label">Time</span><span class="value" id="timer">60</span></div>
            <div><span class="label">Progress</span><span class="value" id="progress">0%</span></div>
        </div>
        <div id="textDisplay">
            <div id="textContent"></div>
        </div>
        <div id="inputArea">
            <input type="text" id="typingInput" placeholder="Start typing..." autocomplete="off" spellcheck="false">
            <div id="progressBar"><div id="progressFill"></div></div>
        </div>
    </div>

    <div id="resultsScreen">
        <h1>RACE COMPLETE! 🏁</h1>
        <div id="resultsStats">
            <div class="resultItem">
                <div class="resultLabel">Words Per Minute</div>
                <div class="resultValue"><span id="finalWPM">0</span><span class="resultUnit">WPM</span></div>
            </div>
            <div class="resultItem">
                <div class="resultLabel">Accuracy</div>
                <div class="resultValue"><span id="finalAccuracy">0</span><span class="resultUnit">%</span></div>
            </div>
            <div class="resultItem">
                <div class="resultLabel">Characters Typed</div>
                <div class="resultValue" id="finalChars">0</div>
            </div>
            <div class="resultItem">
                <div class="resultLabel">Correct Words</div>
                <div class="resultValue" id="finalWords">0</div>
            </div>
        </div>
        <div class="rating" id="rating">⭐ Excellent Typing!</div>
        <button onclick="returnToMenu()" style="margin-top:18px;">Main Menu</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameRunning = false;
    let difficulty = 'medium';
    let currentText = '';
    let currentIndex = 0;
    let startTime = null;
    let timeLeft = 60;
    let correctChars = 0;
    let totalChars = 0;
    let correctWords = 0;

    const textSamples = {
        easy: [
            "the quick brown fox jumps over the lazy dog",
            "a cat sat on a mat and looked at the rat",
            "the sun is bright and warm today",
            "I like to play games and have fun",
            "the tree has green leaves in summer",
            "birds fly high in the blue sky",
            "water is clear and cool to drink",
            "the moon shines at night with stars"
        ],
        medium: [
            "Technology has transformed the way we communicate and work in modern society",
            "Learning new skills requires dedication, practice, and a willingness to make mistakes",
            "The ancient library contained thousands of books written in various languages",
            "Scientists continue to discover amazing facts about our universe and its mysteries",
            "Music has the power to evoke emotions and create lasting memories",
            "Reading books expands your imagination and knowledge of the world around you"
        ],
        hard: [
            "The philosophical implications of artificial intelligence challenge our understanding of consciousness",
            "Biodiversity plays a crucial role in maintaining ecological balance and sustainability",
            "Quantum mechanics revolutionized physics by introducing uncertainty and wave-particle duality",
            "Climate change represents one of the most pressing challenges facing humanity today",
            "Democratic institutions require constant vigilance and active participation from citizens"
        ],
        extreme: [
            "The epistemological ramifications of post-modernist discourse necessitate a comprehensive reassessment",
            "Neuroplasticity demonstrates the brain's remarkable capacity for reorganization throughout one's lifespan",
            "Cryptocurrency and blockchain technology have precipitated unprecedented disruption in financial systems",
            "Anthropogenic factors contributing to environmental degradation require immediate interdisciplinary intervention",
            "Phenomenological approaches to consciousness studies challenge reductionist neuroscientific interpretations"
        ]
    };

    // Floating dots background
    let dots = [];
    for (let i = 0; i < 55; i++) {
        dots.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 2.5 + 0.8,
            speed: Math.random() * 0.35 + 0.1,
            opacity: Math.random() * 0.15 + 0.04,
            color: Math.random() > 0.5 ? '74,144,226' : '26,41,66'
        });
    }

    function drawDots() {
        dots.forEach(d => {
            ctx.fillStyle = `rgba(${d.color},${d.opacity})`;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function updateDots() {
        dots.forEach(d => {
            d.y += d.speed;
            if (d.y > canvas.height) { d.y = 0; d.x = Math.random() * canvas.width; }
        });
    }

    function drawBackground() {
        const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bg.addColorStop(0, '#f8f9fa');
        bg.addColorStop(1, '#e8eef5');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function backgroundLoop() {
        drawBackground();
        updateDots();
        drawDots();
        requestAnimationFrame(backgroundLoop);
    }

    function startGame(level) {
        difficulty = level;
        gameRunning = true;
        currentIndex = 0;
        correctChars = 0;
        totalChars = 0;
        correctWords = 0;
        timeLeft = 60;
        startTime = null;

        const texts = textSamples[difficulty];
        currentText = texts[Math.floor(Math.random() * texts.length)];

        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameArea').style.display = 'flex';
        document.getElementById('menuButton').style.display = 'block';

        displayText();
        document.getElementById('typingInput').focus();
        startTimer();
    }

    function returnToMenu() {
        gameRunning = false;
        currentIndex = 0; correctChars = 0; totalChars = 0;
        correctWords = 0; timeLeft = 60; startTime = null;

        const inp = document.getElementById('typingInput');
        inp.value = '';
        inp.classList.remove('correct-flash','incorrect-flash');

        const te = document.getElementById('timer');
        te.style.color = '#4a90e2';

        document.getElementById('startScreen').style.display = 'block';
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'none';
        document.getElementById('menuButton').style.display = 'none';
    }

    function displayText() {
        const tc = document.getElementById('textContent');
        tc.innerHTML = '';
        for (let i = 0; i < currentText.length; i++) {
            const span = document.createElement('span');
            span.textContent = currentText[i];
            if (i < currentIndex) {
                span.className = document.getElementById('typingInput').value[i] === currentText[i] ? 'correct' : 'incorrect';
            } else if (i === currentIndex) {
                span.className = 'current';
            }
            tc.appendChild(span);
        }
        updateProgress();
    }

    function updateProgress() {
        const pct = (currentIndex / currentText.length) * 100;
        document.getElementById('progress').textContent = Math.floor(pct) + '%';
        document.getElementById('progressFill').style.width = pct + '%';
    }

    function calculateWPM() {
        if (!startTime) return 0;
        const elapsed = (Date.now() - startTime) / 1000 / 60;
        if (elapsed === 0) return 0;
        return Math.round((correctChars / 5) / elapsed);
    }

    function calculateAccuracy() {
        if (totalChars === 0) return 100;
        return Math.round((correctChars / totalChars) * 100);
    }

    function updateStats() {
        const wpm = calculateWPM();
        const acc = calculateAccuracy();

        document.getElementById('wpm').textContent = wpm;
        document.getElementById('accuracy').textContent = acc + '%';
        document.getElementById('timer').textContent = timeLeft;

        const te = document.getElementById('timer');
        te.style.color = timeLeft <= 10 ? '#ee5a6f' : '#4a90e2';

        const we = document.getElementById('wpm');
        we.style.color = wpm >= 80 ? '#20c997' : wpm >= 60 ? '#4a90e2' : '#1a2942';

        const ae = document.getElementById('accuracy');
        ae.style.color = acc >= 95 ? '#20c997' : acc < 70 ? '#ee5a6f' : '#4a90e2';
    }

    document.getElementById('typingInput').addEventListener('input', e => {
        if (!gameRunning) return;
        if (!startTime) startTime = Date.now();

        const typed = e.target.value;
        const inp = e.target;

        if (typed.length > currentIndex) {
            const newChar = typed[typed.length - 1];
            if (newChar === currentText[currentIndex]) {
                correctChars++; totalChars++; currentIndex++;
                inp.classList.remove('incorrect-flash');
                inp.classList.add('correct-flash');
                setTimeout(() => inp.classList.remove('correct-flash'), 100);
                if (currentText[currentIndex] === ' ' || currentIndex === currentText.length) correctWords++;
                if (currentIndex >= currentText.length) { endGame(); return; }
            } else {
                totalChars++;
                inp.classList.remove('correct-flash');
                inp.classList.add('incorrect-flash');
                setTimeout(() => inp.classList.remove('incorrect-flash'), 300);
                e.target.value = typed.slice(0, -1);
            }
        }

        displayText();
        updateStats();
    });

    document.getElementById('typingInput').addEventListener('keydown', e => {
        if (!gameRunning) return;
        if (e.key === 'Backspace') e.preventDefault();
    });

    function startTimer() {
        const timer = setInterval(() => {
            if (!gameRunning) { clearInterval(timer); return; }
            timeLeft--;
            updateStats();
            if (timeLeft <= 0) { endGame(); clearInterval(timer); }
        }, 1000);
    }

    function getRating(wpm, accuracy) {
        if (wpm >= 80 && accuracy >= 95) return "🏆 Legendary Typist!";
        if (wpm >= 60 && accuracy >= 90) return "⭐ Outstanding Performance!";
        if (wpm >= 40 && accuracy >= 85) return "✨ Excellent Work!";
        if (wpm >= 30 && accuracy >= 80) return "👍 Good Job!";
        if (wpm >= 20 && accuracy >= 70) return "💪 Keep Practicing!";
        return "🎯 Room for Improvement!";
    }

    function endGame() {
        gameRunning = false;
        const fw = calculateWPM();
        const fa = calculateAccuracy();
        document.getElementById('finalWPM').textContent = fw;
        document.getElementById('finalAccuracy').textContent = fa;
        document.getElementById('finalChars').textContent = correctChars;
        document.getElementById('finalWords').textContent = correctWords;
        const completed = currentIndex >= currentText.length && timeLeft > 0;
        document.getElementById('rating').textContent = (completed ? "🎉 " : "") + getRating(fw, fa) + (completed ? " (Finished Early!)" : "");
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'block';
    }

    backgroundLoop();
</script>
</body>
</html>

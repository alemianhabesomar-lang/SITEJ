<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مساعد SITEJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #00d4ff;
      --text: #e8e8f0;
      --muted: #7070a0;
      --user-bubble: #6c63ff;
      --ai-bubble: #1e1e2e;
      --glow: rgba(108, 99, 255, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,255,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      background: rgba(18,18,26,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px var(--glow);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px var(--glow); }
      50% { box-shadow: 0 0 35px rgba(108,99,255,0.5); }
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #00d4aa;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4aa;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease forwards;
    }

    .welcome-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
    }

    .suggestion {
      padding: 10px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .suggestion:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.1);
      transform: translateY(-2px);
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.4s ease forwards;
      max-width: 800px;
      width: 100%;
      align-self: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; align-self: flex-end; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .msg.ai .avatar {
      background: var(--card);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.8;
      max-width: calc(100% - 50px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, var(--user-bubble), #8b7fff);
      color: white;
      border-bottom-left-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 16px 18px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      background: rgba(18,18,26,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px 14px;
      transition: border-color 0.25s;
      max-width: 800px;
      margin: 0 auto;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 140px;
      line-height: 1.6;
      direction: rtl;
    }

    textarea::placeholder { color: var(--muted); }

    button#send {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    button#send:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--glow); }
    button#send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* Error */
    .error-msg {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff8080;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div class="header-text">
    <h1>مساعد SITEJ</h1>
    <p>ذكاء اصطناعي متطور</p>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    متصل
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">✨</span>
    <h2>أهلاً بك في مساعد SITEJ</h2>
    <p>أنا مساعدك الذكي، جاهز للإجابة على أسئلتك<br />وإنجاز مهامك بكفاءة عالية</p>
    <div class="suggestions">
      <button class="suggestion" onclick="suggest(this)">📝 ساعدني في كتابة نص</button>
      <button class="suggestion" onclick="suggest(this)">💡 فكرة إبداعية</button>
      <button class="suggestion" onclick="suggest(this)">🧮 حل مسألة رياضية</button>
      <button class="suggestion" onclick="suggest(this)">🌐 ترجم نصاً</button>
      <button class="suggestion" onclick="suggest(this)">💻 مساعدة في البرمجة</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="اكتب رسالتك هنا..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMsg()">➤</button>
  </div>
  <div class="input-footer">مساعد SITEJ • مدعوم بالذكاء الاصطناعي</div>
</div>

<script>
  // 🔑 ضع الـ API Key هنا
  const API_KEY = "AIzaSyB5xU8NMkVTVv40cegCjjHC6jjkb1_37hA";

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let history = [];

  function suggest(el) {
    input.value = el.innerText.replace(/^[^\s]+\s/, '');
    input.focus();
    autoResize(input);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  }

  function addMsg(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${text}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMsg() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    addMsg('user', text);
    history.push({ role: 'user', parts: [{ text }] });
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: history })
        }
      );

      const data = await res.json();

      if (data.error) throw new Error(data.error.message);

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'لم أتلقَ رداً.';
      history.push({ role: 'model', parts: [{ text: reply }] });

      removeTyping();
      addMsg('ai', reply);
    } catch (err) {
      removeTyping();
      const div = document.createElement('div');
      div.className = 'error-msg';
      div.textContent = '⚠️ حدث خطأ: ' + err.message;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>

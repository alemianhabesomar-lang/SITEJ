<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUCORE | الإعدادات الشاملة (v5.0)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #7000ff;
            --dark-bg: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 242, 254, 0.3);
        }

        body {
            margin: 0; background: var(--dark-bg); color: white;
            font-family: 'Cairo', sans-serif; overflow-x: hidden;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* خلفية الانفجار اللوني */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1a1a40 0%, #050510 100%);
        }

        .settings-card {
            width: 95%; max-width: 1200px; height: 85vh;
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 40px; border: 1px solid var(--border);
            display: grid; grid-template-columns: 320px 1fr; overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
        }

        /* Sidebar */
        .sidebar {
            background: rgba(0, 0, 0, 0.4); padding: 40px 20px;
            border-left: 1px solid var(--border); display: flex; flex-direction: column;
        }

        .avatar-container {
            position: relative; width: 150px; height: 150px; margin: 0 auto 20px;
        }

        .avatar-container img {
            width: 100%; height: 100%; border-radius: 45px;
            object-fit: cover; border: 3px solid var(--neon-blue);
            transition: 0.5s; cursor: pointer;
        }

        .avatar-container:hover img { filter: drop-shadow(0 0 15px var(--neon-blue)) brightness(1.2); }

        .cam-btn {
            position: absolute; bottom: -5px; right: -5px;
            background: var(--neon-blue); color: black; width: 40px; height: 40px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 3px solid var(--dark-bg);
        }

        .nav-menu { flex: 1; margin-top: 20px; }
        .nav-btn {
            padding: 15px; margin: 8px 0; border-radius: 18px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 12px; color: #888;
        }
        .nav-btn.active { background: rgba(0, 242, 254, 0.15); color: var(--neon-blue); font-weight: bold; }

        /* Content Area */
        .content { padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .section { display: none; animation: fadeIn 0.5s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: var(--neon-blue); font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 15px; color: white;
            font-family: inherit; transition: 0.3s;
        }

        input:focus { border-color: white; outline: none; box-shadow: 0 0 15px rgba(0,242,254,0.2); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .social-link {
            display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03);
            padding: 10px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;
        }

        /* زر الحفظ الخارق */
        .save-footer {
            padding: 20px 40px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-glow {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none; padding: 15px 45px; border-radius: 20px; color: white;
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 5px 25px rgba(112, 0, 255, 0.4); transition: 0.3s;
        }

        .btn-glow:hover { transform: scale(1.05); filter: brightness(1.2); }

        @media (max-width: 900px) {
            .settings-card { grid-template-columns: 1fr; height: auto; }
            .sidebar { border: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="settings-card">
    <div class="sidebar">
        <div class="avatar-container">
            <img id="pfp-preview" src="https://via.placeholder.com/150" onclick="document.getElementById('file-input').click()">
            <label for="file-input" class="cam-btn"><i class="fas fa-camera"></i></label>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>
        <center><h3 id="display-name" style="font-family: 'Orbitron';">GUEST_01</h3></center>
        
        <div class="nav-menu">
            <div class="nav-btn active" onclick="showTab('tab1', this)"><i class="fas fa-user-ninja"></i> الملف الشخصي</div>
            <div class="nav-btn" onclick="showTab('tab2', this)"><i class="fas fa-graduation-cap"></i> التعليم والمهارات</div>
            <div class="nav-btn" onclick="showTab('tab3', this)"><i class="fas fa-link"></i> الروابط الرقمية</div>
            <div class="nav-item" style="padding: 10px; opacity: 0.5; font-size: 0.8rem;">إعدادات متقدمة</div>
            <div class="nav-btn" onclick="showTab('tab4', this)"><i class="fas fa-palette"></i> المظهر (UI)</div>
            <div class="nav-btn" onclick="showTab('tab5', this)"><i class="fas fa-shield-alt"></i> الأمان والخصوصية</div>
        </div>
    </div>

    <div style="display: flex; flex-direction: column;">
        <div class="content">
            <div id="tab1" class="section active">
                <h2><i class="fas fa-id-card"></i> بيانات الهوية الرقمية</h2>
                <div class="grid-2">
                    <div class="input-group">
                        <label>الاسم المستعار</label>
                        <input type="text" id="nick" placeholder="أدخل اسمك هنا..">
                    </div>
                    <div class="input-group">
                        <label>الحالة المخصصة (Status Emoji)</label>
                        <input type="text" id="status" placeholder="مثلاً: متوفر 🟢">
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>السيرة الذاتية (Bio)</label>
                        <textarea id="bio" rows="4" placeholder="اكتب نبذة عنك وعن شغفك.."></textarea>
                    </div>
                </div>
            </div>

            <div id="tab2" class="section">
                <h2><i class="fas fa-brain"></i> المسار المعرفي</h2>
                <div class="grid-2">
                    <div class="input-group">
                        <label>المستوى الدراسي</label>
                        <select id="edu">
                            <option>طالب ثانوي</option>
                            <option>طالب جامعي</option>
                            <option>مبرمج تعلم ذاتي</option>
                            <option>باحث محترف</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>المهارة الأساسية</label>
                        <input type="text" id="main-skill" placeholder="مثل: Python, Figma..">
                    </div>
                    <div class="input-group">
                        <label>ساعات التعلم الأسبوعية</label>
                        <input type="number" id="study-hours" placeholder="مثلاً: 25">
                    </div>
                    <div class="input-group">
                        <label>الشهادات (Links)</label>
                        <input type="text" id="certs" placeholder="رابط شهاداتك..">
                    </div>
                </div>
            </div>

            <div id="tab3" class="section">
                <h2><i class="fas fa-globe"></i> التواجد على الشبكة</h2>
                <div class="social-link"><i class="fab fa-github"></i><input type="text" id="github" placeholder="حساب GitHub"></div>
                <div class="social-link"><i class="fab fa-discord"></i><input type="text" id="discord" placeholder="Discord Tag"></div>
                <div class="social-link"><i class="fab fa-instagram"></i><input type="text" id="insta" placeholder="حساب Instagram"></div>
                <div class="social-link"><i class="fab fa-telegram"></i><input type="text" id="telegram" placeholder="رابط Telegram"></div>
                <div class="social-link"><i class="fab fa-tiktok"></i><input type="text" id="tiktok" placeholder="حساب TikTok"></div>
            </div>

            <div id="tab4" class="section">
                <h2><i class="fas fa-magic"></i> تخصيص الواجهة</h2>
                <div class="grid-2">
                    <div class="input-group">
                        <label>لون السمة</label>
                        <input type="color" id="theme-color" value="#00f2fe">
                    </div>
                    <div class="input-group">
                        <label>نمط الخط</label>
                        <select id="font">
                            <option>Cairo (Modern)</option>
                            <option>Orbitron (Tech)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>شفافية البطاقات</label>
                        <input type="range" id="opacity" min="10" max="95">
                    </div>
                </div>
            </div>

            <div id="tab5" class="section">
                <h2><i class="fas fa-user-shield"></i> الأمان</h2>
                <div class="input-group">
                    <label><input type="checkbox" id="private-acc"> حساب خاص (Private Account)</label>
                </div>
                <div class="input-group">
                    <label><input type="checkbox" id="show-activity" checked> إظهار النشاط الأكاديمي للعامة</label>
                </div>
                <div class="input-group">
                    <label>من يمكنه مراسلتي؟</label>
                    <select id="msg-privacy">
                        <option>الجميع</option>
                        <option>الأصدقاء فقط</option>
                        <option>لا أحد</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="save-footer">
            <div id="status-msg" style="font-size: 0.8rem; color: var(--neon-blue);"></div>
            <button class="btn-glow" id="save-all">مزامنة وحفظ البيانات ⚡</button>
        </div>
    </div>
</div>

<script type="module">
    // --- التنقل بين التبويبات ---
    window.showTab = (tabId, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    };

    // --- Firebase Logic ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = { /* الصق إعداداتك هنا */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUID;
    let selectedFile = null;

    // إصلاح رفع الصورة: المعاينة اللحظية
    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('pfp-preview').src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // جلب البيانات
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUID = user.uid;
            const snap = await getDoc(doc(db, "users", currentUID));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('nick').value = d.nickname || "";
                document.getElementById('display-name').innerText = d.nickname || "GUEST_01";
                document.getElementById('status').value = d.status || "";
                document.getElementById('bio').value = d.bio || "";
                document.getElementById('pfp-preview').src = d.photoURL || "https://via.placeholder.com/150";
                // تعبئة الروابط...
                document.getElementById('github').value = d.github || "";
                document.getElementById('discord').value = d.discord || "";
                document.getElementById('insta').value = d.instagram || "";
                document.getElementById('telegram').value = d.telegram || "";
                document.getElementById('tiktok').value = d.tiktok || "";
            }
        }
    });

    // عملية الحفظ الشاملة
    document.getElementById('save-all').addEventListener('click', async () => {
        const btn = document.getElementById('save-all');
        const msg = document.getElementById('status-msg');
        btn.disabled = true;
        msg.innerText = "⏳ جاري الرفع والمزامنة...";

        try {
            let photoURL = document.getElementById('pfp-preview').src;

            // إذا اختار العضو صورة جديدة، نرفعها لـ Storage
            if (selectedFile) {
                const sRef = ref(storage, `profiles/${currentUID}`);
                const upSnap = await uploadBytes(sRef, selectedFile);
                photoURL = await getDownloadURL(upSnap.ref);
            }

            // تحديث Firestore بجميع الحقول (لا حذف، فقط إضافة)
            await updateDoc(doc(db, "users", currentUID), {
                nickname: document.getElementById('nick').value,
                status: document.getElementById('status').value,
                bio: document.getElementById('bio').value,
                photoURL: photoURL,
                edu: document.getElementById('edu').value,
                skill: document.getElementById('main-skill').value,
                hours: document.getElementById('study-hours').value,
                github: document.getElementById('github').value,
                discord: document.getElementById('discord').value,
                instagram: document.getElementById('insta').value,
                telegram: document.getElementById('telegram').value,
                tiktok: document.getElementById('tiktok').value,
                theme: document.getElementById('theme-color').value,
                isPrivate: document.getElementById('private-acc').checked,
                updatedAt: new Date()
            });

            msg.innerText = "✅ تم حفظ التغييرات بنجاح!";
            setTimeout(() => { msg.innerText = ""; btn.disabled = false; }, 3000);
        } catch (err) {
            msg.innerText = "❌ خطأ في الاتصال!";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>

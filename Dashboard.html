<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUCORE | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #060b23; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dash-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            transition: 0.3s;
        }

        .dash-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--primary); }
        
        .course-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back { color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>أهلاً بك، <span id="dashName">أيها البطل</span> 👋</h1>
        <a href="profile.html" class="btn-back"><i class="fas fa-user"></i> البروفايل</a>
    </div>

    <div class="grid-container">
        <div class="dash-card">
            <h3>نقاط الخبرة الكلية</h3>
            <div class="stat-val" id="dashXP">0</div>
            <p>أنت ضمن أفضل 5% هذا الشهر!</p>
        </div>

        <div class="dash-card">
            <h3>الدورات الحالية</h3>
            <div class="course-item">
                <i class="fas fa-code fa-2x"></i>
                <div>
                    <h4>برمجة الويب المتطورة</h4>
                    <small>تم إنجاز 60%</small>
                </div>
            </div>
            <div class="course-item">
                <i class="fas fa-brain fa-2x"></i>
                <div>
                    <h4>أساسيات الذكاء الاصطناعي</h4>
                    <small>تم إنجاز 20%</small>
                </div>
            </div>
        </div>

        <div class="dash-card">
            <h3>المهمة القادمة</h3>
            <p style="margin-top: 10px;"><i class="fas fa-clock"></i> اختبار الفيزياء - غداً 10 صباحاً</p>
            <button style="width:100%; margin-top:15px; background: var(--primary); border:none; padding:10px; border-radius:10px; font-weight:bold;">ابدأ الآن</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // نفس config الخاص بك
        const firebaseConfig = { /* انسخ إعداداتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    document.getElementById('dashName').innerText = docSnap.data().nickname;
                    document.getElementById('dashXP').innerText = docSnap.data().xp || 0;
                }
            }
        });
    </script>
</body>
</html>
